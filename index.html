/* ── 번역 캐시 (DeepL 결과 저장 → 재호출 방지) ── */
var _tlCache = {};
var _currentLang = 'ko';
var _epOriginalLines = null; /* 에피소드 원본 줄 배열 — 재번역 시 사용 */

function setLang(lang){
  _currentLang = lang;
  if(lang==='ko'){
    /* KO: data-orig 원본 복원 후 Google 쿠키 삭제 → 리로드 */
    document.querySelectorAll('[data-orig]').forEach(function(n){
      n.textContent = n.dataset.orig;
    });
    document.cookie='googtrans=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT';
    document.cookie='googtrans=;path=/;domain=.'+location.hostname+';expires=Thu, 01 Jan 1970 00:00:00 GMT';
    location.reload();
    return;
  }

  /* 캐시 히트 → 즉시 적용 (API 호출 없음) */
  if(_tlCache[lang]){
    _tlApply(_tlCache[lang]);
    _updateEpLangBtns(lang);
    return;
  }

  /* DeepL 설정 확인 */
  var cfg = (typeof CONFIG !== 'undefined' && CONFIG.DEEPL) ? CONFIG.DEEPL : {};

  /* 본문 뷰어 열려있으면 → DeepL 버튼 표시, 자동번역 안 함 */
  if(S.view === 'content' && cfg.enabled && cfg.proxyUrl){
    _updateEpLangBtns(lang);
    _tlShowDeepLBtn(lang, cfg);
    _tlGoogle(lang);
    return;
  }

  _updateEpLangBtns(lang);
  if(cfg.enabled && cfg.proxyUrl){
    _tlDeepL(lang, cfg);
  } else {
    /* DeepL 미설정 → Google 바로 사용 */
    _tlGoogle(lang);
  }
}

/* ── ① DeepL 번역 시도 ── */
function _tlDeepL(lang, cfg){
  var nodes = Array.prototype.slice.call(document.querySelectorAll('[data-i18n]'));
  if(!nodes.length){ _tlGoogle(lang); return; }

  /* 원본 텍스트 보존 */
  nodes.forEach(function(n){
    if(!n.dataset.orig) n.dataset.orig = n.textContent.trim();
  });
  var texts = nodes.map(function(n){ return n.dataset.orig; });

  /* DeepL 언어 코드 변환 (zh-CN/zh-TW → ZH, 나머지 대문자) */
  var dlLang = (lang==='zh-CN'||lang==='zh-TW') ? 'ZH' : lang.split('-')[0].toUpperCase();

  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, cfg.timeout || 5000);

  fetch(cfg.proxyUrl, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text: texts, target_lang: dlLang }),
    signal: ctrl.signal
  })
  .then(function(res){
    clearTimeout(timer);
    /* 456 = 쿼터 초과, 5xx = 서버 오류 → 폴백 */
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.json();
  })
  .then(function(data){
    var dict = {};
    nodes.forEach(function(n, i){
      dict[n.dataset.i18n] = data.translations[i].text;
    });
    _tlCache[lang] = dict;
    _tlApply(dict);
    _tlBadge('deepl');
    /* DeepL 성공 시 Google도 함께 구동 (동적 콘텐츠 커버) */
    _tlGoogle(lang);
  })
  .catch(function(err){
    clearTimeout(timer);
    console.warn('[DeepL] 실패 → Google 폴백:', err.message);
    _tlGoogle(lang);
  });
}

/* ── DOM에 번역 딕셔너리 적용 ── */
function _tlApply(dict){
  document.querySelectorAll('[data-i18n]').forEach(function(n){
    var k = n.dataset.i18n;
    if(dict[k]) n.textContent = dict[k];
  });
}

    .then(function(t){ return t.split('\n'); })
    .catch(function(){
      /* 순KO 파일 없음 → 한본어(_epOriginalLines) 사용 */
      if(_epOriginalLines) return _epOriginalLines;
      var textEl = document.querySelector('#postype-body .postype-text');
      var raw = textEl ? textEl.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'') : '';
      return raw.split('\n');
    });

  sourcePromise.then(function(lines){

  /* 빈 줄은 DeepL에 안 보내고 인덱스만 기록 */
  var indices = [], texts = [];
  lines.forEach(function(l, i){
    if(l.trim()){ indices.push(i); texts.push(l); }
  });

  var dlLang = (lang==='zh-CN'||lang==='zh-TW') ? 'ZH' : lang.split('-')[0].toUpperCase();

  /* 50개 초과 시 배치 분할 */
  var BATCH = 50;
  var batches = [];
  for(var i=0; i<texts.length; i+=BATCH){
    batches.push(texts.slice(i, i+BATCH));
  }

  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, cfg.timeout || 15000);

  Promise.all(batches.map(function(batch){
    return fetch(cfg.proxyUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: batch, target_lang: dlLang }),
      signal: ctrl.signal
    }).then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.json();
    }).then(function(data){
      return data.translations.map(function(t){ return t.text; });
    });
  }))
  .then(function(results){
    clearTimeout(timer);
    /* 배치 결과 합치기 */
    var translated = [].concat.apply([], results);
    /* 원본 줄 구조에 번역 삽입 */
    var output = lines.slice();
    indices.forEach(function(origIdx, ti){
      output[origIdx] = translated[ti] || lines[origIdx];
    });
    var html = output
      .map(function(l){ return l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); })
      .join('<br>');
    el.innerHTML = '<div class="postype-text notranslate">'+html+'</div>';
    _tlBadge('deepl');
    try { localStorage.setItem(cacheKey, html); } catch(e){}
    if(typeof onDone === 'function') onDone();
  })
  .catch(function(err){
    clearTimeout(timer);
    console.warn('[DeepL 본문] 실패:', err.message);
    var src = _epOriginalLines ? _epOriginalLines.join('\n') : '';
    var restoredHtml = src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    el.innerHTML = '<div class="postype-text notranslate">'+restoredHtml+'</div>';
  });

  }); /* sourcePromise.then 닫기 */
}

/* ── NAV STATE ── */
let _navHideTimer=null;
function toggleNav(){
  const layer=document.getElementById("nav-layer");
  const bd=document.getElementById("nav-backdrop");
  if(layer.classList.contains("open")){
    layer.classList.remove("open");
    hideSubPanel();
    S.navPinned=false;
    document.body.classList.remove("nav-pinned");
    bd.classList.remove("show");
  } else {
    layer.classList.add("open");
    if(!S.navPinned) bd.classList.add("show");
    renderNavItems();
    if(S.activeProj){
      const _p=getProj(S.activeProj);
      const sp=document.getElementById("sub-panel");
      if(_p&&_p.keepSub&&_p.subType!=='youtube'&&sp){
        S.hoveredProj=S.activeProj;
        renderSubPanelContent(S.activeProj);
        sp.classList.add("visible");
      }
    }
  }
}
function closeNav(){
  if(S.navPinned)return;
  document.getElementById("nav-layer").classList.remove("open");
  document.getElementById("nav-backdrop").classList.remove("show");
  hideSubPanel();
}
function showSubPanel(projId){
  clearTimeout(_navHideTimer);
  const proj = getProj(projId);
  if(!proj || proj.subType==='youtube' || !proj.keepSub) return;
  const _layer=document.getElementById("nav-layer");
  if(!_layer||!_layer.classList.contains("open")) return;
  S.hoveredProj=projId;
  const sp=document.getElementById("sub-panel");
  renderSubPanelContent(projId);
  sp.classList.add("visible");
}
function hideSubPanel(){
  if(S.navPinned)return;
  const sp=document.getElementById("sub-panel");

    const ctb = document.getElementById("content-topbar");

    const ct = document.getElementById("content");

      ct.style.marginTop = "48px";
      ct.style.height = "calc(100vh - 48px)";
      ct.style.height = "calc(100dvh - 48px)";

    const fep = document.getElementById("float-ep-nav");

  if(S.view==="home")          { _tlBadgeReset(); renderHome(); }
  else if(S.view==="calendar") { _tlBadgeReset(); renderCalendar(); }
  else if(S.view==="progress") { _tlBadgeReset(); renderProgress(); }
  else if(S.view==="intro")    { _tlBadgeReset(); renderIntro(); }
  else if(S.view==="episodes") { _tlBadgeReset(); renderEpList(); }
  else if(S.view==="content")  renderContentView();
  else if(S.view==="story")         { _tlBadgeReset(); renderStoryList(); }
  else if(S.view==="story-content") renderStoryContent();
  else if(S.view==="charlist"||S.view==="chardetail"){
    // iframe 방식 — doll_charlist.html 완전 독립 운영
    // #content를 숨기고 char-frame iframe을 보여줌
    document.getElementById("content").style.display="none";
    document.getElementById("char-frame").style.display="block";
  }
  else if(S.view==="archive"){
    document.getElementById("content").style.display="none";
    document.getElementById("archive-frame").style.display="block";
  }
  else if(S.view==="event"){
    document.getElementById("content").style.display="none";
    document.getElementById("event-frame").style.display="block";
  }
  else if(S.view==="about")    renderAbout();
  // swipe-edge-zone 활성화: iframe이 실제로 떠있는 뷰일 때만
  var _iframeViews=["charlist","chardetail","archive","event"];
  var _isIframeView=_iframeViews.indexOf(S.view)!==-1||
    (S.view==="intro"&&(S.activeProj==="biz-oc-doll"||S.activeProj==="blood-highschool"));
  document.body.classList.toggle("iframe-view",_isIframeView);
}

let _storyData = null;

async function _fetchStoryData(){
  if(_storyData) return _storyData;
  try{
    const r = await fetch('biz-OC-doll/story_editor.json');
    if(!r.ok) throw new Error('fetch failed');
    _storyData = await r.json();
  }catch(e){
    _storyData = {episodes:[]};
  }
  return _storyData;
}

  ct.innerHTML=`

window.switchStoryTab = function(t){
  document.querySelectorAll('.story-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[id^="story-tab-content-"]').forEach(el=>el.style.display='none');
  const el = document.getElementById('story-tab-content-'+t);

    el.style.display='block';

// ── 스토리 캐릭터 검색 칩 ──
const _storyChips = {}; // {tab: Set}

window.onStorySearchKey = function(ev, t){
  if(ev.key !== 'Enter' && ev.key !== ' ') return;
  ev.preventDefault();
  const input = ev.target;
  const val = input.value.trim();
  if(!val) return;
  if(!_storyChips[t]) _storyChips[t] = new Set();
  _storyChips[t].add(val);
  input.value = '';
  _renderStoryChips(t);
  _applyStoryFilter(t);
};

function _renderStoryChips(t){
  const wrap = document.getElementById('story-chips-'+t);
  if(!wrap) return;
  const chips = [...(_storyChips[t]||[])];
  wrap.innerHTML = chips.map(n=>`
    <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 12px;background:var(--bg);border:1px solid var(--bd2);border-radius:20px;font-size:11px;font-weight:600;color:var(--tx2)">
      ${n}
      <button onclick="removeStoryChip('${t}','${n}')" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;line-height:1;padding:0 0 0 2px">×</button>
    </span>`).join('');
}

window.removeStoryChip = function(t, n){
  if(_storyChips[t]) _storyChips[t].delete(n);
  _renderStoryChips(t);
  _applyStoryFilter(t);
};

function _applyStoryFilter(t){
  const chips = [...(_storyChips[t]||[])];
  const cards = document.querySelectorAll(`#story-cards-${t} .story-ep-card`);
  cards.forEach(card=>{
    const nums = (card.dataset.cast||'').split(',').filter(Boolean);
    const match = !chips.length || chips.every(q=>nums.some(n=>n.includes(q)));
    card.style.opacity = match ? '' : '0.2';
    card.style.pointerEvents = match ? '' : 'none';
    card.querySelectorAll('img[data-cast]').forEach(img=>{
      const hit = chips.length && chips.some(q=>img.dataset.cast.includes(q));
      img.style.outline = hit ? '2px solid #5a90b0' : '';
      img.style.outlineOffset = hit ? '1px' : '';
    });
  });
};

  if(!e){ S.view='story'; render(); return; }
  const prev = eps[S.activeStoryEp-1]||null;
  const next = eps[S.activeStoryEp+1]||null;

  // DeepL bar (CONFIG.DEEPL 설정된 경우만, 초기 표시는 _currentLang 기준)
  const _dc = (typeof CONFIG !== 'undefined' && CONFIG.DEEPL) ? CONFIG.DEEPL : null;

/* ── 블록 렌더러 (biz-OC-doll 스토리) ── */
function bbDoll(blocks){
  let last=null;
  return blocks.map(b=>{
    const d=b.data||{};
    if(b.type==='cast'){
      last=null;
      const ms=d.members||[];
      if(!ms.length) return '';
      return `<div class="doll-cast-wrap"><div class="doll-cast-label">Cast</div><div class="doll-cast">${ms.map(m=>`<div class="doll-cast-item"><div class="doll-cast-icon"><img src="biz-OC-doll/images/simple_profile/${m.charNum||'001'}.png" alt="" onerror="this.style.display='none'"></div><div class="doll-cast-num">${m.charNum||'?'}</div></div>`).join('')}</div></div>`;
    }
    if(b.type==='scene'){
      last=null;
      const s=d.filename?`biz-OC-doll/images/ep_cover_sc/${d.filename}`:'';
      return `<div class="doll-script-block"><div class="doll-script-img">${s?`<img src="${s}" alt="">`:''}</div></div>`;
    }
    if(b.type==='speech'||b.type==='thought'){
      const sm=d.exprFilename&&d.exprFilename===last; last=d.exprFilename||null;
      const s=d.exprFilename?`biz-OC-doll/images/simple_profile/${d.exprFilename}`:'';
      const th=b.type==='thought'?' thought':'';
      const cn=b.type==='thought'
        ?`<div class="doll-tail-thought"><div class="doll-tail-dot doll-tail-dot1"></div><div class="doll-tail-dot doll-tail-dot2"></div></div>`
        :`<div class="doll-tail-speech"></div>`;
      return `<div class="doll-script-block"><div class="doll-script-line"><div class="doll-line-icon${sm?' hidden':''}"><img src="${s}" alt="" onerror="this.parentNode.style.background='#eef6fa'"></div><div class="doll-line-connector">${cn}</div><div class="doll-bubble${th}"><div class="doll-line-speaker">${d.charNum||''}</div><div class="doll-line-text">${d.text||''}</div></div></div></div>`;
    }
    if(b.type==='narration'){last=null;return `<div class="doll-script-block"><div class="doll-narration"><div class="doll-line-text">${d.text||''}</div></div></div>`;}
    if(b.type==='system'){last=null;return `<div class="doll-script-block"><div class="doll-system"><span class="doll-system-text">${d.text||''}</span></div></div>`;}
    if(b.type==='sfx'){last=null;return `<div class="doll-script-block"><div class="doll-sfx"><div class="doll-sfx-text">${d.text||''}</div></div></div>`;}
    if(b.type==='chat'){
      last=null;
      return `<div class="doll-script-block"><div class="doll-chat"><div class="doll-chat-header">${d.header||''}</div>${(d.msgs||[]).map(m=>`<div class="doll-chat-bubble${m.dir==='right'?' right':''}">${m.text}</div>`).join('')}</div></div>`;
    }
    if(b.type==='divider'){last=null;return `<div class="doll-script-block"><div class="doll-divider">· · ·</div></div>`;}
    return '';
  }).join('');
}

/* ── DeepL 번역 — biz-OC-doll 스토리 ── */
window._dollEpIdx = -1;
window._dollOrigBlocks = [];

function _dollBtn(){ return document.getElementById('doll-dl-btn'); }
function _dollRebtn(){ return document.getElementById('doll-dl-rebtn'); }
function _dollWrap(){ return document.getElementById('doll-blocks-wrap'); }

function _dollBtnReset(btn){
  if(!btn) return;
  btn.classList.remove('done');
  btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg> DeepL로 번역';
  btn.style.cssText='display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:11px;font-weight:600;font-family:var(--fn);border:1px solid #b5d4f4;border-radius:6px;background:#e8f0fe;color:#1a4c9e;cursor:pointer;transition:all .12s';
}

function _dollTlDone(){
  var btn=_dollBtn(), rbtn=_dollRebtn();
  if(btn){
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> DeepL 번역됨';
    btn.classList.add('done');
    btn.style.cssText='display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:11px;font-weight:600;font-family:var(--fn);border:1px solid #93c5fd;border-radius:6px;background:#dbeafe;color:#1e40af;cursor:default;transition:all .12s';
  }
  if(rbtn) rbtn.style.display='flex';
}

window.onDollDeepL = async function(){
  var btn=_dollBtn();
  if(!btn || btn.classList.contains('done')) return;
  var cfg=(typeof CONFIG!=='undefined'&&CONFIG.DEEPL)?CONFIG.DEEPL:{};
  var url=cfg.proxyUrl||''; if(!url) return;
  var lang=_currentLang||'ja';
  if(lang==='ko') return;
  var dlLang=(lang==='zh-CN'||lang==='zh-TW')?'ZH':lang.split('-')[0].toUpperCase();
  var cacheKey='dl_doll_'+window._dollEpIdx+'_'+dlLang;
  /* localStorage 캐시 히트 → API 호출 없이 즉시 적용 */
  try{
    var cached=localStorage.getItem(cacheKey);
    if(cached){
      var obj=JSON.parse(cached);
      var wrap=_dollWrap();
      if(wrap){ wrap.innerHTML=bbDoll(obj.blocks); wrap.classList.add('notranslate'); }
      var titleEl=document.querySelector('.doll-ep-title');
      if(titleEl&&obj._title) titleEl.textContent=obj._title;
      _dollTlDone(); return;
    }
  }catch(ex){}
  /* 캐시 없음 → DeepL API 호출 */
  var data=await _fetchStoryData();
  var ep=data.episodes[window._dollEpIdx];
  if(!ep) return;
  _doDollTranslate(url,cacheKey,ep.blocks||[],ep.title||'',dlLang);
};

function _doDollTranslate(url,cacheKey,blocks,origTitle,dlLang){
  var btn=_dollBtn();
  var targets=[];
  blocks.forEach(function(b,i){
    if(['system','narration','sfx','speech','thought'].indexOf(b.type)===-1) return;
    var t=(b.data&&b.data.text)?b.data.text:'';
    var clean=t.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').trim();
    if(clean) targets.push({idx:i,text:clean});
  });
  /* 제목을 텍스트 배열 맨 앞에 추가 */
  var titleClean=(origTitle||'').trim();
  var allTexts=(titleClean?[titleClean]:[] ).concat(targets.map(function(t){return t.text;}));
  if(!allTexts.length) return;
  if(btn){ btn.innerHTML='번역 중…'; btn.style.opacity='0.6'; btn.style.pointerEvents='none'; }
  var BATCH=50; var batches=[];
  for(var i=0;i<allTexts.length;i+=BATCH) batches.push(allTexts.slice(i,i+BATCH));
  Promise.all(batches.map(function(batch){
    return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:batch,target_lang:dlLang||'JA'})})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){return d.translations.map(function(t){return t.text;});});
  })).then(function(results){
    var translated=[].concat.apply([],results);
    /* 첫 번째가 제목 번역 결과 */
    var offset=titleClean?1:0;
    var translatedTitle=titleClean?(translated[0]||titleClean):'';
    var translatedBlocks=translated.slice(offset);
    var tlBlocks=JSON.parse(JSON.stringify(blocks));
    targets.forEach(function(t,i){if(translatedBlocks[i])tlBlocks[t.idx].data.text=translatedBlocks[i];});
    /* localStorage 저장 — 블록 + 제목 함께 */
    try{localStorage.setItem(cacheKey,JSON.stringify({blocks:tlBlocks,_title:translatedTitle}));}catch(ex){}
    /* DOM 반영 */
    var wrap=_dollWrap();
    if(wrap){ wrap.innerHTML=bbDoll(tlBlocks); wrap.classList.add('notranslate'); }
    var titleEl=document.querySelector('.doll-ep-title');
    if(titleEl&&translatedTitle){ titleEl.textContent=translatedTitle; titleEl.classList.add('notranslate'); }
    _dollTlDone();
  }).catch(function(err){
    console.warn('[DeepL Doll]',err);
    if(btn){ _dollBtnReset(btn); btn.style.opacity=''; btn.style.pointerEvents=''; }
  });
}

window.onDollDeepLRe=async function(){
  var lang=_currentLang||'ja';
  var dlLang=(lang==='zh-CN'||lang==='zh-TW')?'ZH':lang.split('-')[0].toUpperCase();
  var cacheKey='dl_doll_'+window._dollEpIdx+'_'+dlLang;
  try{localStorage.removeItem(cacheKey);}catch(ex){}
  var rbtn=_dollRebtn(); if(rbtn) rbtn.style.display='none';
  _dollBtnReset(_dollBtn());
  var wrap=_dollWrap(); if(wrap) wrap.classList.remove('notranslate');
  /* 제목 원본 복원 */
  var titleEl=document.querySelector('.doll-ep-title');
  if(titleEl&&window._dollOrigTitle){ titleEl.textContent=window._dollOrigTitle; titleEl.classList.remove('notranslate'); }
  var cfg=(typeof CONFIG!=='undefined'&&CONFIG.DEEPL)?CONFIG.DEEPL:{};
  var url=cfg.proxyUrl||''; if(!url) return;
  var data=await _fetchStoryData();
  var ep=data.episodes[window._dollEpIdx];
  if(ep) _doDollTranslate(url,cacheKey,ep.blocks||[],ep.title||'',dlLang);
};

/* ── 언어 전환 시 doll DeepL 상태 초기화 ── */
(function(){
  var _orig=typeof setLang==='function'?setLang:null;
  window.setLang=function(lang){
    /* 1. 번역 바 표시/숨김 */
    var bar=document.getElementById('doll-tl-bar');
    if(bar) bar.style.display=(lang&&lang!=='ko')?'flex':'none';

    /* 2. 원본 블록 + 제목 복원 */
    var wrap=_dollWrap();
    if(wrap&&window._dollOrigBlocks&&window._dollOrigBlocks.length){
      wrap.innerHTML=bbDoll(window._dollOrigBlocks);
      wrap.classList.remove('notranslate');
    }
    var titleEl=document.querySelector('.doll-ep-title');
    if(titleEl&&window._dollOrigTitle){ titleEl.textContent=window._dollOrigTitle; titleEl.classList.remove('notranslate'); }

    /* 3. 버튼 상태: 이 언어의 캐시가 있으면 '번역됨', 없으면 리셋 */
    var rbtn=_dollRebtn();
    var dlLang2=(lang==='zh-CN'||lang==='zh-TW')?'ZH':(lang||'').split('-')[0].toUpperCase();
    var hasDollCache=false;
    if(lang&&lang!=='ko'){
      try{ hasDollCache=!!localStorage.getItem('dl_doll_'+window._dollEpIdx+'_'+dlLang2); }catch(e){}
    }
    if(hasDollCache){
      /* 캐시 있음 → 버튼 '번역됨', 재번역 표시 */
      _dollTlDone();
      /* 캐시에서 바로 렌더 */
      try{
        var cached2=localStorage.getItem('dl_doll_'+window._dollEpIdx+'_'+dlLang2);
        if(cached2){
          var obj2=JSON.parse(cached2);
          if(wrap){ wrap.innerHTML=bbDoll(obj2.blocks); wrap.classList.add('notranslate'); }
          if(titleEl&&obj2._title){ titleEl.textContent=obj2._title; titleEl.classList.add('notranslate'); }
        }
      }catch(e){}
    } else {
      /* 캐시 없음 → 버튼 리셋 */
      _dollBtnReset(_dollBtn());
      if(rbtn) rbtn.style.display='none';
    }

    /* 4. 원래 setLang 실행 */
    if(_orig) _orig(lang);

    /* 5. 캐시 없는 경우: Google Translate가 doll 블록을 반드시 재번역하도록 강제
          (_tlCache 히트 시 _tlGoogle 호출 안 됨 → 이걸로 보완) */
    if(lang&&lang!=='ko'&&!hasDollCache){
      setTimeout(function(){
        if(typeof _tlGoogle==='function') _tlGoogle(lang);
      },150);
    }
  };
})();

function renderProgress(){
  function cells(total, done, wip, color){
    return Array.from({length:total},(_,i)=>{
      if(i<done) return `<div class="progress-ep-cell done" style="background:${color}"></div>`;
      if(i<done+wip) return `<div class="progress-ep-cell wip" style="background:${color}"></div>`;
      return `<div class="progress-ep-cell"></div>`;
    }).join("");
  }

  // 블러드하이스쿨 — 3열, 웹소설/웹툰 구분
  const bhProj = PROJECTS.find(p=>p.id==="blood-highschool");
  const bhVols = VOLUMES["blood-highschool"]||[];
  const bhTotalAll = bhVols.reduce((s,v)=>s+v.episodes.length,0);
  const bhDoneAll  = bhVols.reduce((s,v)=>s+v.episodes.filter(e=>e.status==="완료").length,0);

  function bhCard(v){
    const total=v.episodes.length;
    const done=v.episodes.filter(e=>e.status==="완료").length;
    const wip=v.episodes.filter(e=>e.status==="작업중").length;
    return `<div class="progress-vol-card">
      <div class="progress-vol-card-top">
        <span class="progress-vol-card-label">${v.sub||v.label}</span>
        <span class="progress-vol-card-stat">${done}/${total}</span>
      </div>
      <div class="progress-ep-grid">${cells(total,done,wip,bhProj.acc)}</div>
    </div>`;
  }

  const novels  = bhVols.filter(v=>v.type==="웹소설" && v.episodes.length>0);

  function bhSection(label, vols){
    if(!vols.length) return "";
    return `
      <div style="padding:10px 11px 4px;display:flex;align-items:center;gap:8px">
        <span style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--tx3);text-transform:uppercase">${label}</span>
        <div style="flex:1;height:1px;background:var(--bd)"></div>
      </div>
      <div style="padding:4px 9px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        ${vols.map(v=>bhCard(v)).join("")}
      </div>`;
  }

  const bhInner = bhSection("웹소설", novels);

  // biz-OC-doll — 카테고리 카드 (story_editor.json 연동)
  const ocProj = PROJECTS.find(p=>p.id==="biz-oc-doll");
  const dv = VOLUMES["biz-oc-doll"];

  // 파란색: story_editor.json 기준 (done/wip/plan 카운트)
  const storyEps = (window._STORY_DATA && window._STORY_DATA.episodes) || [];
  const statusMap = { done:'완료', wip:'작업중', plan:'예정' };
  const ocCards = dv.categories.map(cat=>{
    const eps = storyEps.filter(e=>e.type===cat.id);
    const total = cat.count;
    const done  = eps.filter(e=>e.status==='done').length;
    const wip   = eps.filter(e=>e.status==='wip').length;
    return `<div class="progress-vol-card">
      <div class="progress-vol-card-top">
        <span class="progress-vol-card-label">${cat.label}</span>
        <span class="progress-vol-card-stat">${done}/${total}</span>
      </div>
      <div class="progress-ep-grid">${cells(total,done,wip,cat.color)}</div>
    </div>`;
  }).join("");

  // 빨간색: 구글시트 OC-characters 기준 (캐릭터 200개 달성)
  const chars = window._CHAR_DATA || [];
  const charDoneCount = chars.filter(c=>c.status==='완료').length;
  const charWipCount  = chars.filter(c=>c.status==='작업중').length;
  const charPct = Math.round(charDoneCount/200*100);
  const charCells = Array.from({length:200},(_,i)=>{
    const num = i+1;
    const c = chars.find(ch=>parseInt((ch.code||'').replace('BIZOCDOLL',''))===num);
    const st = c ? c.status : '';
    if(st==='완료')   return `<div class="progress-ep-cell done" style="background:${ocProj.acc}"></div>`;
    if(st==='작업중') return `<div class="progress-ep-cell wip" style="background:${ocProj.acc}"></div>`;
    return `<div class="progress-ep-cell"></div>`;
  }).join("");

  document.getElementById("content").innerHTML=`
    <div class="progress-page">
      <div class="progress-page-title">진행 현황</div>
      <!-- 주요 집필 프로젝트 위젯 -->

        <div class="progress-proj-block">
          <div class="progress-proj-hd">
            <div class="progress-proj-dot" style="background:${bhProj.acc}"></div>
            <span class="progress-proj-name">${bhProj.label}</span>
            <span class="progress-proj-cnt">${bhDoneAll} / ${bhTotalAll}화</span>
          </div>

        <div class="progress-proj-block">
          <div class="progress-proj-hd">
            <div class="progress-proj-dot" style="background:${ocProj.acc}"></div>

      </div>
    </div>`;

    if(!dateStr) return "";
    const now_=new Date(), d_=new Date(dateStr);

    const diff=now_-d_;
    const min=Math.floor(diff/60000), hr=Math.floor(diff/3600000), day=Math.floor(diff/86400000);

    if(min<60) return `${min}분 전`;
    if(hr<24) return `${hr}시간 전`;
    if(day<30) return `${day}일 전`;

function renderCalendar(){
  const{calY:y,calM:m,calOverview:ov,calTimeline:tl,calSpan:span}=S;
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();

  // 연도 목록
  const curY=new Date().getFullYear();

  // N년씩 보기 버튼
  const spanBtns = [1,2,3].map(n=>`<button class="cal-year-overview-btn${(ov&&!tl&&span===n)?" active":""}" onclick="setCalSpan(${n})">${n}년씩 보기</button>`).join("");

  // 연간 요약 미니캘
  function buildMiniMonth(yr,mo){
    const fd=new Date(yr,mo,1).getDay(), days=new Date(yr,mo+1,0).getDate();
    const _tn=new Date();
    const isCurMo=yr===y&&mo===m;
    let cnt=0;
    let cells="";
    for(let i=0;i<fd;i++) cells+=`<div class="cal-mm-cell"></div>`;
    for(let d=1;d<=days;d++){
      const ds_=ds(yr,mo,d);
      const _entries=WORK_LOG[ds_]||[];
      const hasBH=_entries.some(e=>e.projId==="blood-highschool");
      const hasBiz=_entries.some(e=>e.projId==="biz-oc-doll");
      const hw=hasBH||hasBiz;
      const hwCls=hw?(hasBH&&hasBiz?" hw-both":hasBH?" hw-bh":" hw-biz"):"";
      const isToday=yr===_tn.getFullYear()&&mo===_tn.getMonth()&&d===_tn.getDate();
      if(hw) cnt++;
      cells+=`<div class="cal-mm-cell${hwCls}${isToday?" td":""}">${d}</div>`;
    }
    return`<div class="cal-mini-month${isCurMo?" cur-month":""}" onclick="goMonth(${yr},${mo})">
      <div class="cal-mm-head"><span class="cal-mm-lbl">${mo+1}월</span><span class="cal-mm-count${cnt?" has":""}">${cnt?cnt+"건":"없음"}</span></div>
      <div class="cal-mm-grid">${DNAMES.map((n,i)=>`<div class="cal-mm-dn${i===0?" s":i===6?" sa":""}">${n}</div>`).join("")}${cells}</div>
    </div>`;
  }

  // 멀티 연도 그리드 (span 적용)
  function buildMultiYearGrid(){
    const cols = span > 1 ? 12 : 6;
    const gap  = span > 1 ? 6 : 10;
    let html="";
    for(let offset=0;offset<span;offset++){
      const yr=y+offset;
      html+=`<div style="margin-bottom:${span>1?24:0}px">
        ${span>1?`<div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--bd)">${yr}년</div>`:""}
        <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:${gap}px;margin-bottom:0">${Array.from({length:12},(_,mo)=>buildMiniMonth(yr,mo)).join("")}</div>
      </div>`;
    }
    return html;
  }
  const overviewHtml = buildMultiYearGrid();

    // 해당 범위 연도가 없어도 최소 startY는 표시
    for(let i=startY;i<=endY;i++){
      const s=String(i);

          const g=groups.find(g=>g.key===key);
          if(g){g.entries.push(w);}
          else{groups.push({key,proj:w.proj,volSub:w.volSub||'',volType:w.volType||'',acc:w.acc,status:w.status,projId:w.projId,volId:w.volId,epId:w.epId,dollCatId:w.dollCatId||'',entries:[w]});}
        });
        const chips = groups.length
          ? groups.map(g=>{
              const count=g.entries.length;
              const nav=navCall(g.entries[0]);
              const typeBadge=g.volType==='웹소설'
                ?`<span style="font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#f0f0f0;color:#888;flex-shrink:0">웹소설</span>`
                :g.volType==='웹툰'
                ?`<span style="font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#f0f0f0;color:#888;flex-shrink:0">웹툰</span>`
                :'';
              const volLabel=g.volSub?` ${g.volSub}`:'';
              return`<span class="cal-tl-entry" onclick="${nav}" title="${g.proj}${volLabel} · ${count}화">
                <span class="cal-tl-entry-dot" style="background:${g.acc}"></span>
                ${typeBadge}
                <span class="cal-tl-entry-title">${g.proj}${volLabel}</span>
                <span style="font-size:10px;color:var(--tx3);flex-shrink:0">×${count}화</span>
                <span class="cal-tl-entry-st" style="background:${stBg[g.status]||'#f0f0f0'};color:${stClr[g.status]||'#aaa'}">${g.status}</span>
              </span>`;
            }).join("")
          : `<span class="cal-tl-empty-lbl">—</span>`;
        return`<div class="cal-tl-month-row${moEntries.length===0?" empty":""}${isCurMo?" cur-mo":""}">
          <div class="cal-tl-month-label">${mo+1}월</div>
          <div class="cal-tl-entries">${chips}</div>
        </div>`;
      });
      return { yearCount, months };
    };

    let body;
    if(span === 1){
      const yr = years[0];
      const { yearCount, months } = buildYearHtml(yr);
      body = `<div class="cal-tl-year-block">
        <div class="cal-tl-year-hd">

    } else {
      // span > 1: 연도별로 좌우 나란히 배치
      const cols = years.map(yr=>{
        const { yearCount, months } = buildYearHtml(yr);
        return `<div class="cal-tl-year-col">
          <div class="cal-tl-year-hd" style="padding:0 0 14px 0;margin-bottom:0;display:flex;align-items:center;gap:10px">
            <span class="cal-tl-year-label">${yr}</span>

        </div>`;
      }).join("");
      body = `<div class="cal-tl-multi-grid" style="grid-template-columns:repeat(${span},1fr)">${cols}</div>`;
    }

    return `<div class="cal-timeline">${tlHeader}${body}</div>`;
  }

  // 월간 뷰
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++){const ds_=ds(y,m,d);cells.push({d,work:WORK_LOG[ds_]||[],dow:(firstDay+d-1)%7});}
  const cellsHtml=cells.map(c=>{

    let cls="cal-cell";

  }).join("");
  const recent=Object.entries(WORK_LOG).flatMap(([date,ws])=>ws.map(w=>({date,...w}))).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  const selDs=S.selDay?ds(y,m,S.selDay):null,selWork=selDs?(WORK_LOG[selDs]||[]):[];

        <div style="flex:1;min-width:220px;max-width:480px;align-self:center">

      </div>
      ${(ov&&!tl) ? `

        <div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="cal-nav-btn" onclick="prevOverviewYear()" ${_atMinOv?'disabled style="opacity:.3;cursor:default;pointer-events:none"':''}>&#8249;</button>
          <span style="font-size:16px;font-weight:700;color:var(--tx);min-width:${span>1?'150px':'72px'};text-align:center">
            ${span===1?`${y}년`:`${y}년 ~ ${y+span-1}년`}
          </span>
          <button class="cal-nav-btn" onclick="nextOverviewYear()" ${_atMaxOv?'disabled style="opacity:.3;cursor:default;pointer-events:none"':''}>&#8250;</button>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <div style="position:relative;display:inline-block" id="span-dropdown-wrap">
            <button onclick="toggleSpanDropdown()" style="display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--sb);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s" onmouseover="this.style.borderColor='var(--bd2)'" onmouseout="this.style.borderColor='var(--bd)'">

              ${[1,2,3].map(n=>`<button onclick="setCalSpan(${n})" style="display:block;width:100%;padding:9px 16px;border:none;background:${n===span?'var(--bg)':'transparent'};color:${n===span?'var(--tx)':'var(--tx2)'};font-size:12px;font-weight:${n===span?700:400};text-align:left;cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='${n===span?'var(--bg)':'transparent'}'">

    let lastScrollY = 0, ticking = false, hidden = false;

    function _applyHide(doHide){
      if(hidden === doHide) return;
      hidden = doHide;
      const bar = document.getElementById("content-topbar");
      const sp  = document.getElementById("content-topbar-spacer");
      const fep = document.getElementById("float-ep-nav");

        topbarEl.style.transform = "";
        if(bar) bar.style.transform = "";
        contentEl.style.marginTop = "48px";
        contentEl.style.height = "calc(100dvh - 48px)";
        if(sp) sp.style.height = ctbH+"px";
        if(fep) fep.classList.add("visible");
      }
    }

    function _onMobScroll(){
      // 매 스크롤마다 모바일 여부 재확인 — 데스크탑에선 즉시 리셋 후 종료
      if(window.innerWidth > 768){
        _applyHide(false);
        ticking = false;
        return;
      }
      const st = contentEl.scrollTop;
      if(st > lastScrollY && st > 60)    _applyHide(true);
      else if(st < lastScrollY - 10)     _applyHide(false);
      lastScrollY = st <= 0 ? 0 : st;
      ticking = false;
    }
    contentEl._mobScrollHandler = function(){
      if(!ticking){ requestAnimationFrame(_onMobScroll); ticking=true; }
    };
    contentEl.addEventListener("scroll", contentEl._mobScrollHandler, {passive:true});
  })();
}

/* ── 에피소드 언어별 경로 자동 생성 ── */
function _resolveEpPath(projId, volId, epId, lang){
  const base = `${projId}-${volId}-${String(epId).padStart(2,'0')}`;
  if(lang === 'pure_ko') return `./texts_pure_ko/${base}_pure_ko.txt`;
  if(lang === 'jp')      return `./texts_jp/${base}_jp.txt`;
  return `./texts/${base}.txt`; // 기본: 한본어
}

function setEpLang(lang){
  S.epLang = lang;
  // 버튼 활성 상태 업데이트
  document.querySelectorAll('.ep-lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  // 본문 즉시 리로드
  const proj = getProj(S.activeProj);
  const epPath = _resolveEpPath(S.activeProj, S.activeVol, S.activeEp, lang);
  _loadPostypeContent(epPath, proj.acc);
}

async function _loadPostypeContent(textId, acc){
  const el = document.getElementById("postype-body");
  if(!el) return;
  if(!textId){
    el.innerHTML = '<div class="postype-hint">본문 파일이 없습니다.<br><small style="color:#bbb">레포의 <code>texts/</code> 폴더에 해당 txt 파일을 올려주세요.</small></div>';
    return;
  }
  try{
    const text = await fetchEpText(textId);
    _epOriginalLines = text.split('\n'); /* ← 원본 줄 배열 저장 */
    el.innerHTML = `<div class="postype-text notranslate">${text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}</div>`;
    /* 언어 선택 상태면 DeepL 버튼 표시 (자동번역 아님) */
    if(_currentLang && _currentLang !== 'ko'){
      var cfg = (typeof CONFIG !== 'undefined' && CONFIG.DEEPL) ? CONFIG.DEEPL : {};
      if(cfg.enabled && cfg.proxyUrl){
        _updateEpLangBtns(_currentLang);
        _tlShowDeepLBtn(_currentLang, cfg);
      }
    }
  } catch(err){
    el.innerHTML = `<div class="postype-error"><strong>본문 파일을 찾을 수 없습니다</strong><br><small style="color:#a03030">${textId}</small><br><pre>${err.message}</pre></div>`;
  }
}

function buildVolNav(proj, vol){
  // doll은 볼륨 구조가 없으므로 스킵
  const allVols = VOLUMES[proj.id] || [];
  if(!Array.isArray(allVols)) return '';
  const sameType = allVols.filter(v => v.type === vol.type);
  const idx = sameType.findIndex(v => v.id === vol.id);
  const prev = sameType[idx - 1] || null;
  const next = sameType[idx + 1] || null;
  const hasPrev = !!prev, hasNext = !!next;

  // 목록 아이템
  const items = sameType.map(v => {
    const isCur = v.id === vol.id;
    return `<div class="vol-picker-item${isCur?' current':''}" style="--vpick-acc:${proj.acc}"
      onclick="goVol('${proj.id}','${v.id}');closeVolPicker()">
      <span class="vol-picker-label">${v.label||v.sub}</span>
      <span class="vol-picker-type">${v.type}</span>
    </div>`;
  }).join('');

  const modal = `<div id="vol-picker-modal" class="vol-picker-modal hidden" onclick="if(event.target===this)closeVolPicker()">
    <div class="vol-picker-inner">
      <div class="vol-picker-hd">
        <span class="vol-picker-title">${vol.type} 목록</span>
        <button class="vol-picker-close" onclick="closeVolPicker()">&#10005;</button>
      </div>
      <div class="vol-picker-list">${items}</div>
    </div>
  </div>`;

  const bar = `<div class="vol-nav-outer">
    ${modal}
    <div class="vol-nav-bar">
      <button class="vol-nav-btn prev${hasPrev?'':' disabled'}"
        onclick="${hasPrev?`goVol('${proj.id}','${prev.id}')`:''}" >
        <span>&#8592;</span>
        <span class="vol-nav-btn-title">${hasPrev ? (prev.sub||prev.label) : '이전권 없음'}</span>
      </button>
      <button class="vol-list-btn" onclick="openVolPicker()">
        목록 <span style="font-size:10px;opacity:.7">${idx+1} / ${sameType.length}</span> &#9660;
      </button>
      <button class="vol-nav-btn next${hasNext?'':' disabled'}" style="justify-self:end"
        onclick="${hasNext?`goVol('${proj.id}','${next.id}')`:''}" >
        <span class="vol-nav-btn-title">${hasNext ? (next.sub||next.label) : '다음권 없음'}</span>
        <span>&#8594;</span>
      </button>
    </div>
  </div>`;

  return bar;
}

async function loadEpDataFromSheets(){
  try{
    // 시트 이름으로 직접 fetch — gid 불필요
    const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=episodes`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("CSV fetch 실패 " + res.status);
    const csv = await res.text();

    // CSV 파싱
    const rows = csv.trim().split("\n").map(r=>{
      // 쉼표 구분, 큰따옴표 처리
      const cols=[];let cur="",inQ=false;
      for(const ch of r){
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.trim());cur="";}
        else cur+=ch;
      }
      cols.push(cur.trim());
      return cols;
    });
    if(rows.length < 2) return false;

    // 프로젝트 이름 → ID 매핑
    const projMap = {
      "블러드하이스쿨": "blood-highschool",
      "biz-OC-doll":    "biz-oc-doll",
      "biz-oc-doll":    "biz-oc-doll",
    };

    // 날짜 정규화
    function normalizeDate(v){
      if(!v) return null;
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = v.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
      return null;
    }

    // 데이터 파싱 (1행 헤더 건너뜀)
    // 시트 구조: A=프로젝트 B=종류 C=권수 D=N화 E=상태 F=날짜 (왼쪽)
    //           G=프로젝트 H=종류 I=권수 J=N화 K=상태 L=날짜 (오른쪽)
    function applyRow(p,t,vn,en,s,d){
      const volNum=parseInt(vn), epId=parseInt(en);
      if(!p||isNaN(volNum)||isNaN(epId)) return;
      const pid=projMap[p]; if(!pid) return;
      const vols=VOLUMES[pid]; if(!Array.isArray(vols)) return;
      const vol=vols.find(v=>v.type===t&&v.num===volNum); if(!vol) return;
      const ep=vol.episodes.find(e=>e.id===epId); if(!ep) return;
      if(s) ep.status=s;
      const nd=normalizeDate(d); if(nd) ep.date=nd;
    }
    rows.slice(1).forEach(row=>{
      applyRow((row[0]||'').trim(),(row[1]||'').trim(),(row[2]||'').trim(),(row[3]||'').trim(),(row[4]||'').trim(),(row[5]||'').trim());
      if((row[6]||'').trim()) applyRow((row[6]||'').trim(),(row[7]||'').trim(),(row[8]||'').trim(),(row[9]||'').trim(),(row[10]||'').trim(),(row[11]||'').trim());
    });

    return true;
  }catch(e){
    console.warn("Sheets CSV 불러오기 실패:", e.message);
    return false;
  }
}

/* ── 캐릭터 시트 불러오기 (OC-characters 탭 CSV) ── */
async function loadCharDataFromSheets(){
  try{
    const _csvFn = (typeof SHEET_CSV === 'function')
      ? SHEET_CSV
      : (t => `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(t)}`);
    const url = _csvFn('OC-characters');
    const res = await fetch(url);
    if(!res.ok) throw new Error('CSV fetch 실패 ' + res.status);
    const csv = await res.text();

    // CSV 파싱 (쉼표+따옴표 처리)
    const rows = csv.trim().split('\n').map(r=>{
      const cols=[]; let cur='', inQ=false;
      for(const ch of r){
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
        else cur+=ch;
      }
      cols.push(cur.trim());
      return cols;
    });
    if(rows.length < 2) return false;

    // 헤더: code / type / holder / status / updated
    window._CHAR_DATA = rows.slice(1).map(r=>({
      code:    (r[0]||'').trim(),
      type:    (r[1]||'').trim(),
      holder:  (r[2]||'').trim(),
      status:  (r[3]||'').trim(),
      updated: (r[4]||'').trim(),
    })).filter(c=>c.code);

    return true;
  }catch(e){
    console.warn('캐릭터 CSV 불러오기 실패:', e.message);
    return false;
  }
}

/* ── 캐릭터 updated 날짜 → WORK_LOG 주입 ── */
function injectCharDatesIntoWorkLog(){
  const chars = window._CHAR_DATA || [];
  const dollProj = PROJECTS.find(p=>p.id==='biz-oc-doll');
  const acc = dollProj ? dollProj.acc : '#5a90b0';
  // 기존 char 항목 제거 (중복 방지)
  Object.keys(WORK_LOG).forEach(k=>{
    WORK_LOG[k] = WORK_LOG[k].filter(w=>!w.isChar);
    if(!WORK_LOG[k].length) delete WORK_LOG[k];
  });
  chars.forEach(c=>{
    if(!c.updated) return;
    // 날짜 정규화: "2026. 4. 9." → "2026-04-09"
    let dateStr = c.updated;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)){
      const mm = dateStr.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if(!mm) return;
      dateStr = `${mm[1]}-${mm[2].padStart(2,'0')}-${mm[3].padStart(2,'0')}`;
    }
    if(!WORK_LOG[dateStr]) WORK_LOG[dateStr] = [];
    WORK_LOG[dateStr].push({
      proj: 'biz-OC-doll',
      title: c.code,
      status: c.status || '완료',
      acc,
      projId: 'biz-oc-doll',
      isChar: true,
      charCode: c.code,
    });
  });
}

// ══════════════════════════════════════════════
//  # HASH NAVIGATION — history.pushState 방식
//  pushState는 이벤트를 발생시키지 않으므로
//  메뉴 동작과 100% 충돌 없음
// ══════════════════════════════════════════════

function stateToHash(){
  const v = S.view;
  if(v === 'home')       return '#home';
  if(v === 'about')      return '#about';
  if(v === 'archive')    return '#proj/biz-oc-doll/archive';
  if(v === 'event')      return '#proj/biz-oc-doll/event';
  if(v === 'progress')   return '#progress';
  if(v === 'calendar'){
    if(S.calTimeline) return `#calendar/${S.calY}/timeline`;
    if(S.calOverview) return `#calendar/${S.calY}/overview`;
    return `#calendar/${S.calY}/${S.calM+1}`;
  }
  if(v === 'charlist')   return '#proj/biz-oc-doll/chars';
  if(v === 'intro')      return `#proj/${S.activeProj}/intro`;
  if(v === 'episodes'){
    if(S.activeProj === 'biz-oc-doll' && S.activeDollCat)
      return `#proj/biz-oc-doll/doll/${S.activeDollCat}`;
    return `#proj/${S.activeProj}/eps/${S.activeVol}`;
  }
  if(v === 'story')         return '#proj/biz-oc-doll/story';
  if(v === 'story-content'){
    const _TYPE_SLUG = {main:'main_story', sub:'sub_story', event:'event'};
    const _eps = _storyData ? (_storyData.episodes||[]) : [];
    const _ep = S.activeStoryEp !== null ? _eps[S.activeStoryEp] : null;
    if(_ep && _ep.type && _ep.num){
      const slug = _TYPE_SLUG[_ep.type] || _ep.type;
      return `#proj/biz-oc-doll/${slug}/ep/${_ep.num}`;
    }
    return `#proj/biz-oc-doll/story/ep/${S.activeStoryEp}`;
  }
  if(v === 'content'){
    if(S.activeProj === 'biz-oc-doll')
      return `#proj/biz-oc-doll/dolleep/${S.activeDollCat}/${S.activeEp}`;
    return `#proj/${S.activeProj}/ep/${S.activeVol}/${S.activeEp}`;
  }
  return '#home';
}

function applyHash(hash){
  if(!hash || hash === '#' || hash === '#home'){
    S.view='home';S.activeProj=null;S.activeVol=null;S.activeEp=null;S.activeDollCat=null;S.activeChar=null;
    return;
  }
  const parts = hash.replace(/^#/,'').split('/');
  const p0 = parts[0];
  if(p0 === 'story'){
    if(parts[1]==='ep' && parts[2]!=null){ S.view='story-content'; S.activeStoryEp=parseInt(parts[2]); return; }
    S.view='story'; S.activeStoryEp=null; return;
  }
  if(p0 === 'about'){ S.view='about'; return; }
  if(p0 === 'calendar'){
    S.view='calendar';
    if(parts[1]) S.calY = parseInt(parts[1]);
    if(parts[2] === 'overview'){ S.calOverview=true; S.calTimeline=false; }
    else if(parts[2] === 'timeline'){ S.calTimeline=true; S.calOverview=false; }
    else if(parts[2]){ S.calM=parseInt(parts[2])-1; S.calOverview=false; S.calTimeline=false; }
    return;
  }
  if(p0 === 'progress') { S.view='progress'; return; }
  if(p0 === 'proj'){
    const pid = parts[1]; S.activeProj = pid;
    const sub = parts[2];
    if(sub === 'intro')   { S.view='intro'; return; }
    if(sub === 'eps')     { S.activeVol=parts[3]; S.activeEp=null; S.view='episodes'; return; }
    if(sub === 'doll')    { S.activeDollCat=parts[3]; S.activeEp=null; S.view='episodes'; return; }
    if(sub === 'ep')      { S.activeVol=parts[3]; S.activeEp=parseInt(parts[4]); S.view='content'; return; }
    if(sub === 'dolleep') { S.activeDollCat=parts[3]; S.activeEp=parseInt(parts[4]); S.view='content'; return; }
    if(sub === 'chars')   { S.view='charlist'; return; }
    if(sub === 'archive') { S.view='archive'; return; }
    if(sub === 'event')   { S.view='event'; return; }
    if(sub === 'story'){
      if(parts[3]==='ep' && parts[4]!=null){ S.view='story-content'; S.activeStoryEp=parseInt(parts[4]); S._storyType=null; S._storyNum=null; return; }
      S.view='story'; S.activeStoryEp=null; return;
    }
    // type+num 방식: main_story/ep/1-1, sub_story/ep/1-1, event/ep/1-1
    const _TYPE_REV = {main_story:'main', sub_story:'sub', event:'event'};
    if(_TYPE_REV[sub] && parts[3]==='ep' && parts[4]!=null){
      S.view='story-content';
      S.activeStoryEp=null;
      S._storyType=_TYPE_REV[sub];
      S._storyNum=parts[4];
      return;
    }
  }
  S.view='home';S.activeProj=null;S.activeVol=null;S.activeEp=null;S.activeDollCat=null;S.activeChar=null;
}

// pushState는 이벤트를 발생시키지 않으므로 메뉴에 영향 없음
// iframe(Claude 미리보기) 등 제한 환경에서는 try-catch로 무시
function pushHash(){
  try {
    history.pushState(null, '', stateToHash());
  } catch(e){}
}

// 뒤로가기/앞으로가기 버튼 — popstate만 감지 (hashchange 아님)
window.addEventListener('popstate', function(){
  applyHash(location.hash);
  closeMobMenu();
  render();
});

// ── 시작: URL 해시가 있으면 해당 상태로 복원, 없으면 홈 ──
if(location.hash && location.hash.length > 1){
  try { applyHash(location.hash); } catch(e){}
}
render();
loadEpDataFromSheets().then(ok=>{
  if(ok){ rebuildWorkLog(); render(); }
});
loadCharDataFromSheets().then(ok=>{
  if(ok){ injectCharDatesIntoWorkLog(); render(); }
});
loadStoryData().then(ok=>{
  if(ok) render();
});

function rebuildWorkLog(){
  Object.keys(WORK_LOG).forEach(k=>delete WORK_LOG[k]);
  buildWorkLog();
  injectCharDatesIntoWorkLog();
}

/* ── 모바일 스와이프 드로어 제스처 ── */
(function(){
  const EDGE_ZONE  = 250;   // 화면 왼쪽 가장자리에서 스와이프 시작 인식 범위(px)
  const OPEN_DIST  = 55;   // 열기 확정 최소 이동거리(px)
  const CLOSE_DIST = 55;   // 닫기 확정 최소 이동거리(px)
  const VEL_THRESH = 0.35; // 빠른 플릭 속도 임계값(px/ms)

  let startX=0, startY=0, lastX=0, lastT=0;
  let dragging=false, openDrag=false;

  function getMob(){ return document.getElementById('mob-menu'); }
  function getBd(){  return document.getElementById('mob-backdrop'); }
  function isMenuOpen(){ return getMob().classList.contains('open'); }

  function setRawTransform(px){
    const mob = getMob();
    const w   = mob.scrollWidth || 130;
    const clamped = Math.min(0, Math.max(-w, px));
    mob.style.transition = 'none';
    mob.style.transform  = 'translateX('+clamped+'px)';
  }

  function snapOpen(){
    const mob=getMob(), bd=getBd();
    mob.style.transition=''; mob.style.transform='';
    renderMobMenu();
    if(S.lastMobProj){
      mobShowSub(S.lastMobProj);
    } else {
      mob.classList.remove('show-sub');
    }
    mob.classList.add('open');
    if(bd) bd.classList.add('show');
    var ez=document.getElementById('swipe-edge-zone');
    if(ez) ez.style.pointerEvents='none';
  }

  function snapClose(){
    const mob=getMob();
    mob.style.transition=''; mob.style.transform='';
    closeMobMenu();
  }

  function snapRestore(){
    const mob=getMob();
    mob.style.transition=''; mob.style.transform='';
  }

  document.addEventListener('touchstart', function(e){
    if(window.innerWidth > 768) return;
    var t = e.touches[0];
    startX = lastX = t.clientX;
    startY = t.clientY;
    lastT  = Date.now();
    dragging  = false;
    openDrag  = false;

    if(!isMenuOpen() && t.clientX <= EDGE_ZONE){
      openDrag = true;
      // 인라인 스타일은 실제 드래그가 확인될 때(touchmove)까지 건드리지 않음
    }
  }, {passive:true});

  document.addEventListener('touchmove', function(e){
    if(window.innerWidth > 768) return;
    var t   = e.touches[0];
    var dx  = t.clientX - startX;
    var dy  = t.clientY - startY;

    if(!dragging){
      if(Math.abs(dy) > Math.abs(dx) + 6) return;
      if(openDrag  && dx >  6){ 
        dragging=true;
        // 드래그 확정 시점에 인라인 스타일 설정
        var mob2=getMob();
        mob2.style.transition='none';
        mob2.style.pointerEvents='none';
      }
      else if(isMenuOpen() && dx < -6){ dragging=true; }
      else return;
    }

    lastX = t.clientX;
    lastT = Date.now();

    var mob = getMob();
    var w   = mob.scrollWidth || 130;
    if(!isMenuOpen()){
      setRawTransform(-w + dx);
      mob.style.pointerEvents='none';
    } else {
      setRawTransform(Math.min(0, dx));
    }
  }, {passive:true});

  document.addEventListener('touchend', function(e){
    if(window.innerWidth > 768) return;
    if(!dragging){
      // touchstart가 인라인 스타일을 설정했을 수 있으므로 반드시 초기화
      var mob=getMob();
      mob.style.transform='';
      mob.style.transition='';
      mob.style.pointerEvents='';
      dragging=false; openDrag=false;
      return;
    }

    var dx  = lastX - startX;
    var dt  = Date.now() - lastT + 1;
    var vel = Math.abs(dx) / dt;
    var mob = getMob();
    mob.style.pointerEvents='';

    if(!isMenuOpen()){
      if(dx >= OPEN_DIST || (dx > 10 && vel >= VEL_THRESH)){
        snapOpen();
      } else {
        snapClose();
      }
    } else {
      if(-dx >= CLOSE_DIST || (-dx > 10 && vel >= VEL_THRESH)){
        snapClose();
      } else {
        snapRestore();
      }
    }
    dragging=false; openDrag=false;
  }, {passive:true});

  document.addEventListener('touchcancel', function(){
    if(!dragging) return;
    var mob=getMob();
    mob.style.pointerEvents='';
    snapRestore();
    dragging=false; openDrag=false;
  }, {passive:true});
})();

/* ── 번역/저작권 안내 접기 ── */
(function(){
  var STORE_KEY='rrkt_notice_open';

  function isOpen(){
    return localStorage.getItem(STORE_KEY)!=='false';
  }

  function applyState(){
    var body=document.getElementById('noticeBody');
    var chev=document.getElementById('noticeChevron');
    var card=document.getElementById('noticeCard');
    var wrap=document.querySelector('.home-trans-notice-wrap');
    var btn=document.getElementById('noticeToggle');
    if(!body) return;
    if(isOpen()){
      card && card.classList.remove('notice-collapsed');
      if(wrap) wrap.style.marginBottom='18px';
      if(btn)  { btn.style.top='-11px'; btn.classList.remove('expanded'); }
      body.style.maxHeight='';
      if(chev) chev.style.transform='';
    } else {
      body.style.maxHeight='0';
      if(chev) chev.style.transform='rotate(180deg)';
      setTimeout(function(){
        card && card.classList.add('notice-collapsed');
        if(wrap) wrap.style.marginBottom='-20px';
        if(btn)  { btn.style.top='-65px'; btn.classList.add('expanded'); }
      },0);
    }
  }

  window._applyNoticeState=applyState;

  window.toggleNotice=function(){
    var body=document.getElementById('noticeBody');
    var chev=document.getElementById('noticeChevron');
    var card=document.getElementById('noticeCard');
    var wrap=document.querySelector('.home-trans-notice-wrap');
    var btn=document.getElementById('noticeToggle');

    var opening=!isOpen();
    localStorage.setItem(STORE_KEY, opening);
    if(opening){
      card && card.classList.remove('notice-collapsed');
      if(wrap) wrap.style.marginBottom='18px';
      if(btn)  { btn.style.top='-11px'; btn.classList.remove('expanded'); }
      body.style.maxHeight='';
      if(chev) chev.style.transform='';
    } else {
      body.style.maxHeight='0';
      if(chev) chev.style.transform='rotate(180deg)';
      card && card.classList.add('notice-collapsed');
      if(wrap) wrap.style.marginBottom='-20px';
      if(btn)  { btn.style.top='-65px'; btn.classList.add('expanded'); }
    }
  };
})();
