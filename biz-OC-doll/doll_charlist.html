<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biz-OC-doll · 캐릭터 일람</title>
<script src="../config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">

</head>
<body>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--sb:#fff;--bd:#e2e2e2;--bd2:#c6c6c6;
  --tx:#1a1a1a;--tx2:#5f5f5f;--tx3:#a0a0a0;
  --fn:'Inter','Noto Sans KR',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── TOP BAR ── */
.top-bar{padding:10px 20px;background:var(--sb);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;flex-wrap:nowrap;min-width:0}
.tb-back{background:transparent;border:none;color:var(--tx3);font-size:12px;padding:4px 8px;border-radius:5px;transition:all .12s;font-family:var(--fn);white-space:nowrap;flex-shrink:0}
.tb-back:hover{background:var(--bg);color:var(--tx)}
.tb-sep{width:1px;height:14px;background:var(--bd);flex-shrink:0}
.tb-crumb{font-size:10px;font-weight:500;color:var(--tx3);white-space:nowrap;flex-shrink:0}
.tb-arr{font-size:10px;color:var(--bd2);flex-shrink:0}
.tb-cur{font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.tb-crumbs-mid{display:inline-flex;align-items:center;gap:8px;flex-shrink:1;min-width:0}
@media(max-width:520px){.tb-crumbs-mid{display:none}}

/* ── CHAR LIST ── */
.char-page{padding:14px 24px 80px}
.char-filter-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:nowrap;overflow:visible;}
.char-filter-tabs{display:flex;gap:0;background:var(--sb);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.char-tab{padding:8px 16px;background:transparent;border:none;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-right:1px solid var(--bd);transition:all .12s}
.char-tab:last-child{border-right:none}
.char-tab:hover{background:var(--bg);color:var(--tx)}
.char-tab.active{background:#5a90b0;color:#fff;font-weight:700}
.char-search{flex:1;min-width:100px;max-width:180px;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:var(--fn);background:var(--sb);color:var(--tx);outline:none;transition:border-color .12s}
.char-search:focus{border-color:var(--bd2)}
.char-count{font-size:11px;color:var(--tx3);white-space:nowrap}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.char-card{cursor:pointer;text-align:center}
.char-card:hover .char-thumb{box-shadow:0 2px 10px #0002;transform:translateY(-2px)}
.char-thumb{width:100%;aspect-ratio:1;border-radius:8px;border:1px solid var(--bd);overflow:hidden;transition:transform .14s,box-shadow .14s;display:flex;align-items:center;justify-content:center;position:relative;background:#d8d8d8}
.char-thumb-inner{width:100%;height:100%;filter:grayscale(1);opacity:.6}
.char-thumb-face{width:100%;height:100%}
.char-like-overlay{position:absolute;top:6px;right:6px;z-index:2;background:transparent;border:1.5px solid rgba(255,255,255,0.8);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;line-height:1;transition:all .15s;padding:0;padding-top:1.5px;color:rgba(255,255,255,0.15);-webkit-text-stroke:1.2px rgba(255,255,255,0.85)}
.char-like-overlay:hover{border-color:#fff;transform:scale(1.1);color:rgba(255,255,255,0.2);-webkit-text-stroke:1.2px #fff}
.char-like-overlay.liked{border-color:rgba(255,255,255,0.4);color:#f43f5e;-webkit-text-stroke:0px}
.char-name-row{display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:5px;gap:1px}
.char-code-prefix{font-size:9px;font-weight:400;color:var(--tx3);font-family:'Inter',monospace;letter-spacing:.5px}
.char-code{font-size:13px;font-weight:600;color:var(--tx);font-family:'Inter',monospace;letter-spacing:.5px}
.char-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.char-empty{grid-column:1/-1;padding:48px 0;text-align:center;font-size:12px;color:var(--tx3)}
.char-sort-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;background:var(--sb);border:1px solid var(--bd);border-radius:8px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--fn)}
.char-sort-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.char-sort-btn.asc .sort-arrow{display:inline-block;transform:scaleY(-1)}
.sort-arrow{display:inline-block;font-size:10px;transition:transform .15s}
.char-tab.liked-tab{letter-spacing:.5px}
.sort-dropdown-wrap{position:relative;display:inline-flex}
.sort-dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--sb);border:1px solid var(--bd);border-radius:8px;overflow:hidden;z-index:50;min-width:100px;box-shadow:0 4px 16px #0001}
.sort-dropdown-menu.open{display:block}
.sort-dropdown-item{display:block;width:100%;padding:8px 14px;font-size:12px;font-weight:500;color:var(--tx2);background:transparent;border:none;cursor:pointer;text-align:left;font-family:var(--fn);transition:background .1s}
.sort-dropdown-item:hover{background:var(--bg);color:var(--tx)}
.sort-dropdown-item.active{color:var(--tx);font-weight:700}

/* ── SHEET ACTION BTNS ── */
.sheet-action-btns{margin-left:auto;display:flex;flex-direction:column;gap:7px;align-self:center}
.sheet-action-btn{display:inline-flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px;background:transparent;border:1px solid var(--bd);border-radius:8px;font-size:12px;font-weight:500;color:var(--tx2);font-family:var(--fn);cursor:pointer;transition:all .12s;min-width:120px;letter-spacing:.3px}
.sheet-action-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.sheet-action-btn svg{width:13px;height:13px;flex-shrink:0;opacity:.45;transition:opacity .12s}
.sheet-action-btn:hover svg{opacity:.8}

/* ── CHAR DETAIL ── */
.sheet-wrap{max-width:800px;margin:0 auto;padding:32px 32px 48px;transition:max-width .2s}
.detail-overlay-inner.wide .sheet-wrap{max-width:1080px}
.sheet-meta-right{font-size:10px;color:var(--tx3);letter-spacing:.5px;margin-left:auto;align-self:flex-end}

/* 헤더 행: 썸네일 + 텍스트 */
.sheet-header-row{display:flex;align-items:center;gap:20px;padding-bottom:20px;margin-bottom:24px}
.sheet-thumb{width:80px;height:80px;border-radius:10px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0}
.sheet-thumb-inner{width:100%;height:100%;filter:grayscale(1);opacity:.7}
.sheet-header-text{display:flex;flex-direction:column;gap:6px}
.sheet-info-label{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.sheet-info-code{font-size:28px;font-weight:400;color:var(--tx);font-family:'Share Tech Mono',monospace;letter-spacing:1px;line-height:1}
.sheet-holder-block{padding:12px 20px;display:flex;flex-direction:column;gap:6px;align-self:center}
.sheet-holder-label{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.sheet-holder-value{font-size:20px;font-weight:400;color:var(--tx);font-family:'Share Tech Mono',monospace}

/* 시트 슬롯 */
.sheet-slot{min-height:320px;border:1px dashed var(--bd2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.sheet-slot.has-image{border:none;min-height:0;border-radius:0}
.sheet-hint-icon{font-size:22px;opacity:.15}
.sheet-hint-text{font-size:10px;color:var(--tx3);line-height:1.8;text-align:center}

/* ── EP NAV ── */
.ep-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 24px;border-top:1px solid var(--bd);background:var(--sb)}
.ep-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx2);font-size:12px;font-weight:500;transition:all .12s;min-width:0;max-width:260px}
.ep-nav-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.ep-nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.ep-nav-btn:first-child{justify-self:start}
.ep-nav-btn:last-child{justify-self:end}
.ep-nav-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PAGE SECTIONS ── */
#list-view{display:block}
#detail-view{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.45);overflow-y:auto}
.detail-overlay-inner{background:var(--bg);margin:40px auto;max-width:800px;border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.18);transition:max-width .2s}
.detail-overlay-inner.wide{max-width:1080px}

/* ── ARCHIVE OVERLAY ── */
#archive-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);align-items:center;justify-content:center}
#archive-overlay.open{display:flex}
.archive-modal{width:min(92vw,960px);height:min(90vh,800px);background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,0.25);display:flex;flex-direction:column;position:relative}
.archive-modal-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#faf9fb;border-bottom:1px solid #e8e2f0;flex-shrink:0}
.archive-modal-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#a07ac8;text-transform:uppercase;flex:1}
.archive-modal-code{font-size:11px;font-family:'Share Tech Mono',monospace;color:#6a4a90;background:rgba(160,122,200,0.1);padding:3px 10px;border-radius:100px;letter-spacing:.5px}
.archive-modal-close{width:26px;height:26px;border-radius:50%;border:1px solid #e0d8ec;background:transparent;color:#a07ac8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--fn)}
.archive-modal-close:hover{background:#f0e8f8;color:#7040a0}
.archive-modal iframe{flex:1;border:none;width:100%;height:100%;display:block}

/* ── MOBILE ── */
@media(max-width:600px){
  .detail-overlay-inner{margin:0;border-radius:0;min-height:100vh}
  .sheet-wrap{padding:20px 16px 32px}
}

/* ── CASSETTE NAV ARROWS ── */
.cassette-nav-arrow{
  display:flex;align-items:center;justify-content:center;
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:72px;
  background:transparent;border:none;padding:0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  z-index:5;
}
.cassette-nav-arrow.prev{left:8px}
.cassette-nav-arrow.next{right:8px}
.cassette-nav-arrow svg{filter:drop-shadow(2px 0 6px rgba(0,0,0,0.28)) drop-shadow(0 2px 4px rgba(0,0,0,0.18))}
.cassette-nav-arrow.next svg{filter:drop-shadow(-2px 0 6px rgba(0,0,0,0.28)) drop-shadow(0 2px 4px rgba(0,0,0,0.18))}
.cassette-nav-arrow.disabled{opacity:0;pointer-events:none}

/* ── WIDTH CONTROL ── */
.char-page-inner{max-width:720px;margin:0 auto;transition:max-width .2s}
.char-page-inner.wide{max-width:none}
.width-toggle-btn{margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:var(--sb);border:1px solid var(--bd);border-radius:7px;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--fn);flex-shrink:0}
.width-toggle-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}

/* ── HERO ── */
.hero{background:#fff;padding:44px 24px 0px;text-align:center;position:relative;overflow:visible;}
.hero-label{font-size:10px;font-weight:700;letter-spacing:3px;color:#5a90b0;text-transform:uppercase;margin-bottom:10px;position:relative;z-index:2;}
.hero-title{font-size:clamp(20px,3.5vw,30px);font-weight:100;color:#3a6a88;letter-spacing:0.22em;line-height:1.1;margin-bottom:10px;font-family:'Josefin Sans',sans-serif;position:relative;z-index:2;}
.hero-title-row{display:inline-flex;align-items:center;gap:10px;position:relative;z-index:2;margin-bottom:0;}
</style>

<!-- ── LIST VIEW ── -->
<div id="list-view">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">BIZ-OC-DOLL · CHARACTERS</div>
    <div class="hero-title-row">
      <span class="hero-title">CHARACTERS</span>
    </div>
  </div>
  <div class="char-page">
    <div class="char-page-inner" id="char-page-inner">
    <div class="char-filter-row">
      <div class="char-filter-tabs" id="filter-tabs"></div>
      <input class="char-search" type="text" placeholder="코드 검색..." id="char-search-input" oninput="setSearch(this.value)" />
      <div class="sort-dropdown-wrap" id="sort-dropdown-wrap">
        <button class="char-sort-btn" id="sort-btn" onclick="toggleSortMenu()" title="정렬 순서 변경">
          <span class="sort-arrow">↓</span>
          <span id="sort-label">최신순</span>
        </button>
        <div class="sort-dropdown-menu" id="sort-dropdown-menu">
          <button class="sort-dropdown-item active" id="sort-opt-newest" onclick="setSort('newest')">최신순</button>
          <button class="sort-dropdown-item" id="sort-opt-oldest" onclick="setSort('oldest')">오래된순</button>
          <button class="sort-dropdown-item" id="sort-opt-popular" onclick="setSort('popular')">인기순</button>
        </div>
      </div>
      <span class="char-count" id="char-count-lbl"></span>
      <button class="width-toggle-btn" id="width-toggle-btn" onclick="toggleWidth()" title="너비 전환">⇔ <span id="width-toggle-label">전체 너비</span></button>
    </div>
    <div class="char-grid" id="char-grid"></div>
    </div><!-- /char-page-inner -->
  </div>
</div>

<!-- ── DETAIL VIEW ── -->
<div id="detail-view" onclick="if(event.target===this)showList()">
  <div class="detail-overlay-inner">
  <div class="top-bar">
    <button class="tb-back" onclick="showList()">← 목록</button>
    <div class="tb-sep"></div>
    <span class="tb-crumbs-mid">
      <span class="tb-crumb">biz-OC-doll</span>
      <span class="tb-arr">›</span>
      <span class="tb-crumb">캐릭터 일람</span>
      <span class="tb-arr">›</span>
    </span>
    <span class="tb-cur" id="detail-breadcrumb"></span>
    <button class="width-toggle-btn" id="sheet-wide-btn" onclick="toggleSheetWidth()" title="시트 너비 전환" style="margin-left:auto">⇔ <span id="sheet-wide-label">넓게 보기</span></button>
  </div>

  <div class="sheet-wrap">
    <!-- 헤더 행 -->
    <div class="sheet-header-row">
      <div class="sheet-thumb">
        <div class="sheet-thumb-inner" id="detail-illust-inner"></div>
      </div>
      <div class="sheet-header-text">
        <div class="sheet-info-label">Code</div>
        <div class="sheet-info-code" id="detail-id-code"></div>
      </div>
      <div class="sheet-holder-block">
        <div class="sheet-holder-label">Holder</div>
        <div class="sheet-holder-value" id="detail-holder">—</div>
      </div>

      <div class="sheet-action-btns">
        <button class="sheet-action-btn" onclick="alert('episode')">Episode<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/><path d="M10 2h4v4M14 2 8 8"/></svg></button>
      </div>

    </div>

    <div class="sheet-slot" style="position:relative" id="detail-sheet-slot">
      <div class="sheet-hint-icon">◻</div>
      <div class="sheet-hint-text">캐릭터 시트 / 일러스트<br><span style="opacity:.5">visual sheet · reference · SNS</span></div>
      <div id="detail-date-badge" style="display:none;position:absolute;top:0;right:0;z-index:10;background:rgba(0,0,0,0.06);padding:4px 10px;font-size:10px;color:#000;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;border-bottom-left-radius:8px">—</div>
      <button class="cassette-nav-arrow prev" id="cassette-prev" onclick="navChar(-1)" aria-label="이전 캐릭터">
        <svg width="20" height="44" viewBox="0 0 20 44" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 4L4 22L16 40" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="cassette-nav-arrow next" id="cassette-next" onclick="navChar(1)" aria-label="다음 캐릭터">
        <svg width="20" height="44" viewBox="0 0 20 44" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4L16 22L4 40" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div class="ep-nav">
    <button class="ep-nav-btn" id="nav-prev" onclick="navChar(-1)"><span>←</span><span class="ep-nav-title" id="nav-prev-name"></span></button>
    <div></div>
    <button class="ep-nav-btn" id="nav-next" onclick="navChar(1)"><span class="ep-nav-title" id="nav-next-name"></span><span>→</span></button>
  </div>
  </div><!-- /detail-overlay-inner -->
</div>

<!-- ── ARCHIVE OVERLAY ── -->
<div id="archive-overlay" onclick="if(event.target===this)closeArchive()">
  <div class="archive-modal">
    <div class="archive-modal-bar">
      <span class="archive-modal-title">Archive</span>
      <span class="archive-modal-code" id="archive-modal-code"></span>
      <button class="archive-modal-close" onclick="closeArchive()" title="닫기">✕</button>
    </div>
    <iframe id="archive-iframe" src="" title="Archive"></iframe>
  </div>
</div>

<script>
/* ── DATA — 구글시트 OC-characters 탭 CSV에서 로드 ── */
(function(){
  if(window.CHARACTERS) return;
  window.CHARACTERS = []; // 로드 전 빈 배열 (renderList는 fetch 후 다시 호출)

  const GRADIENTS=[
    "135deg,#e0e7ff,#a5b4fc","135deg,#fce7f3,#f9a8d4",
    "135deg,#d1fae5,#6ee7b7","135deg,#fef3c7,#fcd34d",
    "135deg,#ffe4e6,#fda4af","135deg,#e0f2fe,#7dd3fc",
    "135deg,#f3e8ff,#c4b5fd","135deg,#ecfccb,#a3e635",
    "135deg,#fff7ed,#fdba74","135deg,#f0fdf4,#86efac",
  ];

  async function loadChars(){
    try{
      // config.js 의 SHEET_CSV() 헬퍼 사용
      const url = (typeof SHEET_CSV === 'function')
        ? SHEET_CSV('OC-characters')
        : null;
      if(!url) throw new Error('config.js 미로드');

      const res = await fetch(url);
      if(!res.ok) throw new Error('CSV fetch 실패 ' + res.status);
      const csv = await res.text();

      // CSV 파싱
      const rows = csv.trim().split('\n').map(r=>{
        const cols=[]; let cur='', inQ=false;
        for(const ch of r){
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=ch;
        }
        cols.push(cur.trim());
        return cols;
      });
      if(rows.length < 2) return;

      // 헤더: code / type / holder / status / updated
      // 완료 · 작업중 캐릭터만 표시
      window.CHARACTERS = rows.slice(1)
        .filter(r=>(r[0]||'').trim())
        .map((r,i)=>{
          const code = (r[0]||'').trim();
          const num  = parseInt(code.replace('BIZOCDOLL','')) || (i+1);
          return {
            id:     num,
            idCode: code,
            type:   (r[1]||'').trim(),
            holder: (r[2]||'—').trim() || '—',
            status:  (r[3]||'').trim(),
            updated: (r[4]||'').trim(),
            grad:   GRADIENTS[(num-1) % GRADIENTS.length],
          };
        })
        .filter(c=>c.status==='완료' || c.status==='작업중');

      renderList(); // 데이터 로드 후 리스트 재렌더
    }catch(e){
      console.warn('캐릭터 CSV 불러오기 실패:', e.message);
      // 폴백: 200개 빈 캐릭터 생성
      window.CHARACTERS = Array.from({length:200},(_,i)=>({
        id:i+1, idCode:`BIZOCDOLL${String(i+1).padStart(3,'0')}`,
        holder:'—', status:'', grad:GRADIENTS[i%GRADIENTS.length],
      }));
      renderList();
    }
  }
  loadChars();
})();

/* ── STATE ── */
window.charState = window.charState || { filter:"ALL", search:"", activeId:null, sort:"newest" };
window.charState.activeId = null;
const state = window.charState;
window._VOTE_DATA = window._VOTE_DATA || {};

// 투표 데이터 로드
(function(){
  const api = (typeof API !== 'undefined' && API && !API.includes('TEST')) ? API : null;
  if(!api) return;
  fetch(api + '?action=getVotes')
    .then(r=>r.json())
    .then(json=>{ if(json.ok){ window._VOTE_DATA=json.votes; if(state.sort==='popular') renderList(); } })
    .catch(()=>{});
})();

/* ── LIKED ── */
function getLiked(){ try{return new Set(JSON.parse(localStorage.getItem('doll_liked')||'[]'))}catch{return new Set()} }
function saveLiked(s){ localStorage.setItem('doll_liked', JSON.stringify([...s])) }
window.toggleLike = function(id, e){
  e.stopPropagation();
  const liked = getLiked();
  liked.has(id) ? liked.delete(id) : liked.add(id);
  saveLiked(liked);
  renderList();
};

/* ── FILTERED LIST HELPER — state 기반 즉시 계산 ── */
function getFilteredChars(){
  const q = state.search.trim().toLowerCase();
  const liked = getLiked();
  let filtered = window.CHARACTERS.filter(c=>
    (state.filter==="ALL" || c.type===state.filter || (state.filter==="♥" && liked.has(c.id))) &&
    (!q || c.idCode.toLowerCase().includes(q))
  );
  if(state.sort==='popular'){
    filtered = [...filtered].sort((a,b)=>(window._VOTE_DATA[b.id]||0)-(window._VOTE_DATA[a.id]||0));
  } else {
    filtered = [...filtered].sort((a,b)=>state.sort==='oldest' ? a.id-b.id : b.id-a.id);
  }
  return filtered;
}

/* ── RENDER LIST ── */
function renderList(){
  const q = state.search.trim().toLowerCase();
  const liked = getLiked();

  let filtered = window.CHARACTERS.filter(c=>
    (state.filter==="ALL" || c.type===state.filter || (state.filter==="♥" && liked.has(c.id))) &&
    (!q || c.idCode.toLowerCase().includes(q))
  );

  // 정렬
  if(state.sort==='popular'){
    filtered = [...filtered].sort((a,b)=>(window._VOTE_DATA[b.id]||0)-(window._VOTE_DATA[a.id]||0));
  } else {
    filtered = [...filtered].sort((a,b)=>state.sort==='oldest' ? a.id-b.id : b.id-a.id);
  }

  // 정렬 버튼 UI 동기화
  const sortLabel = document.getElementById('sort-label');
  if(sortLabel) sortLabel.textContent = {newest:'최신순',oldest:'오래된순',popular:'인기순'}[state.sort]||'최신순';
  ['newest','oldest','popular'].forEach(k=>{
    const el=document.getElementById('sort-opt-'+k);
    if(el) el.className='sort-dropdown-item'+(state.sort===k?' active':'');
  });

  const counts={ALL:0,M:0,N:0,F:0,O:0};
  window.CHARACTERS.forEach(c=>{counts[c.type]++;counts.ALL++;});
  const likedCount = liked.size;

  const tabs = [
    {key:"ALL", label:"ALL", count:counts.ALL},
    {key:"M",   label:"M",  count:counts.M},
    {key:"N",   label:"N",  count:counts.N},
    {key:"F",   label:"F",  count:counts.F},
    {key:"O",   label:"O",  count:counts.O},
    {key:"♥",   label:"♥",    count:likedCount},
  ];

  document.getElementById('filter-tabs').innerHTML = tabs.map(t=>`
    <button class="char-tab ${state.filter===t.key?"active":""} ${t.key==="♥"?"liked-tab":""}" onclick="setFilter('${t.key}')">
      ${t.label} <span style="font-size:10px;opacity:.5">${t.count}</span>
    </button>
  `).join("");

  window._filteredChars = filtered;
  document.getElementById('char-count-lbl').textContent = filtered.length + "개 표시";

  document.getElementById('char-grid').innerHTML = filtered.length===0
    ? `<div class="char-empty">${state.filter==="♥" ? "좋아요한 캐릭터가 없습니다 ♥" : "검색 결과 없음"}</div>`
    : filtered.map(c=>{
        const isLiked = liked.has(c.id);
        const iconNum = String(c.id).padStart(3,'0');
        const iconSrc = `images/character_sheet/${iconNum}_icon.png`;
        const thumbContent = `<img src="${iconSrc}" class="char-thumb-face" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="char-thumb-inner" style="display:none;background:linear-gradient(${c.grad})"></div>`;
        return `
        <div class="char-card" onclick="openChar(${c.id})">
          <div class="char-thumb">
            ${thumbContent}
            <button class="char-like-overlay${isLiked?" liked":""}" onclick="toggleLike(${c.id},event)" title="좋아요">
              ♥
            </button>
          </div>
          <div class="char-name-row">
            <span class="char-code-prefix">BIZOCDOLL</span>
            <span class="char-code">${String(c.id).padStart(3,"0")}</span>
          </div>
        </div>`;
      }).join("");
}

/* ── RENDER DETAIL ── */
function renderDetail(id){
  const c = window.CHARACTERS.find(ch=>ch.id===id);
  if(!c) return;

  document.getElementById('detail-breadcrumb').textContent = c.idCode;
  document.getElementById('detail-id-code').textContent = c.idCode;
  document.getElementById('detail-illust-inner').style.background = `linear-gradient(${c.grad})`;
  const iconNum2 = String(c.id).padStart(3,'0');
  const thumbEl = document.getElementById('detail-illust-inner');
  thumbEl.innerHTML = `<img src="images/character_sheet/${iconNum2}_icon.png" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.remove()">`;
  document.getElementById('detail-holder').textContent = c.holder;

  // sheet-slot 이미지 로드 (sheet.png → sheet2.png 순, 없으면 힌트 유지)
  const sheetNum = String(c.id).padStart(3,'0');
  const slot = document.getElementById('detail-sheet-slot');
  if(slot){
    // 기존 이미지 제거, 힌트 복원
    slot.querySelectorAll('img.sheet-img').forEach(el=>el.remove());
    slot.querySelector('.sheet-hint-icon').style.display='';
    slot.querySelector('.sheet-hint-text').style.display='';
    slot.classList.remove('has-image');

    function tryLoadSheet(filename, onLoaded){
      const img = document.createElement('img');
      img.className = 'sheet-img';
      img.src = `images/character_sheet/${filename}`;
      img.style.cssText = 'width:100%;display:block;border-radius:8px';
      img.onload = ()=>{ slot.prepend(img); onLoaded && onLoaded(); };
    }
    // sheet.png 먼저
    const img1 = document.createElement('img');
    img1.className = 'sheet-img';
    img1.src = `images/character_sheet/${sheetNum}_sheet.png`;
    img1.style.cssText = 'width:100%;display:block;border-radius:8px';
    img1.onload = ()=>{
      slot.querySelector('.sheet-hint-icon').style.display='none';
      slot.querySelector('.sheet-hint-text').style.display='none';
      slot.classList.add('has-image');
      slot.prepend(img1);
      // sheet2.png도 시도
      const img2 = document.createElement('img');
      img2.className = 'sheet-img';
      img2.src = `images/character_sheet/${sheetNum}_sheet2.png`;
      img2.style.cssText = 'width:100%;display:block;border-radius:8px;margin-top:8px';
      img2.onload = ()=>{ slot.appendChild(img2); };
    };
    slot.appendChild(img1);
  }
  const badge = document.getElementById('detail-date-badge');
  if(badge){
    // gviz CSV 날짜 정규화 (2026. 4. 9. → 2026-04-09)
    function normalizeDate(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      const m = v.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
      return v;
    }
    const dateStr = normalizeDate(c.updated);
    if(dateStr){
      badge.textContent = dateStr;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }

  // Prev / Next — 현재 필터/정렬 순서 기준 (즉시 계산)
  const list = getFilteredChars();
  const idx = list.findIndex(ch=>ch.id===c.id);
  const prev = list[idx-1]||null;
  const next = list[idx+1]||null;
  document.getElementById('nav-prev-name').textContent = prev ? prev.idCode : "없음";
  document.getElementById('nav-next-name').textContent = next ? next.idCode : "없음";
  document.getElementById('nav-prev').className = "ep-nav-btn"+(prev?"":" disabled");
  document.getElementById('nav-next').className = "ep-nav-btn"+(next?"":" disabled");
  const cp = document.getElementById('cassette-prev');
  const cn = document.getElementById('cassette-next');
  if(cp) cp.classList.toggle('disabled', !prev);
  if(cn) cn.classList.toggle('disabled', !next);
}


/* ── ARCHIVE INTEGRATION ── */
window.openArchive = function(){
  const c = window.CHARACTERS.find(ch=>ch.id===state.activeId);
  if(!c) return;
  const code = c.idCode; // e.g. "BIZOCDOLL001"
  document.getElementById('archive-modal-code').textContent = code;
  const iframe = document.getElementById('archive-iframe');
  iframe.src = 'archive.html?embed=1#' + code;
  document.getElementById('archive-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeArchive = function(){
  document.getElementById('archive-overlay').classList.remove('open');
  // iframe src 초기화 (뒤로가기 히스토리 방지)
  setTimeout(()=>{ document.getElementById('archive-iframe').src = ''; }, 200);
  document.body.style.overflow = '';
};

/* ── ACTIONS ── */
window.toggleSheetWidth = function(){
  const overlay = document.querySelector('.detail-overlay-inner');
  const label = document.getElementById('sheet-wide-label');
  const isWide = overlay.classList.toggle('wide');
  label.textContent = isWide ? '좁게 보기' : '넓게 보기';
};
window.toggleSortMenu = function(){
  const menu = document.getElementById('sort-dropdown-menu');
  if(menu) menu.classList.toggle('open');
};
window.setSort = function(val){
  state.sort = val;
  const menu = document.getElementById('sort-dropdown-menu');
  if(menu) menu.classList.remove('open');
  renderList();
};
document.addEventListener('click', function(e){
  const wrap = document.getElementById('sort-dropdown-wrap');
  if(wrap && !wrap.contains(e.target)){
    const menu = document.getElementById('sort-dropdown-menu');
    if(menu) menu.classList.remove('open');
  }
});
window.toggleWidth = function(){
  const inner = document.getElementById('char-page-inner');
  const label = document.getElementById('width-toggle-label');
  const isWide = inner.classList.toggle('wide');
  label.textContent = isWide ? '좁게 보기' : '전체 너비';
};
window.setFilter = function(f){ state.filter=f; renderList(); };
window.setSearch = function(v){ state.search=v; renderList(); };
window.openChar = function(id){
  state.activeId=id;
  renderDetail(id);
  document.getElementById('detail-view').style.display='block';
  document.body.style.overflow='hidden';
  requestAnimationFrame(applyMobDetail);
};
window.showList = function(){
  state.activeId=null;
  document.getElementById('detail-view').style.display='none';
  document.body.style.overflow='';
  renderList();
};
window.navChar = function(dir){
  const list = getFilteredChars();
  const idx = list.findIndex(ch=>ch.id===state.activeId);
  const target = list[idx+dir];
  if(target) openChar(target.id);
};

/* ── INIT ── */
renderList();

function applyMobDetail(){
  var row     = document.querySelector('.sheet-header-row');
  var thumb   = document.querySelector('.detail-overlay-inner .sheet-thumb');
  var hdrText = document.querySelector('.sheet-header-text');
  var holder  = document.querySelector('.sheet-holder-block');
  var btns    = document.querySelector('.sheet-action-btns');
  var overlay = document.querySelector('.detail-overlay-inner');
  var wrap    = document.querySelector('.sheet-wrap');
  if(!row) return;
  var w = document.documentElement.clientWidth;
  var mob = w > 0 && w < 600;
  if(mob){
    row.style.flexWrap      = 'wrap';
    row.style.gap           = '10px 14px';
    row.style.paddingBottom = '14px';
    row.style.marginBottom  = '16px';
    if(thumb){ thumb.style.width='80px'; thumb.style.height='80px'; thumb.style.flexShrink='0'; }
    if(hdrText){ hdrText.style.flex='1'; hdrText.style.minWidth='0'; }
    if(holder){ holder.style.width='100%'; holder.style.padding='0'; holder.style.order='3'; }
    if(btns){ btns.style.width='100%'; btns.style.flexDirection='row'; btns.style.marginLeft='0'; btns.style.gap='8px'; btns.style.order='4'; }
    document.querySelectorAll('.sheet-action-btn').forEach(function(b){
      b.style.flex='1'; b.style.justifyContent='center'; b.style.minWidth='0';
    });
    if(overlay){ overlay.style.margin='0'; overlay.style.borderRadius='0'; }
    if(wrap){ wrap.style.padding='20px 16px 32px'; }
  } else {
    row.style.flexWrap=''; row.style.gap='20px'; row.style.paddingBottom='20px'; row.style.marginBottom='24px';
    if(thumb){ thumb.style.width='80px'; thumb.style.height='80px'; thumb.style.flexShrink='0'; }
    if(hdrText){ hdrText.style.flex=''; hdrText.style.minWidth=''; }
    if(holder){ holder.style.width=''; holder.style.padding='12px 20px'; holder.style.order=''; }
    if(btns){ btns.style.width=''; btns.style.flexDirection='column'; btns.style.marginLeft='auto'; btns.style.gap='7px'; btns.style.order=''; }
    document.querySelectorAll('.sheet-action-btn').forEach(function(b){
      b.style.flex=''; b.style.justifyContent=''; b.style.minWidth='120px';
    });
    if(overlay){ overlay.style.margin='40px auto'; overlay.style.borderRadius='14px'; }
    if(wrap){ wrap.style.padding=''; }
  }
}
window.addEventListener('resize', applyMobDetail);
</script>
