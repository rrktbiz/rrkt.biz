        <span style="font-family:monospace;font-size:11px;color:#a0a0a0;flex-shrink:0">1-1</span>
        <div class="ep-info">
          <div class="ep-title">이곳엔 무엇을 넣을꼬</div>
          <div class="ep-meta" style="margin-bottom:6px">
            <span class="ep-tag" style="border-color:#d4c8e8;color:#8a6faa;background:#f5f2fb">서브</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#a0a0a0"><span style="width:6px;height:6px;border-radius:50%;background:#ff9800;display:inline-block"></span>작업중</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px"><img src="images/simple_profile/001.png" alt="001" title="001" style="width:22px;height:22px;border-radius:50%;border:1.5px solid #cce4ee;background:#eef6fa;object-fit:cover;flex-shrink:0" onerror="this.style.background='#eef6fa';this.style.display='inline-block'" data-cast="001"><img src="images/simple_profile/002.png" alt="002" title="002" style="width:22px;height:22px;border-radius:50%;border:1.5px solid #cce4ee;background:#eef6fa;object-fit:cover;flex-shrink:0" onerror="this.style.background='#eef6fa';this.style.display='inline-block'" data-cast="002"><img src="images/simple_profile/003.png" alt="003" title="003" style="width:22px;height:22px;border-radius:50%;border:1.5px solid #cce4ee;background:#eef6fa;object-fit:cover;flex-shrink:0" onerror="this.style.background='#eef6fa';this.style.display='inline-block'" data-cast="003"><img src="images/simple_profile/004.png" alt="004" title="004" style="width:22px;height:22px;border-radius:50%;border:1.5px solid #cce4ee;background:#eef6fa;object-fit:cover;flex-shrink:0" onerror="this.style.background='#eef6fa';this.style.display='inline-block'" data-cast="004"></div>
        </div>
        <span style="color:#c6c6c6;font-size:14px">›</span>
      </div></div><div class="tab-content ep-list-wrap" id="tab-event"><div class="ep-card" onclick="openEp(3)" data-cast="001" data-type="event">
        <span style="font-family:monospace;font-size:11px;color:#a0a0a0;flex-shrink:0">1-1</span>
        <div class="ep-info">
          <div class="ep-title">제작기간 때우는 용도로 쓰인다더군</div>
          <div class="ep-meta" style="margin-bottom:6px">
            <span class="ep-tag" style="border-color:#e8d4b8;color:#a07040;background:#fdf6ed">이벤트</span>
            <span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#a0a0a0"><span style="width:6px;height:6px;border-radius:50%;background:#90a0b0;display:inline-block"></span>예정</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px"><img src="images/simple_profile/001.png" alt="001" title="001" style="width:22px;height:22px;border-radius:50%;border:1.5px solid #cce4ee;background:#eef6fa;object-fit:cover;flex-shrink:0" onerror="this.style.background='#eef6fa';this.style.display='inline-block'" data-cast="001"></div>
        </div>
        <span style="color:#c6c6c6;font-size:14px">›</span>
      </div></div>
  </div>
</div>
<div id="reader-view">
  <div class="top-bar" id="reader-topbar"><button class="tb-back" onclick="gl()">← 목록</button><div class="tb-sep"></div><div class="tb-title" id="tb-ep-title">스토리 읽기</div></div>
  <div class="reader-wrap" id="rc"></div>
</div>
<div class="float-nav" id="float-nav">
  <button class="fn-btn disabled" id="fn-prev" onclick="fnPrev()">← 이전</button>
  <button class="fn-btn center" onclick="gl()">목록</button>
  <button class="fn-btn disabled" id="fn-next" onclick="fnNext()">다음 →</button>
</div>
<script>const _epData=JSON.parse(document.getElementById('ep-data').textContent);const EP=Array.isArray(_epData)?_epData:(_epData.episodes||[]);const COVER=Array.isArray(_epData)?'':(_epData._cover||'');const BANNERS=Array.isArray(_epData)?{}:(_epData._banners||{});

let _castFilters=new Set();
function _applyFilter(){
  var f=[..._castFilters];
  document.querySelectorAll('.ep-card').forEach(function(card){
    var nums=(card.dataset.cast||'').split(',').filter(Boolean);
    var match=!f.length||f.every(function(n){return nums.includes(n);});
    card.classList.toggle('dim',!match);
    card.querySelectorAll('img[data-cast]').forEach(function(img){
      img.classList.toggle('cast-hi',f.includes(img.dataset.cast));
    });
  });
  var chips=document.getElementById('cast-chips');
  if(chips){chips.innerHTML=f.map(function(n){
  return '<span data-rx="'+n+'" style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid #b8d9e8;background:#eaf5f9;color:#3a7090;display:inline-flex;align-items:center;gap:4px">'+n+'<span data-rx2="'+n+'" style="cursor:pointer;color:#7aaec4;margin-left:2px">✕</span></span>';
  }).join('');chips.querySelectorAll('[data-rx2]').forEach(function(el){el.addEventListener('click',function(){rmCastChip(el.dataset.rx2);});});}
}
function onCastSearch(v){if(/^[0-9]{3}$/.test(v.trim())){_castFilters.add(v.trim());document.getElementById('cast-search').value='';_applyFilter();}}
function onCastKey(e){if(e.key==='Enter'){var v=e.target.value.trim();if(v){_castFilters.add(v);e.target.value='';_applyFilter();}}}
function rmCastChip(n){_castFilters.delete(n);_applyFilter();}
function switchTab(type){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const btn=document.getElementById('tab-btn-'+type);
  const content=document.getElementById('tab-'+type);
  if(btn)btn.classList.add('active');
  if(content)content.classList.add('active');
  location.hash=type;
  const bi=document.getElementById('story-banner-img');if(bi){const s=BANNERS[type]||('images/ep_cover_sc/0_banner_'+type+'.jpg');bi.src=s;bi.style.display='';}
}
// URL hash로 진입 탭 자동 선택
(function(){
  const hash=(location.hash||'').replace('#','');
  if(hash&&document.getElementById('tab-btn-'+hash)){switchTab(hash);}
})();
function openEp(i){
  const e=EP[i];if(!e)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('reader-view').style.display='block';
  document.getElementById('tb-ep-title').textContent=e.title||'스토리';
  const cl=e.castList||[];
  const ch=cl.length?'<div class="reader-cast-wrap"><div class="reader-cast-label">Cast</div><div class="reader-cast">'+cl.map(c=>'<div class="cast-item"><div class="cast-icon"><img src="images/simple_profile/'+(c.charNum||'')+'.png" alt="" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display=\'none\'"></div><div class="cast-num">'+(c.charNum||'?')+'</div></div>').join('')+'</div></div>':'';
  const prev=EP[i-1];const next=EP[i+1];
  const prevBtn=prev?'<button class="reader-nav-btn prev" onclick="openEp('+(i-1)+')">← '+prev.title+'</button>':'<button class="reader-nav-btn prev" style="opacity:.35;cursor:default;font-size:11px;color:var(--tx3)" disabled>✦ 첫 번째 화</button>';
  const nextBtn=next?'<button class="reader-nav-btn next" onclick="openEp('+(i+1)+')">'+next.title+' →</button>':'<button class="reader-nav-btn next" style="opacity:.35;cursor:default;font-size:11px;color:var(--tx3)" disabled>마지막 화 ✦</button>';
  document.getElementById('rc').innerHTML='<div class="reader-header"><div class="reader-ep-eyebrow-row"><span class="reader-ep-eyebrow">'+(e.eyebrow||'')+'</span>'+(e.num?'<span class="reader-ep-num"> · '+e.num+'</span>':'')+'</div><div class="reader-ep-title">'+(e.title||'')+'</div></div>'+ch+bb(e.blocks||[])+'<div class="reader-nav">'+prevBtn+'<button class="reader-nav-btn ep-list-btn" onclick="gl()">목록</button>'+nextBtn+'</div>';
  scrollTo(0,0);
}
function gl(){document.getElementById('list-view').style.display='block';document.getElementById('reader-view').style.display='none';scrollTo(0,0);}
function bb(blocks){
  let last=null;
  return blocks.map(b=>{
    const d=b.data||{};
    if(b.type==='cast'){last=null;const ms=d.members||[];if(!ms.length)return'';return'<div class="reader-cast-wrap"><div class="reader-cast-label">Cast</div><div class="reader-cast">'+ms.map(m=>'<div class="cast-item"><div class="cast-icon"><span style=\'font-size:12px;font-weight:700;color:#7aaec4\'>'+(m.charNum||'?')+'</span></div><div class="cast-num">'+(m.charNum||'?')+'</div></div>').join('')+'</div></div>';}
    if(b.type==='scene'){last=null;const s=d.filename?'images/ep_cover_sc/'+d.filename:'';return'<div class="script-block"><div class="script-img">'+(s?'<img src="'+s+'" alt="">':'<div class="script-img-placeholder"><div class="script-img-placeholder-icon">🖼</div><div class="script-img-placeholder-text">장면 이미지</div></div>')+'</div></div>';}
    if(b.type==='speech'||b.type==='thought'){const sm=d.exprFilename&&d.exprFilename===last;last=d.exprFilename||null;const s=d.exprFilename?'images/simple_profile/'+d.exprFilename:'';const th=b.type==='thought'?' thought':'';const cn=b.type==='thought'?'<div class="tail-thought"><div class="tail-dot tail-dot1"></div><div class="tail-dot tail-dot2"></div></div>':'<div class="tail-speech"></div>';return'<div class="script-block"><div class="script-line" data-img="'+s+'"><div class="script-line-icon'+(sm?' hidden':'')+'"><img src="'+s+'" alt="" onerror="this.parentNode.style.background=\'#eef6fa\'"></div><div class="script-line-connector">'+cn+'</div><div class="script-line-bubble'+th+'"><div class="script-line-speaker">'+(d.charNum||'')+'</div><div class="script-line-text">'+(d.text||'')+'</div></div></div></div>';}
    if(b.type==='narration'){last=null;return'<div class="script-block"><div class="script-narration"><div class="script-line-text">'+(d.text||'')+'</div></div></div>';}
    if(b.type==='system'){last=null;return'<div class="script-block"><div class="script-system"><span class="script-system-text">'+(d.text||'')+'</span></div></div>';}
    if(b.type==='sfx'){last=null;return'<div class="script-block"><div class="script-sfx"><div class="script-sfx-text">'+(d.text||'')+'</div></div></div>';}
    if(b.type==='chat'){last=null;return'<div class="script-block"><div class="script-chat"><div class="script-chat-header">'+(d.header||'')+'</div>'+((d.msgs||[]).map(m=>'<div class="script-chat-bubble'+(m.dir==='right'?' right':'')+'">'+m.text+'</div>').join(''))+'</div></div>';}
    if(b.type==='divider'){last=null;return'<div class="script-block"><div class="script-divider">· · ·</div></div>';}
    return'';
  }).join('');
}</script>
