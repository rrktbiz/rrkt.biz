<script>const _epData=JSON.parse(document.getElementById('ep-data').textContent);const EP=Array.isArray(_epData)?_epData:(_epData.episodes||[]);const COVER=Array.isArray(_epData)?'':(_epData._cover||'');
function switchTab(type){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const btn=document.getElementById('tab-btn-'+type);
  const content=document.getElementById('tab-'+type);
  if(btn)btn.classList.add('active');
  if(content)content.classList.add('active');
  location.hash=type;
}
// URL hash로 진입 탭 자동 선택
(function(){
  const hash=(location.hash||'').replace('#','');
  if(hash&&document.getElementById('tab-btn-'+hash)){switchTab(hash);}
})();
function openEp(i){
  const e=EP[i];if(!e)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('reader-view').style.display='block';
  document.getElementById('tb-ep-title').textContent=e.title||'스토리';
  const cl=e.castList||[];
  const ch=cl.length?'<div class="reader-cast-wrap"><div class="reader-cast-label">Cast</div><div class="reader-cast">'+cl.map(c=>'<div class="cast-item"><div class="cast-icon"><span style="font-size:12px;font-weight:700;color:#7aaec4">'+(c.charNum||'?')+'</span></div><div class="cast-num">'+(c.charNum||'?')+'</div></div>').join('')+'</div></div>':'';
  const prev=EP[i-1];const next=EP[i+1];
  const prevBtn=prev?'<button class="reader-nav-btn prev" onclick="openEp('+(i-1)+')">← '+prev.title+'</button>':'<button class="reader-nav-btn prev" style="opacity:.35;cursor:default;font-size:11px;color:var(--tx3)" disabled>✦ 첫 번째 화</button>';
  const nextBtn=next?'<button class="reader-nav-btn next" onclick="openEp('+(i+1)+')">'+next.title+' →</button>':'<button class="reader-nav-btn next" style="opacity:.35;cursor:default;font-size:11px;color:var(--tx3)" disabled>마지막 화 ✦</button>';
  document.getElementById('rc').innerHTML='<div class="reader-header"><div class="reader-ep-eyebrow-row"><span class="reader-ep-eyebrow">'+(e.eyebrow||'')+'</span>'+(e.num?'<span class="reader-ep-num"> · '+e.num+'</span>':'')+'</div><div class="reader-ep-title">'+(e.title||'')+'</div></div>'+ch+bb(e.blocks||[])+'<div class="reader-nav">'+prevBtn+'<button class="reader-nav-btn ep-list-btn" onclick="gl()">목록</button>'+nextBtn+'</div>';
  scrollTo(0,0);
}
function gl(){document.getElementById('list-view').style.display='block';document.getElementById('reader-view').style.display='none';scrollTo(0,0);}
function bb(blocks){
  let last=null;
  return blocks.map(b=>{
    const d=b.data||{};
    if(b.type==='cast'){last=null;const ms=d.members||[];if(!ms.length)return'';return'<div class="reader-cast-wrap"><div class="reader-cast-label">Cast</div><div class="reader-cast">'+ms.map(m=>'<div class="cast-item"><div class="cast-icon"><span style=\'font-size:12px;font-weight:700;color:#7aaec4\'>'+(m.charNum||'?')+'</span></div><div class="cast-num">'+(m.charNum||'?')+'</div></div>').join('')+'</div></div>';}
    if(b.type==='scene'){last=null;const s=d.filename?'images/scenes/'+d.filename:'';return'<div class="script-block"><div class="script-img">'+(s?'<img src="'+s+'" alt="">':'<div class="script-img-placeholder"><div class="script-img-placeholder-icon">🖼</div><div class="script-img-placeholder-text">장면 이미지</div></div>')+'</div></div>';}
    if(b.type==='speech'||b.type==='thought'){const sm=d.exprFilename&&d.exprFilename===last;last=d.exprFilename||null;const s=d.exprFilename?'images/expressions/'+d.exprFilename:'';const th=b.type==='thought'?' thought':'';const cn=b.type==='thought'?'<div class="tail-thought"><div class="tail-dot tail-dot1"></div><div class="tail-dot tail-dot2"></div></div>':'<div class="tail-speech"></div>';return'<div class="script-block"><div class="script-line" data-img="'+s+'"><div class="script-line-icon'+(sm?' hidden':'')+'"><img src="'+s+'" alt="" onerror="this.parentNode.style.background=\'#eef6fa\'"></div><div class="script-line-connector">'+cn+'</div><div class="script-line-bubble'+th+'"><div class="script-line-speaker">'+(d.charNum||'')+'</div><div class="script-line-text">'+(d.text||'')+'</div></div></div></div>';}
    if(b.type==='narration'){last=null;return'<div class="script-block"><div class="script-narration"><div class="script-line-text">'+(d.text||'')+'</div></div></div>';}
    if(b.type==='system'){last=null;return'<div class="script-block"><div class="script-system"><span class="script-system-text">'+(d.text||'')+'</span></div></div>';}
    if(b.type==='sfx'){last=null;return'<div class="script-block"><div class="script-sfx"><div class="script-sfx-text">'+(d.text||'')+'</div></div></div>';}
    if(b.type==='chat'){last=null;return'<div class="script-block"><div class="script-chat"><div class="script-chat-header">'+(d.header||'')+'</div>'+((d.msgs||[]).map(m=>'<div class="script-chat-bubble'+(m.dir==='right'?' right':'')+'">'+m.text+'</div>').join(''))+'</div></div>';}
    if(b.type==='divider'){last=null;return'<div class="script-block"><div class="script-divider">· · ·</div></div>';}
    return'';
  }).join('');
}</script>
</body>
</html>
