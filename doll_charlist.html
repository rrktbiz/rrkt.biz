<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biz-OC-doll · 캐릭터 일람</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--sb:#fff;--bd:#e2e2e2;--bd2:#c6c6c6;
  --tx:#1a1a1a;--tx2:#5f5f5f;--tx3:#a0a0a0;
  --fn:'Inter','Noto Sans KR',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── TOP BAR ── */
.top-bar{padding:10px 20px;background:var(--sb);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tb-back{background:transparent;border:none;color:var(--tx3);font-size:12px;padding:4px 8px;border-radius:5px;transition:all .12s;font-family:var(--fn)}
.tb-back:hover{background:var(--bg);color:var(--tx)}
.tb-sep{width:1px;height:14px;background:var(--bd)}
.tb-crumb{font-size:10px;font-weight:500;color:var(--tx3)}
.tb-arr{font-size:10px;color:var(--bd2)}
.tb-cur{font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* ── CHAR LIST ── */
.char-page{padding:22px 24px}
.char-filter-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.char-filter-tabs{display:flex;gap:0;background:var(--sb);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.char-tab{padding:8px 16px;background:transparent;border:none;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-right:1px solid var(--bd);transition:all .12s}
.char-tab:last-child{border-right:none}
.char-tab:hover{background:var(--bg);color:var(--tx)}
.char-tab.active{background:var(--tx);color:#fff;font-weight:700}
.char-search{flex:1;min-width:180px;max-width:280px;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:var(--fn);background:var(--sb);color:var(--tx);outline:none;transition:border-color .12s}
.char-search:focus{border-color:var(--bd2)}
.char-count{font-size:11px;color:var(--tx3);white-space:nowrap}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.char-card{cursor:pointer;text-align:center}
.char-card:hover .char-thumb{box-shadow:0 2px 10px #0002;transform:translateY(-2px)}
.char-thumb{width:100%;aspect-ratio:1;border-radius:8px;border:1px solid var(--bd);overflow:hidden;transition:transform .14s,box-shadow .14s;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;background:#d8d8d8;filter:grayscale(1)}
.char-thumb.rA{background:#d8d8d8}
.char-thumb.rB{background:#d8d8d8}
.char-thumb.rC{background:#d8d8d8}
.char-name-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:5px}
.char-circle{font-size:8px;line-height:1}
.char-circle.rA{color:#38bdf8}
.char-circle.rB{color:#111}
.char-circle.rC{color:#e03030}
.char-firstname{font-size:13px;font-weight:600;color:var(--tx)}
.char-lastname{font-size:11px;color:var(--tx3);margin-top:1px}
.char-empty{grid-column:1/-1;padding:48px 0;text-align:center;font-size:12px;color:var(--tx3)}
.char-slot .char-thumb{background:#ebebeb;border:1px solid var(--bd2)}
.char-slot .char-firstname{color:var(--tx3)}

/* ── CHAR DETAIL ── */
.char-detail-hero{display:flex;gap:24px;padding:24px 28px;background:var(--sb);border-bottom:1px solid var(--bd)}
.char-detail-thumb{width:120px;height:120px;border-radius:12px;flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;position:relative;background:#d8d8d8;filter:grayscale(1)}
.char-detail-rank{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;margin-bottom:8px}
.char-detail-rank.rA{background:#e0f5ff;color:#0369a1}
.char-detail-rank.rB{background:#f0f0f0;color:#111}
.char-detail-rank.rC{background:#ffe4e4;color:#c01020}
.char-detail-name{font-size:22px;font-weight:700;margin-bottom:4px}
.char-detail-subname{font-size:14px;color:var(--tx3);margin-bottom:12px}
.char-detail-tags{display:flex;gap:5px;flex-wrap:wrap}
.char-detail-tag{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--bg);border:1px solid var(--bd);color:var(--tx2)}
.char-detail-body{padding:22px 28px}
.char-detail-sec{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px;margin-top:22px}
.char-detail-sec:first-child{margin-top:0}
.char-detail-ph{height:11px;border-radius:3px;background:var(--bd);margin-bottom:8px}
.char-detail-hint{padding:14px;border:1px dashed var(--bd2);border-radius:8px;font-size:11px;color:var(--tx3);text-align:center;margin-top:16px}
.char-stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.char-stat{padding:10px 14px;background:var(--sb);border:1px solid var(--bd);border-radius:8px;min-width:80px}
.char-stat-l{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.5px;margin-bottom:3px}
.char-stat-v{font-size:15px;font-weight:700;color:var(--tx)}

/* ── EP NAV ── */
.ep-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 24px;border-top:1px solid var(--bd);background:var(--sb)}
.ep-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx2);font-size:12px;font-weight:500;transition:all .12s;min-width:0;max-width:260px}
.ep-nav-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.ep-nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.ep-nav-btn:first-child{justify-self:start}
.ep-nav-btn:last-child{justify-self:end}
.ep-nav-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PAGE SECTIONS ── */
#list-view{display:block}
#detail-view{display:none}
</style>

<!-- ── LIST VIEW ── -->
<div id="list-view">
  <div class="top-bar">
    <span class="tb-crumb">biz-OC-doll</span>
    <span class="tb-arr">›</span>
    <span class="tb-cur">캐릭터 일람</span>
  </div>
  <div class="char-page">
    <div class="char-filter-row">
      <div class="char-filter-tabs" id="filter-tabs"></div>
      <input class="char-search" type="text" placeholder="캐릭터 검색..." id="char-search-input" oninput="setSearch(this.value)" />
      <span class="char-count" id="char-count-lbl"></span>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </div>
</div>

<!-- ── DETAIL VIEW ── -->
<div id="detail-view">
  <div class="top-bar">
    <button class="tb-back" onclick="showList()">← 목록</button>
    <div class="tb-sep"></div>
    <span class="tb-crumb">biz-OC-doll</span>
    <span class="tb-arr">›</span>
    <span class="tb-crumb">캐릭터 일람</span>
    <span class="tb-arr">›</span>
    <span class="tb-cur" id="detail-breadcrumb"></span>
  </div>
  <div class="char-detail-hero">
    <div class="char-detail-thumb" id="detail-thumb" style="background:#d8d8d8">
      <span style="font-size:48px;opacity:.2">◉</span>
    </div>
    <div>
      <div class="char-detail-rank" id="detail-rank"></div>
      <div class="char-detail-name" id="detail-name"></div>
      <div class="char-detail-subname" id="detail-subname"></div>
      <div class="char-detail-tags" id="detail-tags"></div>
    </div>
  </div>
  <div class="char-detail-body">
    <div class="char-detail-sec">기본 정보</div>
    <div class="char-stat-row" id="detail-stats"></div>
    <div class="char-detail-sec">프로필</div>
    <div id="detail-profile-ph"></div>
    <div class="char-detail-sec">스토리</div>
    <div id="detail-story-ph"></div>
    <div class="char-detail-hint">캐릭터 상세 정보 / 일러스트를 이곳에 등록하세요</div>
  </div>
  <div class="ep-nav">
    <button class="ep-nav-btn" id="nav-prev" onclick="navChar(-1)"><span>←</span><span class="ep-nav-title" id="nav-prev-name"></span></button>
    <div></div>
    <button class="ep-nav-btn" id="nav-next" onclick="navChar(1)"><span class="ep-nav-title" id="nav-next-name"></span><span>→</span></button>
  </div>
</div>

/* ── DATA ── */

    "카와무라","아오키","마루야마","스기우라","타카하시","후나하시","야마시타","타카기","타케우치","우에다",
    "타케다","코마츠","키노시타","후지모토","마루타","미야타","오카와","야마다","하마노","시모다",

    "후지사키","마시마","미조구치","코노","후쿠시마","소가","치바","이에나가","시라이","카토우",

/* ── STATE ── */
let state = { filter:"ALL", search:"", activeId:null };

/* ── RENDER LIST ── */
function renderList(){
  const q = state.search.trim().toLowerCase();
  const filtered = window.CHARACTERS.filter(c=>{
    const typeOk = state.filter==="ALL" || c.type===state.filter;
    const nameOk = !q || c.firstname.toLowerCase().includes(q) || c.lastname.toLowerCase().includes(q);
    return typeOk && nameOk;
  });

  const counts = {ALL:200, A:0, B:0, C:0};
  window.CHARACTERS.forEach(c=>counts[c.type]++);

  // Filter tabs
  document.getElementById('filter-tabs').innerHTML = ["ALL","A","B","C"].map(t=>`
    <button class="char-tab ${state.filter===t?"active":""}" onclick="setFilter('${t}')">
      ${t==="ALL"?"ALL":t==="A"?"A <span style='color:#38bdf8'>●</span>":t==="B"?"B <span style='color:#111'>●</span>":"C <span style='color:#e03030'>●</span>"}
      <span style="font-size:10px;opacity:.6">${counts[t]}</span>
    </button>
  `).join("");

  document.getElementById('char-count-lbl').textContent = filtered.length + "명 표시";

  document.getElementById('char-grid').innerHTML = filtered.length===0
    ? `<div class="char-empty">검색 결과 없음</div>`
    : filtered.map(c=>{
        const dclr = c.type==="A"?"#38bdf8":c.type==="B"?"#111":"#e03030";
        const isSlot = !c.registered;
        return `<div class="char-card ${isSlot?"char-slot":""}" onclick="openChar(${c.id})">
          <div class="char-thumb r${c.type}">
            ${isSlot?``:`<span style="font-size:20px;opacity:.2">◉</span>`}
          </div>
          <div class="char-name-row">
            <span class="char-circle r${c.type}" style="color:${dclr}">●</span>
            <span class="char-firstname">${isSlot?"-":c.firstname}</span>
          </div>
          <div class="char-lastname">${isSlot?"":c.lastname}</div>
        </div>`;
      }).join("");
}

/* ── RENDER DETAIL ── */
function renderDetail(id){
  const c = window.CHARACTERS.find(ch=>ch.id===id);
  if(!c) return;
  const dclr = c.type==="A"?"#38bdf8":c.type==="B"?"#111":"#e03030";
  const rankLabel = c.type==="A"?"●●● Type-A":c.type==="B"?"●● Type-B":"● Type-C";
  const ws = [100,76,90,58,95,68,82,72];

  document.getElementById('detail-breadcrumb').textContent = c.firstname+" "+c.lastname;
  document.getElementById('detail-thumb').style.background = `linear-gradient(${c.grad})`;
  document.getElementById('detail-rank').className = `char-detail-rank r${c.type}`;
  document.getElementById('detail-rank').textContent = rankLabel;
  document.getElementById('detail-name').textContent = c.firstname;
  document.getElementById('detail-subname').textContent = c.lastname;
  document.getElementById('detail-tags').innerHTML = c.tags.map(t=>`<span class="char-detail-tag">${t}</span>`).join("");
  document.getElementById('detail-stats').innerHTML = `
    <div class="char-stat"><div class="char-stat-l">ID</div><div class="char-stat-v">#${String(c.id).padStart(3,"0")}</div></div>
    <div class="char-stat"><div class="char-stat-l">타입</div><div class="char-stat-v" style="color:${dclr}">Type-${c.type}</div></div>
    <div class="char-stat"><div class="char-stat-l">태그수</div><div class="char-stat-v">${c.tags.length}</div></div>
  `;
  document.getElementById('detail-profile-ph').innerHTML = ws.slice(0,4).map(w=>`<div class="char-detail-ph" style="width:${w}%;background:color-mix(in srgb,${dclr} 15%,#e4e4e4)"></div>`).join("");
  document.getElementById('detail-story-ph').innerHTML = ws.map(w=>`<div class="char-detail-ph" style="width:${w}%;background:color-mix(in srgb,${dclr} 10%,#e4e4e4)"></div>`).join("");

  // Prev / Next
  const allChars = state.filter==="ALL"
    ? window.CHARACTERS
    : window.CHARACTERS.filter(ch=>ch.type===state.filter);
  const idx = allChars.findIndex(ch=>ch.id===c.id);
  const prev = allChars[idx-1]||null;
  const next = allChars[idx+1]||null;
  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  document.getElementById('nav-prev-name').textContent = prev ? prev.firstname+" "+prev.lastname : "없음";
  document.getElementById('nav-next-name').textContent = next ? next.firstname+" "+next.lastname : "없음";
  prevBtn.className = "ep-nav-btn"+(prev?"":" disabled");
  nextBtn.className = "ep-nav-btn"+(next?"":" disabled");
}

/* ── ACTIONS ── */
function setFilter(f){
  state.filter = f;
  renderList();
}
function setSearch(v){
  state.search = v;
  renderList();
}
function openChar(id){
  state.activeId = id;
  renderDetail(id);
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0,0);
}
function showList(){
  state.activeId = null;
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  renderList();
}
function navChar(dir){
  const allChars = state.filter==="ALL"
    ? window.CHARACTERS
    : window.CHARACTERS.filter(ch=>ch.type===state.filter);
  const idx = allChars.findIndex(ch=>ch.id===state.activeId);
  const target = allChars[idx+dir];
  if(target) openChar(target.id);
}

/* ── INIT ── */
renderList();
</script>
</body>
</html>
