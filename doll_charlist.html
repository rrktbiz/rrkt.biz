<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biz-OC-doll · 캐릭터 일람</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--sb:#fff;--bd:#e2e2e2;--bd2:#c6c6c6;
  --tx:#1a1a1a;--tx2:#5f5f5f;--tx3:#a0a0a0;
  --fn:'Inter','Noto Sans KR',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── TOP BAR ── */
.top-bar{padding:10px 20px;background:var(--sb);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tb-back{background:transparent;border:none;color:var(--tx3);font-size:12px;padding:4px 8px;border-radius:5px;transition:all .12s;font-family:var(--fn)}
.tb-back:hover{background:var(--bg);color:var(--tx)}
.tb-sep{width:1px;height:14px;background:var(--bd)}
.tb-crumb{font-size:10px;font-weight:500;color:var(--tx3)}
.tb-arr{font-size:10px;color:var(--bd2)}
.tb-cur{font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* ── CHAR LIST ── */
.char-page{padding:22px 24px}
.char-filter-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.char-filter-tabs{display:flex;gap:0;background:var(--sb);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.char-tab{padding:8px 16px;background:transparent;border:none;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-right:1px solid var(--bd);transition:all .12s}
.char-tab:last-child{border-right:none}
.char-tab:hover{background:var(--bg);color:var(--tx)}
.char-tab.active{background:var(--tx);color:#fff;font-weight:700}
.char-search{flex:1;min-width:180px;max-width:280px;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:var(--fn);background:var(--sb);color:var(--tx);outline:none;transition:border-color .12s}
.char-search:focus{border-color:var(--bd2)}
.char-count{font-size:11px;color:var(--tx3);white-space:nowrap}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.char-card{cursor:pointer;text-align:center}
.char-card:hover .char-thumb{box-shadow:0 2px 10px #0002;transform:translateY(-2px)}
.char-thumb{width:100%;aspect-ratio:1;border-radius:8px;border:1px solid var(--bd);overflow:hidden;transition:transform .14s,box-shadow .14s;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;background:#d8d8d8;filter:grayscale(1)}
.char-name-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:5px}
.char-circle{font-size:8px;line-height:1}
.char-firstname{font-size:13px;font-weight:600;color:var(--tx)}
.char-lastname{font-size:11px;color:var(--tx3);margin-top:1px}
.char-empty{grid-column:1/-1;padding:48px 0;text-align:center;font-size:12px;color:var(--tx3)}
.char-slot .char-thumb{background:#ebebeb;border:1px solid var(--bd2)}
.char-slot .char-firstname{color:var(--tx3)}

/* ── CHAR DETAIL (new minimal sheet) ── */
.sheet-wrap{max-width:560px;margin:0 auto;padding:24px 20px 40px}

/* ID 코드 헤더 */
.sheet-id-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sheet-id-code{font-family:'Inter',monospace;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--tx3);text-transform:uppercase}
.sheet-id-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase}
.sheet-id-badge.rM{background:#dbeafe;color:#1d4ed8}
.sheet-id-badge.rN{background:#f3e8ff;color:#7c3aed}
.sheet-id-badge.rF{background:#fce7f3;color:#be185d}
.sheet-id-badge.rO{background:#f3f4f6;color:#6b7280}

/* 일러스트 + 이름 */
.sheet-hero{display:flex;gap:20px;align-items:flex-start;margin-bottom:24px}
.sheet-illust{width:100px;height:100px;border-radius:10px;flex-shrink:0;overflow:hidden;border:1px solid var(--bd)}
.sheet-illust-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;filter:grayscale(.3)}
.sheet-illust-ph{font-size:32px;opacity:.15}
.sheet-name-block{display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:4px}
.sheet-name{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.1;margin-bottom:3px}
.sheet-subname{font-size:13px;color:var(--tx3);margin-bottom:10px}
.sheet-badges{display:flex;gap:5px;flex-wrap:wrap}
.sheet-badge{font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--bd);color:var(--tx2);letter-spacing:.3px}

/* 구분선 */
.sheet-divider{height:1px;background:var(--bd);margin:0 0 20px}

/* 데이터 그리드 */
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:20px}
.sheet-cell{background:var(--sb);padding:12px 14px}
.sheet-cell-label{font-size:9px;font-weight:600;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px}
.sheet-cell-value{font-size:14px;font-weight:600;color:var(--tx)}
.sheet-cell-value.accent{color:inherit}
.sheet-cell.full{grid-column:1/-1}

/* 태그 섹션 */
.sheet-tag-label{font-size:9px;font-weight:600;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;margin-bottom:8px}
.sheet-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.sheet-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--bd);color:var(--tx2)}

/* 일러스트 등록 힌트 */
.sheet-hint{border:1px dashed var(--bd2);border-radius:8px;padding:20px;text-align:center;margin-bottom:0}
.sheet-hint-icon{font-size:20px;opacity:.2;margin-bottom:6px}
.sheet-hint-text{font-size:10px;color:var(--tx3);line-height:1.6}

/* ── EP NAV ── */
.ep-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 24px;border-top:1px solid var(--bd);background:var(--sb)}
.ep-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx2);font-size:12px;font-weight:500;transition:all .12s;min-width:0;max-width:260px}
.ep-nav-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.ep-nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.ep-nav-btn:first-child{justify-self:start}
.ep-nav-btn:last-child{justify-self:end}
.ep-nav-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PAGE SECTIONS ── */
#list-view{display:block}
#detail-view{display:none}
</style>

<!-- ── LIST VIEW ── -->
<div id="list-view">
  <div class="top-bar">
    <span class="tb-crumb">biz-OC-doll</span>
    <span class="tb-arr">›</span>
    <span class="tb-cur">캐릭터 일람</span>
  </div>
  <div class="char-page">
    <div class="char-filter-row">
      <div class="char-filter-tabs" id="filter-tabs"></div>
      <input class="char-search" type="text" placeholder="캐릭터 검색..." id="char-search-input" oninput="setSearch(this.value)" />
      <span class="char-count" id="char-count-lbl"></span>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </div>
</div>

<!-- ── DETAIL VIEW ── -->
<div id="detail-view">
  <div class="top-bar">
    <button class="tb-back" onclick="showList()">← 목록</button>
    <div class="tb-sep"></div>
    <span class="tb-crumb">biz-OC-doll</span>
    <span class="tb-arr">›</span>
    <span class="tb-crumb">캐릭터 일람</span>
    <span class="tb-arr">›</span>
    <span class="tb-cur" id="detail-breadcrumb"></span>
  </div>

  <div class="sheet-wrap">
    <!-- ID 코드 -->
    <div class="sheet-id-bar">
      <span class="sheet-id-code" id="detail-id-code">BIZOC-2026-001-M</span>
      <span class="sheet-id-badge" id="detail-gender-badge">M</span>
    </div>

    <!-- 일러스트 + 이름 -->
    <div class="sheet-hero">
      <div class="sheet-illust" id="detail-illust">
        <div class="sheet-illust-inner" id="detail-illust-inner">
          <span class="sheet-illust-ph">◉</span>
        </div>
      </div>
      <div class="sheet-name-block">
        <div class="sheet-name" id="detail-name"></div>
        <div class="sheet-subname" id="detail-subname"></div>
        <div class="sheet-badges" id="detail-badges"></div>
      </div>
    </div>

    <div class="sheet-divider"></div>

    <!-- 데이터 그리드 -->
    <div class="sheet-grid" id="detail-grid">
      <div class="sheet-cell">
        <div class="sheet-cell-label">ID Code</div>
        <div class="sheet-cell-value" id="dc-id" style="font-size:11px;letter-spacing:1px;font-family:monospace"></div>
      </div>
      <div class="sheet-cell">
        <div class="sheet-cell-label">Gender</div>
        <div class="sheet-cell-value" id="dc-gender"></div>
      </div>
      <div class="sheet-cell">
        <div class="sheet-cell-label">Physical Age</div>
        <div class="sheet-cell-value" id="dc-age"></div>
      </div>
      <div class="sheet-cell">
        <div class="sheet-cell-label">Body Type</div>
        <div class="sheet-cell-value" id="dc-body"></div>
      </div>
      <div class="sheet-cell full">
        <div class="sheet-cell-label">Holder</div>
        <div class="sheet-cell-value" id="dc-holder" style="color:var(--tx3)"></div>
      </div>
    </div>

    <!-- 태그 -->
    <div class="sheet-tag-label">Tags</div>
    <div class="sheet-tags" id="detail-tags"></div>

    <!-- 일러스트 힌트 -->
    <div class="sheet-hint">
      <div class="sheet-hint-icon">◻</div>
      <div class="sheet-hint-text">일러스트 / 상세 프로필을 이곳에 등록하세요<br><span style="opacity:.6">illustration · profile · story</span></div>
    </div>
  </div>

  <div class="ep-nav">
    <button class="ep-nav-btn" id="nav-prev" onclick="navChar(-1)"><span>←</span><span class="ep-nav-title" id="nav-prev-name"></span></button>
    <div></div>
    <button class="ep-nav-btn" id="nav-next" onclick="navChar(1)"><span class="ep-nav-title" id="nav-next-name"></span><span>→</span></button>
  </div>
</div>

<script>
/* ── DATA ── */
(function(){
if(window.CHARACTERS) return; // 이미 생성된 경우 스킵
  const FIRSTNAMES=[
    "아이","유이","하루","미오","사쿠라","린","아카네","유나","미나","코토",
  ];
  const LASTNAMES=[
    "야마다","타나카","스즈키","사토","와타나베","이토","나카무라","코바야시","카토","요시다",
  ];
  const TYPES=[];
  for(let i=0;i<10;i++){
    if(i<3) TYPES.push("M");
    else if(i<5) TYPES.push("N");
    else if(i<8) TYPES.push("F");
    else TYPES.push("O");
  }

  const GRADIENTS_M=["135deg,#dbeafe,#93c5fd","135deg,#eff6ff,#60a5fa","135deg,#e0f2fe,#38bdf8"];
  const GRADIENTS_N=["135deg,#f3e8ff,#c4b5fd","135deg,#faf5ff,#a78bfa","135deg,#ede9fe,#8b5cf6"];
  const GRADIENTS_F=["135deg,#fce7f3,#f9a8d4","135deg,#fdf2f8,#e879f9","135deg,#fff0f9,#fb7185"];
  const GRADIENTS_O=["135deg,#f3f4f6,#d1d5db","135deg,#f9fafb,#9ca3af","135deg,#f1f5f9,#cbd5e1"];
  const SAMPLE_TAGS=[
    ["활발","음악","리더"],["조용","독서","미술"],["쾌활","댄스","요리"],
    ["신비","마법","고양이"],["용감","스포츠","모험"],["온화","꽃","힐링"],
    ["다크","미스터리","밤"],["밝음","아이돌","친구"],["냉정","전략","검"],
    ["천진","자연","빛"]
  ];

  const AGES=[19,22,17,24,20,18,23,21,26,19];
  const BODIES=["M","S","L","M","S","M","L","M","S","L"];

  window.CHARACTERS = Array.from({length:10},(_,i)=>{
    const t=TYPES[i];
    const fn=FIRSTNAMES[i%FIRSTNAMES.length];
    const ln=LASTNAMES[i%LASTNAMES.length];
    const gradMap={M:GRADIENTS_M,N:GRADIENTS_N,F:GRADIENTS_F,O:GRADIENTS_O};
    const grads=gradMap[t];
    const grad=grads[i%grads.length];
    const tags=SAMPLE_TAGS[i%SAMPLE_TAGS.length];
    const serial=String(i+1).padStart(3,"0");
    const bodySize=BODIES[i];
    const idCode=`BIZOC-2026-${serial}-${bodySize}`;
    return {id:i+1, firstname:fn, lastname:ln, type:t, grad, tags, registered:true,
            age:AGES[i], bodySize, idCode, holder:"—"};
  });
})();

/* ── STATE ── */
window.charState = window.charState || { filter:"ALL", search:"", activeId:null };
window.charState.activeId = null;
const state = window.charState;

/* ── RENDER LIST ── */
function renderList(){
  const q = state.search.trim().toLowerCase();
  const filtered = window.CHARACTERS.filter(c=>{
    const typeOk = state.filter==="ALL" || c.type===state.filter;
    const nameOk = !q || c.firstname.toLowerCase().includes(q) || c.lastname.toLowerCase().includes(q);
    return typeOk && nameOk;
  });

  const counts = {ALL:0, M:0, N:0, F:0, O:0};
  window.CHARACTERS.forEach(c=>{counts[c.type]++;counts.ALL++;});

  const TAB_INFO = {
    ALL:{label:"ALL", color:"#6b7280"},
    M:{label:"M", color:"#3b82f6"},
    N:{label:"N", color:"#8b5cf6"},
    F:{label:"F", color:"#ec4899"},
    O:{label:"O", color:"#9ca3af"},
  };

  // Filter tabs
  document.getElementById('filter-tabs').innerHTML = ["ALL","M","N","F","O"].map(t=>`
    <button class="char-tab ${state.filter===t?"active":""}" onclick="setFilter('${t}')">
      ${t==="ALL"?"ALL":`${t} <span style="color:${TAB_INFO[t].color}">●</span>`}
      <span style="font-size:10px;opacity:.6">${counts[t]}</span>
    </button>
  `).join("");

  document.getElementById('char-count-lbl').textContent = filtered.length + "명 표시";

  document.getElementById('char-grid').innerHTML = filtered.length===0
    ? `<div class="char-empty">검색 결과 없음</div>`
    : filtered.map(c=>{
        const clrMap={M:"#3b82f6",N:"#8b5cf6",F:"#ec4899",O:"#9ca3af"};
        const dclr = clrMap[c.type]||"#9ca3af";
        const isSlot = !c.registered;
        return `<div class="char-card ${isSlot?"char-slot":""}" onclick="openChar(${c.id})">
          <div class="char-thumb">
            ${isSlot?``:`<span style="font-size:20px;opacity:.2">◉</span>`}
          </div>
          <div class="char-name-row">
            <span class="char-circle" style="color:${dclr}">●</span>
            <span class="char-firstname">${isSlot?"-":String(c.id).padStart(3,"0")}</span>
          </div>
          <div class="char-lastname">-</div>
        </div>`;
      }).join("");
}

/* ── RENDER DETAIL ── */
function renderDetail(id){
  const c = window.CHARACTERS.find(ch=>ch.id===id);
  if(!c) return;
  const clrMap={M:"#3b82f6",N:"#8b5cf6",F:"#ec4899",O:"#9ca3af"};
  const dclr = clrMap[c.type]||"#9ca3af";
  const genderLabel={M:"Male",N:"Neutral",F:"Female",O:"Other"};
  const bodySizeLabel={S:"S — Small",M:"M — Medium",L:"L — Large"};

  // top bar breadcrumb
  document.getElementById('detail-breadcrumb').textContent = c.firstname+" "+c.lastname;

  // ID bar
  document.getElementById('detail-id-code').textContent = c.idCode;
  const gbadge = document.getElementById('detail-gender-badge');
  gbadge.textContent = c.type;
  gbadge.className = `sheet-id-badge r${c.type}`;

  // Illustration
  document.getElementById('detail-illust-inner').style.background = `linear-gradient(${c.grad})`;

  // Name
  document.getElementById('detail-name').textContent = c.firstname;
  document.getElementById('detail-subname').textContent = c.lastname;
  document.getElementById('detail-badges').innerHTML =
    `<span class="sheet-badge">${genderLabel[c.type]}</span>` +
    `<span class="sheet-badge">${bodySizeLabel[c.bodySize]||c.bodySize}</span>`;

  // Data cells
  document.getElementById('dc-id').textContent = c.idCode;
  document.getElementById('dc-id').style.color = dclr;
  document.getElementById('dc-gender').textContent = genderLabel[c.type];
  document.getElementById('dc-gender').style.color = dclr;
  document.getElementById('dc-age').textContent = c.age + "세";
  document.getElementById('dc-body').textContent = bodySizeLabel[c.bodySize]||c.bodySize;
  document.getElementById('dc-holder').textContent = c.holder;

  // Tags
  document.getElementById('detail-tags').innerHTML = c.tags.map(t=>
    `<span class="sheet-tag">${t}</span>`).join("");

  // Prev / Next
  const allChars = state.filter==="ALL"
    ? window.CHARACTERS
    : window.CHARACTERS.filter(ch=>ch.type===state.filter);
  const idx = allChars.findIndex(ch=>ch.id===c.id);
  const prev = allChars[idx-1]||null;
  const next = allChars[idx+1]||null;
  document.getElementById('nav-prev-name').textContent = prev ? prev.firstname+" "+prev.lastname : "없음";
  document.getElementById('nav-next-name').textContent = next ? next.firstname+" "+next.lastname : "없음";
  document.getElementById('nav-prev').className = "ep-nav-btn"+(prev?"":" disabled");
  document.getElementById('nav-next').className = "ep-nav-btn"+(next?"":" disabled");
}

/* ── ACTIONS ── */
window.setFilter = function(f){ state.filter=f; renderList(); };
window.setSearch = function(v){ state.search=v; renderList(); };
window.openChar = function(id){
  state.activeId=id;
  renderDetail(id);
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  window.scrollTo(0,0);
};
window.showList = function(){
  state.activeId=null;
  document.getElementById('detail-view').style.display='none';
  document.getElementById('list-view').style.display='block';
  renderList();
};
window.navChar = function(dir){
  const allChars=state.filter==="ALL"?window.CHARACTERS:window.CHARACTERS.filter(ch=>ch.type===state.filter);
  const idx=allChars.findIndex(ch=>ch.id===state.activeId);
  const target=allChars[idx+dir];
  if(target) openChar(target.id);
};

/* ── INIT ── */
renderList();
</script>
</body>
</html>
