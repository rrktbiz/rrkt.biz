<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>biz.rrkt</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='white' stroke='%23111' stroke-width='1.5'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='22' font-weight='700' fill='%23111'>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--sb:#fff;--sm:#fafafa;--bd:#e2e2e2;--bd2:#c6c6c6;
  --tx:#1a1a1a;--tx2:#5f5f5f;--tx3:#a0a0a0;
  --fn:'Inter','Noto Sans KR',sans-serif;
  --sm-w:240px;
}
html{height:100%;overflow:hidden;font-size:14px}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fn);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
button{font-family:var(--fn);cursor:pointer}a{text-decoration:none}
/* #app removed - content is direct body child */

/* ── TOPBAR ── */
#topbar{
  height:48px;flex-shrink:0;
  background:var(--sb);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 16px;gap:14px;
  position:fixed;top:0;left:0;right:0;z-index:100;
  transition:transform .28s ease;
}
#menu-toggle{
  background:transparent;border:none;width:32px;height:32px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  border-radius:6px;transition:background .12s;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  outline:none;
}
#menu-toggle:hover{background:var(--bg)}
.bar{width:18px;height:2px;background:var(--tx);border-radius:2px;flex-shrink:0;display:block}
#topbar-logo{font-size:15px;font-weight:700;color:#111;letter-spacing:-.04em;cursor:pointer}
#topbar-logo:hover{opacity:.6}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-lang-btn{font-size:11px;font-weight:600;padding:4px 8px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--tx2);transition:all .12s}
.tb-lang-btn:hover{background:var(--tx);color:#fff;border-color:var(--tx)}
#topbar-cal-btn{font-size:12px;padding:5px 10px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--tx2);display:flex;align-items:center;gap:5px;transition:all .12s;margin-left:8px}
#topbar-cal-btn:hover{background:var(--bg);color:var(--tx)}

/* ── FLOATING NAV ── */
#nav-layer{
  position:fixed;top:48px;left:0;
  display:flex;z-index:200;
  pointer-events:none;
  height:calc(100vh - 48px);
  height:calc(100dvh - 48px);
}
#nav-panel{
  width:200px;
  background:var(--sb);
  border-right:1px solid var(--bd);
  box-shadow:4px 4px 20px #0000001a;
  border-radius:0;
  display:flex;flex-direction:column;
  overflow-y:auto;
  height:100%;
  pointer-events:all;
  transform:translateX(-210px);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
#nav-layer.open #nav-panel{transform:translateX(0)}
#sub-panel-wrap{display:flex;align-items:stretch;visibility:hidden;opacity:0;transition:opacity .16s ease;height:100%}
#nav-layer.open #sub-panel-wrap{visibility:visible;opacity:1}

/* Sub panel */
#sub-panel{
  width:var(--sm-w);
  background:var(--sm);
  border-right:1px solid var(--bd);
  box-shadow:4px 4px 20px #0000001a;
  border-radius:0;
  display:flex;flex-direction:column;
  height:100%;
  pointer-events:all;
  opacity:0;transform:translateX(-8px);
  transition:opacity .16s ease, transform .16s ease;
  visibility:hidden;
}
#sub-panel.visible{opacity:1;transform:translateX(0);visibility:visible}


#sm-inner{flex:1;overflow-y:auto;min-width:0}

/* Nav items */
.nav-proj-item{
  display:flex;align-items:center;
  width:100%;padding:11px 16px;
  background:transparent;border:none;border-left:2px solid transparent;
  color:var(--tx2);font-size:13px;font-weight:400;text-align:left;
  transition:all .12s;gap:8px;
}
.nav-proj-item:hover{color:var(--tx);background:var(--bg)}
.nav-proj-item.active{color:var(--acc,#111);border-left-color:var(--acc,#111);background:color-mix(in srgb,var(--acc,#888) 7%,transparent);font-weight:600}
.nav-proj-dot{display:none}
.nav-cal-item{display:flex;align-items:center;gap:7px;width:100%;padding:10px 16px;background:transparent;border:none;color:var(--tx2);font-size:12px;text-align:left;transition:all .12s}
.nav-cal-item:hover{background:var(--bg);color:var(--tx)}
.nav-cal-item.active{color:var(--tx);font-weight:500;background:var(--bg)}
.nav-sep{height:1px;background:var(--bd);margin:4px 10px}
.nav-lang-section{padding:10px;border-top:1px solid var(--bd);margin-top:auto}
.nav-lang-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:6px}
.nav-lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.nav-lang-btn{font-size:11px;font-weight:600;padding:6px 4px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx2);transition:all .12s;text-align:center}
.nav-lang-btn:hover{background:var(--tx);color:#fff;border-color:var(--tx)}

/* Sub panel header */
.sm-hd{padding:12px 14px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sm);z-index:2}
.sm-hd-left{display:flex;flex-direction:column;gap:1px}
.sm-proj-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase}
.sm-proj-name{font-size:16px;font-weight:700}
.sm-hd-btns{display:flex;align-items:center;gap:6px}
.sm-pin-btn{
  background:transparent;border:1px solid var(--bd);border-radius:5px;
  color:var(--tx3);font-size:10px;font-weight:600;padding:3px 8px;
  transition:all .12s;display:flex;align-items:center;gap:3px;
}
.sm-pin-btn:hover{border-color:var(--bd2);color:var(--tx)}
.sm-pin-btn.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.sm-x{background:transparent;border:none;color:var(--tx3);font-size:16px;padding:0 4px;line-height:1;transition:color .12s}
.sm-x:hover{color:var(--tx)}

/* Intro/char links */
.sm-intro-link{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin:10px 12px 0;padding:9px 12px;background:#fff;color:var(--tx);border:1px solid var(--bd);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:background .12s;width:calc(100% - 24px)}
.sm-intro-link:hover{background:var(--bg)}
.sm-char-link{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin:5px 12px 0;padding:9px 12px;background:#fff;color:var(--tx);border:1px solid var(--bd);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:background .12s;width:calc(100% - 24px)}
.sm-char-link:hover{background:var(--bg)}
.sm-yt-link{display:flex;align-items:center;gap:8px;margin:5px 12px 0;padding:9px 12px;background:#fff;color:#e00;border:1px solid #fdd;border-radius:7px;font-size:12px;font-weight:500;width:calc(100% - 24px)}
.sm-yt-link:hover{background:#fff5f5}
.sm-stats{display:flex;border-bottom:1px solid var(--bd);margin-top:10px}
.sm-stat{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--bd)}
.sm-stat:last-child{border-right:none}
.sm-stat-n{font-size:16px;font-weight:700}
.sm-stat-l{font-size:9px;font-weight:600;letter-spacing:.8px;color:var(--tx3);margin-top:1px;text-transform:uppercase}
.sm-tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 12px}
.sm-tab{padding:10px 11px 9px;background:transparent;border:none;border-bottom:2px solid transparent;font-size:13px;font-weight:500;color:var(--tx3);transition:color .12s,border-color .12s;margin-bottom:-1px}
.sm-tab:hover{color:var(--tx)}
.sm-tab.active{color:var(--tacc,#111);border-bottom-color:var(--tacc,#111);font-weight:700}
.vol-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:13px 11px}
.vol-card{cursor:pointer;transition:transform .14s ease}
.vol-card:hover{transform:translateY(-2px)}
.vol-thumb{aspect-ratio:3/4;border-radius:6px;border:1px solid var(--bd);position:relative;overflow:hidden;margin-bottom:7px}
.vol-thumb.yt{aspect-ratio:16/9}
.vol-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px}
.vol-type-chip{position:absolute;top:6px;left:6px;font-size:8px;font-weight:600;padding:2px 5px;border-radius:3px;background:#00000060;color:#fff}
.vol-num{position:absolute;bottom:0;left:0;right:0;padding:20px 8px 7px;background:linear-gradient(to top,#00000075,transparent);font-size:9px;font-weight:600;color:#ffffffb0}
.vol-title{font-size:11px;font-weight:500;color:var(--tx);line-height:1.4;margin-bottom:4px}
.vol-tags{display:none}
.vol-tag{display:none}
.doll-banners{display:flex;flex-direction:column;gap:8px;padding:12px 11px}
.doll-banner{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:18px 16px;border-radius:10px;border:1px solid var(--bd);background:#fff;cursor:pointer;transition:background .12s;min-height:80px}
.doll-banner:hover{background:var(--bg)}
.doll-banner-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.doll-banner-label{font-size:14px;font-weight:700;color:var(--tx)}
.doll-banner-count{font-size:11px;color:var(--tx3);margin-top:auto}

/* ── CONTENT ── */
#content{display:block;margin-top:48px;height:calc(100vh - 48px);height:calc(100dvh - 48px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);transition:margin-top .28s ease,height .28s ease;padding-bottom:env(safe-area-inset-bottom,0px)}
#nav-backdrop{display:none;position:fixed;inset:0;top:48px;z-index:150;pointer-events:none}
#nav-backdrop.show{display:block}
body.nav-pinned #nav-backdrop{display:none!important}

/* ── HOME ── */
.home-page{padding:28px 32px;max-width:950px;margin:0 auto}
.home-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
.home-logo-big{font-size:28px;font-weight:700;color:#111;letter-spacing:-.04em}
.home-clock{font-size:28px;font-weight:300;color:var(--tx2);letter-spacing:.02em;font-variant-numeric:tabular-nums}
/* 3-column: about | recent-work | right-panel */
.home-body{display:grid;grid-template-columns:220px 1fr 260px;gap:18px;align-items:start}
/* ── About card (left) ── */
.home-about-card{background:var(--sb);border:1px solid var(--bd);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.home-about-card-hd{padding:8px 12px;border-bottom:1px solid var(--bd);font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase}
.home-about-avatar-wrap{width:100%;padding:16px;display:flex;justify-content:center;background:var(--bg)}
.home-about-popart{width:160px;height:160px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px #0003,0 0 0 3px #111}
.home-about-info{padding:12px 14px 14px}
.home-about-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:5px;text-align:center}
.home-about-bio{font-size:10px;color:var(--tx3);line-height:1.6;text-align:center}
.home-about-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;justify-content:center}
.home-about-tag{font-size:8px;padding:2px 6px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);color:var(--tx3)}
/* ── Recent work panel (center) ── */
.home-recent-panel{background:var(--sb);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.home-recent-panel-hd{padding:10px 14px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.home-recent-panel-lbl{font-size:13px;font-weight:700;letter-spacing:0.5px;color:var(--tx2);text-transform:none}
.home-recent-body{padding:8px}
.home-recent-grid{display:grid;grid-template-columns:1fr;gap:4px}
.home-r-item{padding:6px 12px;background:var(--bg);border:1px solid var(--bd);border-left-width:3px;border-radius:7px;cursor:default;transition:all .12s}
.home-r-item.is-done{cursor:pointer}
.home-r-item.is-done:hover{background:color-mix(in srgb,var(--bd) 30%,var(--bg));transform:translateX(2px)}
.home-r-top{display:flex;justify-content:space-between;margin-bottom:3px;align-items:center}
.home-r-proj{font-size:11px;font-weight:500}.home-r-date{font-size:10px;color:var(--tx3)}
.home-r-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.home-r-title{font-size:13px;font-weight:400;color:var(--tx3);line-height:1.4}
.home-r-status{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;display:inline-block;flex-shrink:0}
.home-r-status.done{background:#ffe4e4;color:#c0392b}
.home-r-item.is-wip .home-r-proj{color:#bbb!important}
.home-r-item.is-wip .home-r-date{color:#bbb}
.home-r-item.is-wip .home-r-title{color:#bbb}
.home-r-item.is-done .home-r-title{color:#1a1a1a;font-weight:500}
.home-r-reltime{font-size:9px;color:var(--tx3);margin-left:3px}
.home-r-status.wip{background:#fff9e0;color:#d4a017}
.home-r-status.plan{background:var(--bg);color:var(--tx3);border:1px solid var(--bd)}
.home-r-empty{padding:28px;text-align:center;font-size:11px;color:var(--tx3)}
/* ── Right column ── */
.home-right{display:flex;flex-direction:column;gap:14px}
.home-mini-cal{background:var(--sb);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.hmc-head{padding:10px 14px 8px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.hmc-month{font-size:11px;font-weight:700;color:var(--tx)}
.hmc-nav{display:flex;gap:2px}
.hmc-btn{background:transparent;border:none;color:var(--tx3);font-size:13px;padding:1px 5px;line-height:1}
.hmc-btn:hover{color:var(--tx)}
.hmc-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 8px 8px;gap:1px}
.hmc-dn{text-align:center;font-size:8px;font-weight:600;color:var(--tx3);padding:3px 0}
.hmc-dn.sun{color:#d04040}.hmc-dn.sat{color:#4065c0}
.hmc-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;gap:2px;font-size:9px;color:var(--tx3)}
.hmc-cell.has-w{cursor:pointer;color:var(--tx)}
.hmc-cell.has-w:hover{background:var(--bg)}
.hmc-cell.today{font-weight:800;color:#fff}
.hmc-cell.today span:first-child{background:#3558c0;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
.hmc-cell.sun-c{color:#c03030}.hmc-cell.sat-c{color:#3a5cb0}
.hmc-dot{width:4px;height:4px;border-radius:50%}
.home-widget{background:var(--sb);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.hw-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px}
.hw-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)}
.hw-stat:last-child{border-bottom:none}
.hw-stat-l{font-size:11px;color:var(--tx2)}.hw-stat-n{font-size:13px;font-weight:700;color:var(--tx)}
.home-twitter-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#000;color:#fff;border-radius:10px;border:none;font-size:12px;font-weight:500;cursor:pointer;width:100%;justify-content:center}
.home-twitter-btn:hover{background:#1a1a1a}
/* ── FOCUS WIDGET ── */
.focus-widget-inner{padding:10px 12px 12px;border-top:1px solid var(--bd)}
.focus-widget-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.focus-widget-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.focus-badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;background:#fff4e0;color:#c47a0a;border:1px solid #ffe0a0;white-space:nowrap;flex-shrink:0}
.focus-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.focus-row:last-child{margin-bottom:0}
.focus-lbl{font-size:10px;color:var(--tx2);width:74px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.focus-bar-wrap{flex:1;background:var(--bd);border-radius:3px;height:5px;overflow:hidden}
.focus-bar{height:5px;border-radius:3px;transition:width .3s ease}
.focus-cnt{min-width:14px;text-align:right}
/* ── AUTHOR STATUS WIDGET ── */
.author-status{border-top:1px solid var(--bd);background:var(--sb)}
.author-status-bar{display:flex;align-items:center;gap:8px;padding:9px 12px}
.author-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:statusPulse 2.4s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.author-status-dot.active{background:#22c55e;box-shadow:0 0 0 2px #22c55e33}
.author-status-dot.slow{background:#f59e0b;animation:none}
.author-status-dot.away{background:#94a3b8;animation:none}
.author-status-label{font-size:14px;font-weight:500;color:var(--tx)}
.author-status-body{padding:0 12px 12px;font-size:13px;color:var(--tx2);line-height:1.55}
/* ── EVAL WIDGET ── */
.eval-widget{border-radius:8px;border:1px solid var(--bd);overflow:hidden;display:flex;align-items:center;gap:0}
.eval-banner{padding:8px 12px;display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.eval-emoji{font-size:16px;flex-shrink:0;line-height:1}
.eval-text{min-width:0}
.eval-title{font-size:12px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eval-msg{font-size:10px;color:var(--tx2);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eval-chips{display:flex;gap:3px;padding:8px 10px 8px 0;align-items:center;flex-shrink:0;flex-wrap:nowrap}
.eval-chip{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;background:#fff;border:1px solid var(--bd);color:var(--tx2);white-space:nowrap}
/* legacy - kept for safety */
.home-about{background:var(--sb);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.home-about-hd{padding:10px 14px 8px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.home-about-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.home-about-avatar{width:48px;height:48px;border-radius:50%;border:1px solid var(--bd);background:linear-gradient(135deg,#e8e8e8,#d0d0d0);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.home-about-row{display:flex;gap:12px;align-items:flex-start}
.home-recent-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px}

/* ── HOME HIGHLIGHT CARD ── */
.home-hl-wrap{padding:10px}
.home-hl-card{border:1px solid var(--bd);border-radius:9px;overflow:hidden;cursor:pointer;transition:opacity .12s}
.home-hl-card:hover{opacity:.82}
.home-hl-thumb{height:72px;display:flex;align-items:flex-end;padding:8px 12px;position:relative}
.home-hl-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#fff;color:#c0392b}
.home-hl-vol{font-size:9px;color:#ffffff70}
.home-hl-body{padding:9px 12px;background:var(--sm);display:flex;align-items:center;justify-content:space-between}
.home-hl-title{font-size:13px;font-weight:500;color:var(--tx)}
.home-hl-cta{font-size:11px;color:#3558c0;font-weight:500;flex-shrink:0;margin-left:8px}

/* ── HOME WIP SIMPLE LIST ── */
.home-wip-hd{padding:8px 14px 7px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.home-wip-lbl{font-size:11px;font-weight:500;color:var(--tx3)}
.home-wip-sub{font-size:10px;color:var(--tx3)}
.home-wip-list{padding:2px 14px 10px;display:flex;flex-direction:column}
.home-wip-item{display:flex;align-items:center;gap:0;padding:7px 0;border-bottom:1px solid var(--bd)}
.home-wip-item:last-child{border-bottom:none}
.home-wip-proj{font-size:11px;color:var(--tx3);flex:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-wip-title{font-size:12px;color:var(--tx2);flex:1;text-align:center}

/* ── HOME AUTHOR NOTE ── */
.home-author-note{background:var(--sb);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.home-author-note-hd{padding:7px 12px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.home-author-note-body{padding:12px 14px}
.home-author-note-text{font-size:12px;color:var(--tx2);line-height:1.75}
.home-author-note-date{font-size:9px;color:var(--tx3);margin-top:8px}

/* ── HOME VISITOR SIMPLE ── */
.home-visitor-simple{padding:6px 2px 2px}
.home-visitor-simple-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.home-visitor-simple-row{display:flex;align-items:baseline;gap:5px}
.home-visitor-n{font-size:16px;font-weight:300;color:var(--tx2)}
.home-visitor-l{font-size:10px;color:var(--tx3)}
.home-visitor-sep{font-size:12px;color:var(--bd2);margin:0 4px}

/* ── CALENDAR ── */
.cal-page{padding:24px 20px 28px;max-width:calc(100% - 160px);margin:0 auto}
.cal-page-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:16px}
/* 연도 탭 */
.cal-year-row{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.cal-year-tab{padding:5px 14px;border:1px solid var(--bd);border-radius:20px;font-size:12px;font-weight:600;color:var(--tx3);background:transparent;cursor:pointer;transition:all .14s}
.cal-year-tab:hover{border-color:var(--bd2);color:var(--tx)}
.cal-year-tab.active{background:#3558c0;color:#fff;border-color:#3558c0}
.cal-year-overview-btn{padding:5px 12px;border:1px solid var(--bd);border-radius:20px;font-size:11px;font-weight:600;color:var(--tx3);background:transparent;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:4px}
.cal-year-overview-btn:hover{border-color:#3558c0;color:#3558c0}
.cal-year-overview-btn.active{background:#3558c0;color:#fff;border-color:#3558c0}
/* 연간 요약 그리드 */
.cal-year-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:24px}
.cal-mini-month{background:var(--sb);border:1px solid var(--bd);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .14s}
.cal-mini-month:hover{box-shadow:0 2px 10px #0001}
.cal-mini-month.cur-month{border-color:#3558c0;box-shadow:0 0 0 1px #3558c0}
.cal-mm-head{padding:7px 9px 5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.cal-mm-lbl{font-size:11px;font-weight:700;color:var(--tx)}
.cal-mm-count{font-size:8px;font-weight:600;color:var(--tx3);background:var(--bg);padding:1px 6px;border-radius:10px}
.cal-mm-count.has{background:#eef2ff;color:#3558c0}
.cal-mm-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 5px 5px;gap:1px}
.cal-mm-dn{text-align:center;font-size:6.5px;font-weight:600;color:var(--tx3);padding:1px 0}
.cal-mm-dn.s{color:#c03030}.cal-mm-dn.sa{color:#3a5cb0}
.cal-mm-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:7.5px;color:var(--tx3)}
.cal-mm-cell.hw{background:color-mix(in srgb,#c0392b 15%,transparent);color:#c0392b;font-weight:700}
.cal-mm-cell.td{background:#3558c0;color:#fff;font-weight:800;border-radius:50%}
/* ── TIMELINE VIEW ── */
.cal-timeline{padding-bottom:32px}
.cal-tl-year-block{margin-bottom:40px}
.cal-tl-multi-grid{display:grid;align-items:start;gap:0 32px}
.cal-tl-year-col{display:flex;flex-direction:column}
.cal-tl-year-col .cal-tl-year-hd{padding:0 0 14px 0;margin-bottom:0;display:flex;align-items:center;gap:10px}
.cal-tl-year-col .cal-tl-year-hd .cal-tl-year-line{flex:1;height:1px;background:var(--bd)}
.cal-tl-year-col .cal-tl-month-row{border-bottom:1px solid var(--bd)}
.cal-tl-year-col .cal-tl-entries{padding:7px 6px}
.cal-tl-year-col .cal-tl-entry-title{max-width:140px}
.cal-tl-year-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px;cursor:pointer}
.cal-tl-year-label{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-.03em}
.cal-tl-year-count{font-size:11px;font-weight:600;color:var(--tx3);background:var(--bg);border:1px solid var(--bd);padding:2px 10px;border-radius:12px}
.cal-tl-year-line{flex:1;height:1px;background:var(--bd)}
.cal-tl-months{display:flex;flex-direction:column;gap:0}
.cal-tl-month-row{display:flex;align-items:flex-start;gap:0;border-bottom:1px solid var(--bd);background:transparent}
.cal-tl-month-row:first-child{border-top:1px solid var(--bd)}
.cal-tl-month-row.empty{opacity:.38}
.cal-tl-month-label{width:46px;flex-shrink:0;padding:8px 0 8px 0;font-size:11px;font-weight:600;color:var(--tx3);display:flex;align-items:center}
.cal-tl-month-row.cur-mo .cal-tl-month-label{color:#3558c0;font-weight:700}
.cal-tl-entries{flex:1;display:flex;flex-wrap:nowrap;gap:4px;padding:7px 10px;min-height:32px;align-items:center;overflow:hidden}
.cal-tl-entry{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;transition:opacity .12s;border:1px solid transparent}
.cal-tl-entry:hover{opacity:.75}
.cal-tl-entry-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cal-tl-entry-title{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-tl-entry-st{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0}
.cal-tl-empty-lbl{font-size:11px;color:var(--tx3);padding:2px 0}
.cal-top-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.cal-nav-btn{background:transparent;border:1px solid var(--bd);border-radius:6px;color:var(--tx2);font-size:16px;padding:4px 12px;line-height:1;transition:all .12s}
.cal-nav-btn:hover{background:var(--bg);color:var(--tx)}
.cal-month-lbl{font-size:15px;font-weight:700;color:var(--tx)}
.cal-layout{display:grid;grid-template-columns:1fr 210px;gap:20px;align-items:start}
.cal-full{background:var(--sb);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.cal-dnames{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--bd)}
.cal-dn{padding:9px 6px;font-size:12px;font-weight:700;color:var(--tx3);text-align:center}
.cal-dn.sun{color:#d04040}.cal-dn.sat{color:#4065c0}
.cal-grid-rows{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:110px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:6px 6px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:transparent}
.cal-cell.today{background:#eef2ff;border-top:2px solid #3558c0}
.cal-cell.sel{background:#f0f0f0}
.cal-cell.has-work{cursor:pointer}
.cal-cell.has-work:hover{background:#ebebeb}
.cal-day-num{font-size:13px;font-weight:600;color:var(--tx3);margin-bottom:5px;display:block}
.cal-cell.today .cal-day-num{color:#fff!important;font-weight:800;background:#3558c0;border-radius:50%;width:26px;height:26px;display:inline-flex!important;align-items:center;justify-content:center;font-size:13px;line-height:1}
.cal-cell.sun-col .cal-day-num{color:#c03030}
.cal-cell.sat-col .cal-day-num{color:#3a5cb0}
.cal-cell.has-work .cal-day-num,.cal-cell.sel .cal-day-num{color:var(--tx)}
.cal-cell.today.has-work .cal-day-num,.cal-cell.today.sel .cal-day-num{color:#fff!important}
.cal-work-item{display:block;font-size:11px;font-weight:500;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;color:#fff}
.day-detail{margin-top:14px;background:var(--sb);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.dd-hd{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.dd-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)}
.dd-row:last-child{border-bottom:none}
.dd-bar{width:3px;height:30px;border-radius:2px;flex-shrink:0}
.dd-proj{font-size:9px;font-weight:600;color:var(--tx3);margin-bottom:2px}
.dd-name{font-size:12px;color:var(--tx)}
.dd-st{margin-left:auto;font-size:9px;font-weight:700}
.dd-st.done{color:#c0392b}.dd-st.plan{color:var(--tx3)}
.dd-empty{padding:14px;text-align:center;font-size:11px;color:var(--tx3)}
.recent-hd{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px}
.recent-list{display:flex;flex-direction:column;gap:5px}
.r-item{padding:9px 11px;background:var(--sb);border:1px solid var(--bd);border-left-width:3px;border-radius:7px}
.r-top{display:flex;justify-content:space-between;margin-bottom:3px}
.r-proj{font-size:9px;font-weight:600}.r-date{font-size:9px;color:var(--tx3)}
.r-title{font-size:11px;color:var(--tx2)}

/* ── TOP BAR (page) ── */
.top-bar{padding:10px 20px;background:var(--sb);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tb-back{background:transparent;border:none;color:var(--tx3);font-size:12px;padding:4px 8px;border-radius:5px;transition:all .12s;font-family:var(--fn)}
.tb-back:hover{background:var(--bg);color:var(--tx)}
.tb-sep{width:1px;height:14px;background:var(--bd)}
.tb-crumb{font-size:10px;font-weight:500;color:var(--tx3)}
.tb-arr{font-size:10px;color:var(--bd2)}
.tb-cur{font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.tb-sub-btn{margin-left:auto;background:transparent;border:1px solid var(--bd);border-radius:5px;color:var(--tx3);font-size:10px;font-weight:500;padding:4px 10px;transition:all .12s}
.tb-sub-btn:hover{border-color:var(--bd2);color:var(--tx)}
.tb-sub-btn.on{background:var(--bg);color:var(--tx);border-color:var(--bd2)}

/* ── INTRO ── */
.intro-hero{padding:32px 36px 26px;border-bottom:1px solid var(--bd);background:var(--sb)}
.intro-hero-inner{max-width:700px;margin:0 auto}
.intro-body{padding:24px 36px;max-width:700px;margin:0 auto}
.intro-eyebrow{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:8px}
.intro-title{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px}
.intro-desc{font-size:14px;color:var(--tx2);line-height:1.85;max-width:520px;margin-bottom:18px}
.intro-tags{display:flex;gap:6px;flex-wrap:wrap}
.intro-tag{font-size:11px;padding:4px 10px;border-radius:20px}
.intro-sec{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:12px;margin-top:24px}
.intro-ph{height:12px;border-radius:4px;background:var(--bd);margin-bottom:10px}
.cb-hint{margin-top:20px;padding:18px;border:1px dashed var(--bd2);border-radius:8px;font-size:11px;color:var(--tx3);text-align:center}

/* ── VOL BANNER ── */
.vol-banner{display:flex;gap:20px;padding:20px 0 24px;align-items:flex-start;background:var(--sb);max-width:700px;margin:0 auto;width:calc(100% - 40px)}
.vol-banner-thumb{width:150px;height:200px;border-radius:8px;flex-shrink:0;border:1px solid var(--bd)}
.vol-banner-thumb.yt{width:180px;height:102px}
.vb-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px}
.vb-title{font-size:17px;font-weight:700;margin-bottom:3px}
.vb-sub{font-size:12px;color:var(--tx2);margin-bottom:9px}
.vb-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.vb-tag{font-size:10px;padding:2px 8px;border-radius:4px}
.vb-synopsis{margin-top:12px;padding:0;background:transparent;border-radius:0;border:none}
.vb-synopsis-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:8px}
.vb-synopsis-text{font-size:12px;color:var(--tx2);line-height:1.7}

/* ── EPISODE LIST (default board) ── */
.ep-board{margin:16px auto 24px;max-width:700px;width:calc(100% - 40px);background:var(--sb);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.ep-board-head{display:grid;grid-template-columns:44px 1fr 90px auto;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase}
.ep-row{display:grid;grid-template-columns:44px 1fr 90px auto;padding:11px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;align-items:center}
.ep-row:last-child{border-bottom:none}
.ep-row:hover{background:#ebebeb}
.ep-row-locked{cursor:default}
.ep-row-locked:hover{background:transparent}
.ep-num{font-size:11px;color:var(--tx3);font-weight:500}
.ep-title-col{font-size:13px;color:var(--tx);display:flex;align-items:center;gap:7px}
.ep-status-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.ep-status-badge.done{background:#ffe4e4;color:#c0392b}
.ep-status-badge.wip{background:#F9F4CA;color:#F9CB4C}
.ep-status-badge.plan{background:#f0f0f0;color:#aaa}
.ep-date-col{font-size:10px;color:var(--tx3);text-align:right;white-space:nowrap}
.ep-status{font-size:10px;font-weight:700;text-align:right}
.ep-status.done{color:#c0392b}.ep-status.plan{color:var(--tx3)}

/* ── YOUTUBE-STYLE EPISODE LIST ── */
.yt-ep-list{display:flex;flex-direction:column;gap:0;padding:12px 0 24px;max-width:700px;margin:0 auto;width:calc(100% - 40px)}
.yt-ep-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--bd);cursor:pointer;align-items:flex-start;transition:opacity .12s}
.yt-ep-item:last-child{border-bottom:none}
.yt-ep-item:hover{opacity:.75}
.yt-ep-thumb{width:160px;height:90px;flex-shrink:0;border-radius:8px;border:1px solid var(--bd);position:relative;overflow:hidden}
.yt-ep-info{flex:1;min-width:0}
.yt-ep-num{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px}
.yt-ep-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.4}
.yt-ep-meta{font-size:11px;color:var(--tx3)}
.yt-ep-status{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:6px}
.yt-ep-status.done{background:#ffe4e4;color:#c0392b}
.yt-ep-status.wip{color:#666}
.yt-ep-status.plan{background:#f0f0f0;color:#999}

/* ── POSTYPE-STYLE CONTENT ── */
.postype-wrap{max-width:700px;margin:0 auto;padding:40px clamp(16px,4vw,40px) 60px;min-width:0;width:100%}
.postype-header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.postype-series-lbl{font-size:13px;color:var(--tx3);margin-bottom:8px;font-family:var(--fn);cursor:pointer;display:inline-block}
.postype-series-lbl:hover{color:var(--tx)}
.postype-title{font-size:22px;font-weight:700;line-height:1.4;margin-bottom:14px;font-family:var(--fn);color:#111;letter-spacing:-.02em}
.postype-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.postype-date{font-size:12px;color:var(--tx3)}
.postype-status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.postype-body{font-family:var(--fn);font-size:16px;line-height:2.0;color:#1a1a1a;letter-spacing:.01em;word-break:normal;overflow-wrap:break-word}
.postype-body p{margin-bottom:1.6em}
.postype-body .pt-para{padding-bottom:1.4em}
.postype-body .pt-blank{height:.9em}
.postype-body h2{font-size:18px;font-weight:700;margin:2em 0 0.8em;padding-left:12px;border-left:3px solid currentColor}
.postype-placeholder{color:var(--tx3);font-size:14px;line-height:2;font-family:var(--fn)}
.postype-placeholder p{margin-bottom:1.4em}
.postype-hint{margin-top:32px;padding:20px;border:1px dashed var(--bd2);border-radius:10px;font-size:12px;color:var(--tx3);text-align:center;font-family:var(--fn)}

/* ── EP NAV (prev/next + picker) ── */
.ep-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px clamp(12px,3vw,24px);max-width:700px;margin:0 auto;width:100%;min-width:0}
.ep-nav-outer{border-top:1px solid var(--bd);background:var(--sb);padding-bottom:32px}
/* ── VOL NAV BAR ── */
.vol-nav-outer{background:var(--sb);padding:14px 0 28px}
.vol-nav-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;max-width:700px;width:calc(100% - 40px);margin:0 auto}
.vol-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:transparent;border:1px solid var(--bd);border-radius:8px;color:var(--tx2);font-size:12px;font-weight:500;transition:all .12s;cursor:pointer;font-family:var(--fn);white-space:nowrap;overflow:hidden;max-width:220px}
.vol-nav-btn:hover:not(.disabled){background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.vol-nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.vol-nav-btn.prev{justify-self:start}
.vol-nav-btn.next{justify-self:end}
.vol-nav-btn-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vol-list-btn{justify-self:center;display:flex;align-items:center;gap:5px;padding:9px 18px;background:var(--sb);border:1px solid var(--bd2);border-radius:8px;font-size:11px;font-weight:600;color:var(--tx2);transition:all .12s;cursor:pointer;font-family:var(--fn)}
.vol-list-btn:hover{background:var(--bg);color:var(--tx)}
/* Vol picker modal */
.vol-picker-modal{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:#00000050}
.vol-picker-modal.hidden{display:none}
.vol-picker-inner{background:var(--sb);border-radius:14px;box-shadow:0 8px 40px #0000002a;width:min(400px,90vw);max-height:60vh;display:flex;flex-direction:column;overflow:hidden}
.vol-picker-hd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.vol-picker-title{font-size:13px;font-weight:700}
.vol-picker-close{background:transparent;border:none;color:var(--tx3);font-size:18px;padding:0 4px;line-height:1;cursor:pointer;transition:color .12s}
.vol-picker-close:hover{color:var(--tx)}
.vol-picker-list{overflow-y:auto;flex:1}
.vol-picker-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.vol-picker-item:last-child{border-bottom:none}
.vol-picker-item:hover{background:var(--bg)}
.vol-picker-item.current{font-weight:700;background:color-mix(in srgb,var(--vpick-acc,#888) 8%,transparent)}
.vol-picker-type{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--bg);border:1px solid var(--bd);color:var(--tx3);flex-shrink:0}
.vol-picker-label{font-size:13px;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx2);font-size:12px;font-weight:500;transition:all .12s;min-width:0;max-width:260px}
.ep-nav-btn:hover{background:var(--bg);border-color:var(--bd2);color:var(--tx)}
.ep-nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.ep-nav-btn:first-child{justify-self:start}
.ep-nav-btn:last-child{justify-self:end}
.ep-nav-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-picker-btn{justify-self:center;display:flex;align-items:center;gap:5px;padding:8px 16px;background:var(--sb);border:1px solid var(--bd2);border-radius:7px;font-size:11px;font-weight:600;color:var(--tx2);transition:all .12s;white-space:nowrap}
.ep-picker-btn:hover{background:var(--bg);color:var(--tx)}
/* Episode picker modal */
.ep-picker-modal{
  position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;
  background:#00000050;
}
.ep-picker-modal.hidden{display:none}
.ep-picker-inner{
  background:var(--sb);border-radius:14px;box-shadow:0 8px 40px #0000002a;
  width:min(480px,90vw);max-height:70vh;display:flex;flex-direction:column;overflow:hidden;
}
.ep-picker-hd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ep-picker-title{font-size:14px;font-weight:700}
.ep-picker-close{background:transparent;border:none;color:var(--tx3);font-size:18px;padding:0 4px;line-height:1;transition:color .12s}
.ep-picker-close:hover{color:var(--tx)}
.ep-picker-list{overflow-y:auto;flex:1}
.ep-picker-item{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.ep-picker-item:last-child{border-bottom:none}
.ep-picker-item:hover{background:var(--bg)}
.ep-picker-item.current{background:color-mix(in srgb,var(--curr-acc,#888) 8%,transparent);font-weight:600}
.ep-picker-num{font-size:10px;color:var(--tx3);font-weight:500;min-width:28px}
.ep-picker-t{font-size:13px;color:var(--tx)}
.ep-picker-st{margin-left:auto;font-size:9px;font-weight:700}
.ep-picker-st.done{color:#c0392b}.ep-picker-st.plan{color:var(--tx3)}



/* ── MOBILE ── */
.mob-menu{
  display:flex;
  position:fixed;top:48px;left:0;bottom:0;
  width:130px;
  background:var(--sb);
  border-right:1px solid var(--bd);
  box-shadow:4px 0 24px #0000001a;
  z-index:300;
  overflow:hidden;
  transform:translateX(-105%);
  transition:transform .24s cubic-bezier(.4,0,.2,1), width .22s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  will-change:transform;
}
.mob-menu.open{transform:translateX(0);pointer-events:all;}
/* 두 패널을 가로로 배치 */
.mob-panel-wrap{
  display:flex;
  width:100%;
  height:100%;
}
/* 1차 패널 */
.mob-panel-1{
  width:130px;min-width:120px;
  height:100%;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex-shrink:0;
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
}
/* 2차 패널 */
.mob-panel-2{
  width:200px;max-width:200px;flex-shrink:0;
  height:100%;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--sm,#fafafa);
  display:none;
}
/* 1차 메뉴가 열린 상태에서 2차 패널 표시 */
.mob-menu.show-sub{width:auto;max-width:340px}
.mob-menu.show-sub .mob-panel-2{display:block}
/* 2차 패널 헤더 */
.mob-sub2-hd{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;background:var(--sm,#fafafa);z-index:2;
}
.mob-sub2-back{
  background:transparent;border:none;
  color:var(--tx2);font-size:18px;padding:0 6px 0 0;
  cursor:pointer;line-height:1;flex-shrink:0;
}
.mob-sub2-back:hover{color:var(--tx)}
.mob-sub2-title{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mob-sub2-x{background:transparent;border:none;color:var(--tx3);font-size:16px;padding:0 2px;cursor:pointer;line-height:1}
.mob-sub2-x:hover{color:var(--tx)}

.mob-home-btn{
  margin-top:auto;
  display:flex;align-items:center;justify-content:center;gap:5px;
  width:100%;padding:26px 10px;
  background:transparent;border:none;border-top:1px solid var(--bd);
  color:var(--tx3);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .12s;
  flex-shrink:0;
}
.mob-home-btn:hover{background:var(--bg);color:var(--tx)}
.mob-backdrop.show{display:block}
.mob-nav-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--tx2);font-size:12px;font-weight:500;text-align:left;cursor:pointer}
.mob-nav-item:hover,.mob-nav-item.active{color:var(--tx);background:var(--bg)}
.mob-nav-item .mob-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:10px}
/* 1차 메뉴 프로젝트 아이템 — 단일 버튼(화살표 없음) */
.mob-proj-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:11px 14px;
  background:transparent;border:none;border-bottom:1px solid var(--bd);
  color:var(--tx2);font-size:12px;font-weight:500;text-align:left;cursor:pointer;
  gap:8px;
}
.mob-proj-btn:hover{color:var(--tx);background:var(--bg)}
.mob-proj-btn .mob-arr{font-size:12px;color:var(--tx3);flex-shrink:0}
/* 기존 호환 (사용 안 하지만 오류 방지) */
.mob-proj-row{display:flex;align-items:center;width:100%;border:none;border-bottom:1px solid var(--bd)}
.mob-proj-name{flex:1;padding:13px 20px;background:transparent;border:none;color:var(--tx2);font-size:14px;font-weight:500;text-align:left;cursor:pointer}
.mob-proj-name:hover{color:var(--tx)}
.mob-proj-toggle{padding:13px 18px;background:transparent;border:none;color:var(--tx2);font-size:32px;cursor:pointer;border-left:1px solid var(--bd);line-height:1;display:flex;align-items:center;justify-content:center}
.mob-proj-toggle:hover{color:var(--tx)}
.mob-sub{display:none;background:#fafafa;border-bottom:1px solid var(--bd)}
.mob-sub.open{display:block}
.mob-sub-item{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd)}
.mob-sub-item:last-child{border-bottom:none}
.mob-sub-card{cursor:pointer;transition:opacity .12s}
.mob-sub-card:hover{opacity:.7}
.mob-sub-thumb{aspect-ratio:3/4;border-radius:6px;margin-bottom:5px;position:relative;overflow:hidden}
.mob-sub-thumb.yt{aspect-ratio:16/9}
.mob-sub-label{font-size:11px;font-weight:500;color:var(--tx);line-height:1.3}
.mob-sub-links{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--bd)}
.mob-sub-link{font-size:11px;padding:5px 10px;border:1px solid var(--bd);border-radius:5px;background:#fff;color:var(--tx);cursor:pointer}
.mob-sub-link:hover{background:var(--bg)}
.mob-lang-row{padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--bd)}
.mob-lang-btn{font-size:11px;font-weight:600;padding:5px 10px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx2)}
.mob-lang-btn:hover{background:var(--tx);color:#fff}
/* 2차 패널 컨텐츠 */
.mob2-intro-link{display:flex;align-items:center;justify-content:space-between;margin:10px 12px 0;padding:10px 14px;background:#fff;color:var(--tx);border:1px solid var(--bd);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .12s}
.mob2-intro-link:hover{background:var(--bg)}
.mob2-vol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px 20px}
.mob2-vol-card{cursor:pointer;transition:opacity .12s}
.mob2-vol-card:hover{opacity:.75}
.mob2-vol-thumb{aspect-ratio:3/4;border-radius:7px;border:1px solid var(--bd);position:relative;overflow:hidden;margin-bottom:6px}
.mob2-vol-badge{position:absolute;top:5px;right:5px;font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px}
.mob2-vol-type{position:absolute;top:5px;left:5px;font-size:8px;font-weight:600;padding:2px 5px;border-radius:3px;background:#00000060;color:#fff}
.mob2-vol-title{font-size:11px;font-weight:500;color:var(--tx);line-height:1.4}
.mob2-progress{display:flex;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid var(--bd);margin-top:8px}
.mob2-cat-list{display:flex;flex-direction:column;gap:8px;padding:10px 12px 20px}
.mob2-cat-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:background .12s}
.mob2-cat-item:hover{background:var(--bg)}
@media(min-width:769px){.mob-menu,.mob-lang-row{display:none!important}}
.postype-text{white-space:normal;word-break:normal;overflow-wrap:break-word;line-height:1.9;font-size:17px}
@media(max-width:768px){.topbar-right{display:none!important}}
@media(max-width:768px){
  #nav-layer{display:none!important}
  #content{margin-top:48px;height:calc(100vh - 48px);height:calc(100dvh - 48px);-webkit-overflow-scrolling:touch;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0px)}
  .topbar-right{gap:4px}
  .home-body{grid-template-columns:1fr}
  .home-about-card{max-width:100%}
  .home-recent-grid{grid-template-columns:1fr}
  .cal-page{padding:16px 10px 20px;max-width:100%}
  .cal-layout{grid-template-columns:1fr}
  .cal-year-grid{grid-template-columns:repeat(3,1fr)}
  .ep-board-head,.ep-row{grid-template-columns:28px 1fr 52px}
  .ep-board-head>*:nth-child(4),.ep-row>*:nth-child(4){display:none}
  .ep-board-head{font-size:8px}
  .ep-num{font-size:10px}
  .ep-title-col{font-size:12px}
  .ep-date-col{font-size:9px}
  .ep-status{font-size:9px}
  .vol-banner,.char-detail-hero,.content-info{padding:14px 20px}
  .ep-board{margin:12px auto 18px}
  .postype-wrap,.intro-body{padding:20px 20px 48px}
  .intro-hero{padding:20px 16px}
  .yt-ep-list{padding:8px 12px}
  .yt-ep-thumb{width:120px;height:68px}
  .ep-nav{padding:10px 12px}
  .ep-nav-btn{max-width:40%;padding:6px 10px;font-size:11px}
  .postype-text{font-size:15.5px;line-height:1.8}
  /* 모바일: 줄거리 텍스트만 말줄임 처리 */
  .vb-synopsis-text{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
  /* 좁은 화면: 중간 breadcrumb 숨기고 현재 제목만 */
  .tb-crumb,.tb-arr,.tb-sep{display:none!important}
  .tb-cur{max-width:calc(100vw - 120px)}
}

/* ── 플로팅 에피소드 네비 (모바일 읽기 뷰) ── */
#float-ep-nav{
  position:fixed;
  bottom:20px;right:16px;
  z-index:200;
  display:none;
  align-items:center;gap:6px;
  background:var(--sb);
  border:1px solid var(--bd);
  border-radius:30px;
  box-shadow:0 4px 16px #00000018;
  padding:6px 8px;
  opacity:0;
  transform:translateY(12px);
  pointer-events:none;
  transition:opacity .22s ease, transform .22s ease;
}
#float-ep-nav.active{
  display:flex;
}
#float-ep-nav.visible{
  opacity:1;transform:translateY(0);pointer-events:all;
}
.fep-btn{
  background:transparent;border:none;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--tx2);cursor:pointer;
  transition:background .12s,color .12s;flex-shrink:0;
}
.fep-btn:hover{background:var(--bg);color:var(--tx)}
.fep-btn.disabled{opacity:.3;pointer-events:none}
.fep-mid{
  font-size:11px;font-weight:600;color:var(--tx2);
  padding:0 6px;cursor:pointer;white-space:nowrap;
  transition:color .12s;
}
.fep-mid:hover{color:var(--tx)}
.fep-div{width:1px;height:18px;background:var(--bd);flex-shrink:0}

/* ── PROGRESS PAGE ── */
.progress-page{padding:22px 32px;max-width:1020px;margin:0 auto}
.progress-page-title{font-size:19px;font-weight:700;color:var(--tx);margin-bottom:15px}
.progress-outer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.progress-proj-block{background:var(--sb);border:1px solid var(--bd);border-radius:11px;overflow:hidden}
.progress-proj-hd{padding:9px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.progress-proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.progress-proj-name{font-size:13px;font-weight:700;color:var(--tx)}
.progress-proj-cnt{font-size:10px;color:var(--tx3);margin-left:auto}
.progress-vol-inner{padding:9px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.progress-oc-inner{padding:9px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.progress-vol-card{background:var(--bg);border-radius:7px;padding:8px 10px}
.progress-vol-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.progress-vol-card-label{font-size:11px;font-weight:500;color:var(--tx2)}
.progress-vol-card-stat{font-size:9px;color:var(--tx3)}
.progress-ep-grid{display:flex;flex-wrap:wrap;gap:2px}
.progress-ep-cell{width:11px;height:11px;border-radius:1px;border:1px solid var(--bd);background:var(--sb);flex-shrink:0}
.progress-ep-cell.done{border-color:transparent}
.progress-ep-cell.wip{border-color:transparent;opacity:0.4}
.progress-char-row{padding:10px 14px;border-top:1px solid var(--bd)}
.progress-char-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.progress-char-label{font-size:12px;font-weight:700;color:var(--tx)}
.progress-char-stat{font-size:10px;color:var(--tx3)}

/* ── NAV FOLDER STRUCTURE ── */
.nav-cat-header{
  display:flex;align-items:center;gap:5px;
  padding:8px 12px 5px 10px;
  width:100%;text-align:left;
  background:transparent;border:none;outline:none;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:background .1s;
}
.nav-cat-header:hover{background:var(--bg)}
.nav-cat-arrow{
  font-size:7px;color:var(--tx3);
  transition:transform .18s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;line-height:1;
  display:inline-block;
}
.nav-cat-label{
  font-size:11px;font-weight:500;
  letter-spacing:.2px;color:var(--tx2);
}
.nav-cat-count{
  font-size:10px;color:var(--tx3);
  font-weight:400;letter-spacing:0;
  flex:1;
}
.nav-cat-body{overflow:hidden;transition:max-height .22s cubic-bezier(.4,0,.2,1)}
.nav-cat-body.collapsed{display:none}
/* 상태별 점 색상 */
.nav-proj-dot.active-dot{background:#22c55e}
.nav-proj-dot.done-dot{background:#94a3b8}
.nav-proj-dot.archive-dot{background:#94a3b8}
/* 프로젝트 아이템 들여쓰기 */
.nav-proj-item-inner{padding-left:22px!important}
/* 검색 없을 때 빈 카테고리 메시지 */
.nav-cat-empty{padding:6px 22px 10px;font-size:11px;color:var(--tx3);font-style:italic}

/* ── MOBILE NAV FOLDER ── */
.mob-cat-header{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;background:transparent;
  border:none;border-bottom:1px solid var(--bd);
  width:100%;text-align:left;cursor:pointer;
  user-select:none;-webkit-user-select:none;
  transition:background .1s;
}
.mob-cat-header:hover{background:var(--bg)}
.mob-cat-arrow{font-size:7px;color:var(--tx3);transition:transform .18s;flex-shrink:0}
.mob-cat-label{font-size:11px;font-weight:500;letter-spacing:.2px;color:var(--tx2)}
.mob-cat-count{font-size:10px;color:var(--tx3);font-weight:400;flex:1}
.mob-cat-body{overflow:hidden}
.mob-cat-body.collapsed{display:none}
.mob-proj-btn-inner{padding-left:20px!important}

/* ── 에피소드 언어 전환 버튼 ── */
.ep-lang-btn{
  font-size:10px;font-weight:600;padding:3px 8px;
  border:1px solid var(--bd);border-radius:5px;
  background:transparent;color:var(--tx3);
  font-family:var(--fn);cursor:pointer;transition:all .12s;
}
.ep-lang-btn:hover{background:var(--bg);color:var(--tx);border-color:var(--bd2)}
.ep-lang-btn.active{background:var(--tx);color:#fff;border-color:var(--tx)}

/* Google Translate */
.goog-te-banner-frame,.goog-te-menu-frame{display:none!important}
body{top:0!important}
.skiptranslate{display:none!important}
#google_translate_element{position:fixed;bottom:8px;right:8px;z-index:9999;opacity:0;pointer-events:none}

/* ── Drive 본문 로딩 ── */
.postype-loading{display:flex;align-items:center;gap:10px;color:var(--tx3);font-size:13px;padding:32px 0}
.postype-spinner{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--tx3);border-radius:50%;animation:ptSpin .7s linear infinite;flex-shrink:0}
@keyframes ptSpin{to{transform:rotate(360deg)}}
.postype-error{background:#fff5f5;border:1px solid #ffd0d0;border-radius:8px;padding:16px 20px;color:#c03030;font-size:12px;line-height:1.7}
.postype-error pre{margin-top:8px;font-size:11px;white-space:pre-wrap;color:#a03030}
</style>

<body>
<!-- TOPBAR -->
<div id="topbar">
  <button id="menu-toggle" aria-label="메뉴">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </button>
  <span id="topbar-logo" onclick="goHome()">biz.rrkt</span>
  <button id="topbar-cal-btn" onclick="goCal()">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 5h12" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M10 1v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    작업 캘린더
  </button>
  <button id="topbar-progress-btn" onclick="goProgress()" style="font-size:12px;padding:5px 10px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--tx2);display:flex;align-items:center;gap:5px;transition:all .12s;margin-left:0">
    <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="4" height="10" rx="1" fill="currentColor" opacity=".4"/><rect x="5.5" y="5" width="4" height="7" rx="1" fill="currentColor" opacity=".7"/><rect x="10" y="1" width="4" height="11" rx="1" fill="currentColor"/></svg>
    진행 현황
  </button>
  <div class="topbar-right">
    <button class="tb-lang-btn" onclick="setLang('en')">EN</button>
    <button class="tb-lang-btn" onclick="setLang('ja')">JA</button>
    <button class="tb-lang-btn" onclick="setLang('zh-CN')">ZH</button>
    <button class="tb-lang-btn" onclick="setLang('ko')">KO</button>
  </div>
</div>

<!-- DESKTOP FLOATING NAV -->
<div id="nav-layer">
  <nav id="nav-panel" onmouseleave="onNavPanelLeave()">
    <div style="padding:14px 16px 10px;border-bottom:1px solid var(--bd)">
      <div style="font-size:9px;font-weight:500;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:5px">Archive</div>
      <div style="font-size:16px;font-weight:700;color:#111;letter-spacing:-.04em;cursor:pointer" onclick="goHome()">biz.rrkt</div>
    </div>
    <div id="nav-items-wrap" style="padding:8px 0"></div>
  </nav>
  <div id="sub-panel-wrap" style="display:flex;align-items:stretch">
    <div id="sub-panel" onmouseenter="onSubPanelEnter()" onmouseleave="onSubPanelLeave()">
      <div id="sm-inner"></div>
    </div>
    
  </div>
</div>
<div id="nav-backdrop" onclick="closeNav()"></div>

<!-- MOBILE MENU -->
<div class="mob-menu" id="mob-menu">

async function fetchEpText(url){
  if(!url) throw new Error("URL 없음");
  const res = await fetch(url);
  if(!res.ok){
    if(res.status === 404) throw new Error(`파일을 찾을 수 없음 (404)\nURL: ${url}`);
    throw new Error(`불러오기 실패 (HTTP ${res.status})`);
  }
  return await res.text();
}

(function(){
  let _ctx=null;
  function getCtx(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
  function playClick(){
    try{
      const ctx=getCtx();
      // Windows XP click: two quick tones like old UI feedback
      function tone(freq,start,dur,vol){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';
        o.frequency.setValueAtTime(freq,ctx.currentTime+start);
        g.gain.setValueAtTime(vol,ctx.currentTime+start);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
        o.start(ctx.currentTime+start);
        o.stop(ctx.currentTime+start+dur+0.01);
      }
      tone(1200,0,0.05,0.12);
      tone(900,0.045,0.06,0.09);
    }catch(e){}
  }
  document.addEventListener('click',playClick);
})();

/* Build work log */
const WORK_LOG = {};
function buildWorkLog(){
  ["blood-highschool","x-project"].forEach(pid=>{
    const proj = PROJECTS.find(p=>p.id===pid);
    (VOLUMES[pid]||[]).forEach(v=>v.episodes.forEach(e=>{
      if(!e.date)return;
      if(!WORK_LOG[e.date])WORK_LOG[e.date]=[];
      WORK_LOG[e.date].push({proj:proj.label,volSub:v.sub||v.label,title:e.title,status:e.status,acc:proj.acc,projId:pid,volId:v.id,epId:e.id,volType:v.type||''});
    }));
  });
  const dollProj = PROJECTS.find(p=>p.id==="biz-oc-doll");
  const dv = VOLUMES["biz-oc-doll"];
  Object.entries(dv.episodes).forEach(([catId,eps])=>eps.forEach(e=>{
    if(!e.date)return;
    if(!WORK_LOG[e.date])WORK_LOG[e.date]=[];
    WORK_LOG[e.date].push({proj:dollProj.label,title:e.title,status:e.status,acc:dollProj.acc,projId:"biz-oc-doll",dollCatId:catId,epId:e.id});
  }));
}
buildWorkLog();

/* ── AUTHOR STATUS WIDGET ── */
function buildAuthorStatus(){
  const now = new Date();
  const allEntries = Object.entries(WORK_LOG).flatMap(([date,ws])=>ws.map(w=>({date,...w})));
  const sortedDates = Object.keys(WORK_LOG).sort();
  const lastWorkStr = sortedDates[sortedDates.length-1]||null;
  const daysSince = lastWorkStr ? Math.floor((now-new Date(lastWorkStr))/86400000) : null;

  // 이번 달 작업 수
  const thisMonStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const thisMonCnt=allEntries.filter(e=>e.date.startsWith(thisMonStr)).length;

  // 최근 7일 작업 수
  const recentCnt=allEntries.filter(e=>{
    if(!e.date)return false;
    return Math.floor((now-new Date(e.date))/86400000)<=7;
  }).length;

  let dotCls, label, body;

  if(allEntries.length===0||daysSince===null){
    dotCls="away"; label="상태 미정";
    body="아직 작업 기록이 없어요.";
  } else if(daysSince===0){
    dotCls="active"; label="마감 완료 ✍️";
    body="오늘도 작업 중이에요. 새 업데이트를 기대해 주세요!";
  } else if(daysSince<=7&&recentCnt>=2){
    dotCls="active"; label="작업 중 🖊️";
    body="활발하게 작업하고 있어요. 곧 새 내용을 올릴게요.";
  } else if(daysSince<=7){
    dotCls="active"; label="작업 중 🖊️";
    body="조금 뜸하지만 꾸준히 쓰고 있어요.";
  } else if(daysSince<=14){
    dotCls="slow"; label="잠시 쉬는 중 🌿";
    body="잠깐 숨 고르는 중이에요. 곧 돌아올게요.";
  } else if(daysSince<=30){
    dotCls="slow"; label="휴재 중 💤";
    body="현재 업로드가 잠시 멈춰 있어요. 기다려 주셔서 감사해요.";
  } else if(daysSince<=60){
    dotCls="away"; label="바쁜 현생 중 🌀";
    body="현생으로 인해 연재 중지 상태예요. 조금만 기다려 주세요!";
  } else {
    dotCls="away"; label="장기 휴재 중 🕰️";
    body="오랫동안 자리를 비웠어요. 언젠가 꼭 돌아올게요.";
  }

  return`<div class="author-status">
    <div class="author-status-bar">
      <span class="author-status-dot ${dotCls}"></span>
      <span class="author-status-label">${label}</span>
    </div>
    <div class="author-status-body">${body}</div>
  </div>`;
}


function buildFocusWidget(){
  const now = new Date();
  const thisMonStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const allEntries = Object.entries(WORK_LOG).flatMap(([date,ws])=>ws.map(w=>({date,...w})));
  const thisMonEntries = allEntries.filter(e=>e.date.startsWith(thisMonStr));

  // 프로젝트별 집계 (기록 없으면 0) — active 프로젝트만
  const countMap = {};
  thisMonEntries.forEach(e=>{ countMap[e.projId] = (countMap[e.projId]||0) + 1; });
  const sorted = PROJECTS
    .filter(p=>(p.status||"active")==="active")
    .map(p=>({...p, count: countMap[p.id]||0}))
    .sort((a,b)=>b.count-a.count);
  const maxCount = sorted[0].count || 1;
  const hasData = thisMonEntries.length > 0;

  // 상단 문구: 데이터 있을 때만 "현재 XXX 중점으로 집필 중"
  let topLine = "";
  if(hasData){
    const top = sorted.find(p=>p.count>0);
    const lastChar = top.label.charCodeAt(top.label.length-1);
    const particle = (lastChar-0xAC00)%28 !== 0 ? "을" : "를";
    topLine = `<div style="font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:8px">현재 <strong style="color:var(--tx)">${top.label}</strong>${particle} 중점으로 집필하고 있어요.</div>`;
  }

  const bars = sorted.map(p=>{
    const pct = hasData ? Math.round((p.count/maxCount)*100) : 0;
    const cntHtml = p.count > 0
      ? `<span style="font-size:11px;font-weight:700;color:var(--tx)">${p.count}</span>`
      : `<span style="font-size:11px;color:var(--tx3)">—</span>`;
    return `<div class="focus-row">
      <div class="focus-lbl">${p.label}</div>
      <div class="focus-bar-wrap"><div class="focus-bar" style="width:${pct}%;background:${p.acc}"></div></div>
      <div class="focus-cnt">${cntHtml}</div>
    </div>`;
  }).join("");

  return `<div class="focus-widget-inner">
    <div class="focus-widget-hd">
      <span class="focus-widget-lbl">주요 집필 프로젝트</span>
      <span class="focus-badge">이번 달 기준</span>
    </div>
    ${topLine}${bars}
  </div>`;
}


function buildEvalWidget(mode, y, m){
  // mode: "month" | "year" | "timeline"
  const now = new Date();
  const allEntries = Object.entries(WORK_LOG).flatMap(([date,ws])=>ws.map(w=>({date,...w})));

  // ── 범위별 데이터 분기 ──
  let scopeEntries, scopeLabel, emoji, title, msg, sub="", chips=[], bgColor;

  if(mode==="month"){
    // 📅 해당 월 평가
    const moStr = `${y}-${String(m+1).padStart(2,"0")}`;
    const prevDate = new Date(y, m-1, 1);
    const prevMonStr = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,"0")}`;
    scopeEntries = allEntries.filter(e=>e.date.startsWith(moStr));
    const prevCnt = allEntries.filter(e=>e.date.startsWith(prevMonStr)).length;
    const cnt = scopeEntries.length;
    const done = scopeEntries.filter(e=>e.status==="완료").length;
    const doneRate = cnt ? Math.round(done/cnt*100) : 0;
    const isThisMon = y===now.getFullYear()&&m===now.getMonth();
    const diff = cnt - prevCnt;
    scopeLabel = `${y}년 ${m+1}월`;

    // 연속 작업일 (이번 달만 의미 있음)
    let streak=0;
    if(isThisMon){
      for(let i=0;i<31;i++){
        const d=new Date(now); d.setDate(d.getDate()-i);
        if(d.getMonth()!==m||d.getFullYear()!==y) break;
        const dStr=ds(d.getFullYear(),d.getMonth(),d.getDate());
        if(WORK_LOG[dStr]) streak++;
        else if(i>0) break;
      }
    }

    // 마지막 작업
    const monDates = Object.keys(WORK_LOG).filter(d=>d.startsWith(moStr)).sort();
    const lastInMon = monDates[monDates.length-1]||null;

    if(cnt===0){
      emoji="📭"; title=`${m+1}월 기록 없음`;
      msg=isThisMon?"이번 달은 아직 작업 기록이 없어요. 하나 올려볼까요?":`${m+1}월에는 작업이 없었던 달이에요.`;
      bgColor="linear-gradient(135deg,#fafafa,#f3f4f6)";
    } else if(streak>=5){
      emoji="🔥"; title=`${streak}일 연속 작업 중!`;
      msg=`이번 달 흐름 완벽해요. ${cnt}건 기록 중이에요.`;
      bgColor="linear-gradient(135deg,#f0fdf4,#dcfce7)";
    } else if(cnt>=10){
      emoji="💪"; title=`이번 달 ${cnt}건!`;
      msg=`${m+1}월 작업량이 상당히 많아요. 완료율은 ${doneRate}%예요.`;
      bgColor="linear-gradient(135deg,#eff6ff,#dbeafe)";
    } else if(diff>0&&prevCnt>0){
      emoji="📈"; title=`지난달보다 ${diff}건 더`;
      msg=`${prevCnt}건 → ${cnt}건으로 늘었어요. 좋은 흐름이에요!`;
      bgColor="linear-gradient(135deg,#f0fdf4,#dcfce7)";
    } else if(diff<0&&prevCnt>0){
      emoji="📉"; title=`지난달보다 ${Math.abs(diff)}건 감소`;
      msg=`${prevCnt}건 → ${cnt}건. 다음 달엔 더 채워볼 수 있어요.`;
      bgColor="linear-gradient(135deg,#fef9f0,#fef3c7)";
    } else {
      emoji="📋"; title=`${m+1}월 ${cnt}건`;
      msg=doneRate>=50?`완료율 ${doneRate}%로 절반 이상 마무리됐어요.`:`작업 ${cnt}건 중 ${done}건 완료됐어요.`;
      bgColor="linear-gradient(135deg,#f5f3ff,#ede9fe)";
    }
    chips=[
      cnt?`${m+1}월 ${cnt}건`:"",
      doneRate?`완료율 ${doneRate}%`:"",
      prevCnt&&diff!==0?(diff>0?`+${diff}건 ↑`:`${diff}건 ↓`):"",
      streak>=2?`${streak}일 연속`:"",
    ].filter(Boolean);

  } else if(mode==="year"){
    // 📆 해당 연도 평가
    const yrStr = String(y);
    scopeEntries = allEntries.filter(e=>e.date.startsWith(yrStr));
    const prevYrEntries = allEntries.filter(e=>e.date.startsWith(String(y-1)));
    const cnt = scopeEntries.length;
    const done = scopeEntries.filter(e=>e.status==="완료").length;
    const doneRate = cnt ? Math.round(done/cnt*100) : 0;
    const prevCnt = prevYrEntries.length;
    const diff = cnt - prevCnt;
    const isThisYear = y===now.getFullYear();

    // 가장 바쁜 달
    const byMonth = Array.from({length:12},(_,mo)=>({mo, cnt:scopeEntries.filter(e=>e.date.startsWith(`${y}-${String(mo+1).padStart(2,"0")}`)).length}));
    const busiestMo = byMonth.reduce((a,b)=>b.cnt>a.cnt?b:a,{mo:0,cnt:0});
    const activeMos = byMonth.filter(b=>b.cnt>0).length;

    if(cnt===0){
      emoji="📭"; title=`${y}년 기록 없음`;
      msg=isThisYear?`${y}년 아직 기록이 없어요. 올해 첫 작업을 남겨볼까요?`:`${y}년에는 기록된 작업이 없어요.`;
      bgColor="linear-gradient(135deg,#fafafa,#f3f4f6)";
    } else if(cnt>=50){
      emoji="🏆"; title=`${y}년 ${cnt}건 달성!`;
      msg=`연간 작업량이 정말 많아요. ${activeMos}개월 동안 활발히 작업했네요.`;
      bgColor="linear-gradient(135deg,#fefce8,#fef08a33)";
    } else if(cnt>=20){
      emoji="🌟"; title=`${y}년 ${cnt}건`;
      msg=`${activeMos}개월에 걸쳐 꾸준히 쌓았어요. 완료율 ${doneRate}%예요.`;
      bgColor="linear-gradient(135deg,#f0fdf4,#dcfce7)";
    } else if(diff>0&&prevCnt>0){
      emoji="📈"; title=`${y-1}년보다 ${diff}건 증가`;
      msg=`${prevCnt}건 → ${cnt}건. 올해 더 활발하게 작업하고 있어요!`;
      bgColor="linear-gradient(135deg,#eff6ff,#dbeafe)";
    } else if(diff<0&&prevCnt>0){
      emoji="📉"; title=`${y-1}년보다 ${Math.abs(diff)}건 감소`;
      msg=`${prevCnt}건 → ${cnt}건. 내년엔 더 채워나갈 수 있어요.`;
      bgColor="linear-gradient(135deg,#fef9f0,#fef3c7)";
    } else {
      emoji="📆"; title=`${y}년 ${cnt}건`;
      msg=busiestMo.cnt>0?`${busiestMo.mo+1}월이 가장 바쁜 달이었어요 (${busiestMo.cnt}건).`:`${activeMos}개월에 걸쳐 작업이 기록됐어요.`;
      bgColor="linear-gradient(135deg,#f5f3ff,#ede9fe)";
    }
    chips=[
      cnt?`${y}년 ${cnt}건`:"",
      doneRate?`완료율 ${doneRate}%`:"",
      activeMos?`${activeMos}개월 활동`:"",
      prevCnt&&diff!==0?(diff>0?`전년比 +${diff}건`:`전년比 ${diff}건`):"",
    ].filter(Boolean);

  } else {
    // 📊 전체 타임라인 평가
    const cnt = allEntries.length;
    const done = allEntries.filter(e=>e.status==="완료").length;
    const doneRate = cnt ? Math.round(done/cnt*100) : 0;
    const years = [...new Set(allEntries.map(e=>e.date.slice(0,4)))].sort();
    const activeYears = years.length;
    const avgPerYear = activeYears ? Math.round(cnt/activeYears) : 0;
    const sortedDs = Object.keys(WORK_LOG).sort();
    const lastWork = sortedDs[sortedDs.length-1]||null;
    const daysSince = lastWork ? Math.floor((now-new Date(lastWork))/86400000) : null;

    if(cnt===0){
      emoji="📝"; title="아직 기록 없음";
      msg="첫 작업을 등록하면 전체 통계를 분석해드려요.";
      bgColor="linear-gradient(135deg,#fafafa,#f3f4f6)";
    } else if(cnt>=100){
      emoji="🎖️"; title=`누적 ${cnt}건!`;
      msg=`${activeYears}년에 걸쳐 ${cnt}건을 쌓아왔어요. 정말 대단한 작업량이에요.`;
      bgColor="linear-gradient(135deg,#fefce8,#fef08a33)";
    } else if(doneRate>=60){
      emoji="✨"; title=`완료율 ${doneRate}%`;
      msg=`전체 ${cnt}건 중 ${done}건 완료. 마무리 습관이 훌륭해요.`;
      bgColor="linear-gradient(135deg,#f0fdf4,#dcfce7)";
    } else if(activeYears>=2){
      emoji="📊"; title=`${activeYears}년 기록`;
      msg=`연평균 ${avgPerYear}건. 꾸준히 기록해온 작업 히스토리예요.`;
      bgColor="linear-gradient(135deg,#eff6ff,#dbeafe)";
    } else {
      emoji="📊"; title=`전체 ${cnt}건`;
      msg=`완료 ${done}건 · 진행 중 ${cnt-done}건. 지금까지의 작업 히스토리예요.`;
      bgColor="linear-gradient(135deg,#f5f3ff,#ede9fe)";
    }
    chips=[
      `전체 ${cnt}건`,
      doneRate?`완료율 ${doneRate}%`:"",
      activeYears?`${activeYears}년 기록`:"",
      avgPerYear?`연평균 ${avgPerYear}건`:"",
      daysSince===0?"오늘 작업":daysSince===1?"어제 작업":daysSince!==null?`${daysSince}일 전 작업`:"",
    ].filter(Boolean);
  }

  return`<div class="eval-widget" style="background:${bgColor}">
    <div class="eval-banner">
      <div class="eval-emoji">${emoji}</div>
      <div class="eval-text">
        <div class="eval-title">${title}</div>
        <div class="eval-msg">${msg}${sub?` <span style="opacity:.65">${sub}</span>`:""}</div>
      </div>
    </div>
    ${chips.length?`<div class="eval-chips">${chips.map(c=>`<span class="eval-chip">${c}</span>`).join("")}</div>`:""}
  </div>`;
}

    const tb = document.getElementById("topbar");

    }

  if(S.view==="home")          renderHome();

  else if(S.view==="progress") renderProgress();

      // 이미 로드됨 - 재실행 없이 renderList만 호출
      if(typeof renderList==="function") renderList();
    } else {
      fetch("doll_charlist.html").then(r=>r.text()).then(html=>{
        const doc=new DOMParser().parseFromString(html,"text/html");
        document.getElementById("content").innerHTML=doc.body.innerHTML;
        // 로드 완료 표시
        const marker=document.createElement("span");
        marker.id="doll-charlist-loaded";
        marker.style.display="none";

          const ns=document.createElement("script");ns.textContent=s.textContent;s.replaceWith(ns);

        document.getElementById("content").scrollTop=0;
      });
    }
  }
  else if(S.view==="about")    renderAbout();
}

/* ── PROGRESS PAGE ── */
function renderProgress(){
  function cells(total, done, wip, color){
    return Array.from({length:total},(_,i)=>{
      if(i<done) return `<div class="progress-ep-cell done" style="background:${color}"></div>`;
      if(i<done+wip) return `<div class="progress-ep-cell wip" style="background:${color}"></div>`;
      return `<div class="progress-ep-cell"></div>`;
    }).join("");
  }

  // 블러드하이스쿨 — 3열, 웹소설/웹툰 구분
  const bhProj = PROJECTS.find(p=>p.id==="blood-highschool");
  const bhVols = VOLUMES["blood-highschool"]||[];
  const bhTotalAll = bhVols.reduce((s,v)=>s+v.episodes.length,0);
  const bhDoneAll  = bhVols.reduce((s,v)=>s+v.episodes.filter(e=>e.status==="완료").length,0);

  function bhCard(v){
    const total=v.episodes.length;
    const done=v.episodes.filter(e=>e.status==="완료").length;
    const wip=v.episodes.filter(e=>e.status==="작업중").length;
    return `<div class="progress-vol-card">
      <div class="progress-vol-card-top">
        <span class="progress-vol-card-label">${v.sub||v.label}</span>
        <span class="progress-vol-card-stat">${done}/${total}</span>
      </div>
      <div class="progress-ep-grid">${cells(total,done,wip,bhProj.acc)}</div>
    </div>`;
  }

  const novels  = bhVols.filter(v=>v.type==="웹소설");
  const webtoons= bhVols.filter(v=>v.type==="웹툰");

  function bhSection(label, vols){
    if(!vols.length) return "";
    return `
      <div style="padding:10px 11px 4px;display:flex;align-items:center;gap:8px">
        <span style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--tx3);text-transform:uppercase">${label}</span>
        <div style="flex:1;height:1px;background:var(--bd)"></div>
      </div>
      <div style="padding:4px 9px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        ${vols.map(v=>bhCard(v)).join("")}
      </div>`;
  }

  const bhInner = bhSection("웹소설", novels) + bhSection("웹툰", webtoons);

  // biz-OC-doll — 4열 카드 + 캐릭터 200 행
  const ocProj = PROJECTS.find(p=>p.id==="biz-oc-doll");
  const dv = VOLUMES["biz-oc-doll"];
  const ocCards = dv.categories.map(cat=>{
    const eps=dv.episodes[cat.id]||[];
    const total=cat.count;
    const done=eps.filter(e=>e.status==="완료").length;
    const wip=eps.filter(e=>e.status==="작업중").length;
    return `<div class="progress-vol-card">
      <div class="progress-vol-card-top">
        <span class="progress-vol-card-label">${cat.label}</span>
        <span class="progress-vol-card-stat">${done}/${total}</span>
      </div>
      <div class="progress-ep-grid">${cells(total,done,wip,cat.color)}</div>
    </div>`;
  }).join("");
  const charReg = dv.categories.reduce((s,c)=>s+c.count,0);
  const charDone = dv.categories.reduce((s,c)=>s+(dv.episodes[c.id]||[]).filter(e=>e.status==="완료").length,0);
  const charPct = Math.round(charReg/200*100);
  const charCells = Array.from({length:200},(_,i)=>{
    if(i<charDone) return `<div class="progress-ep-cell done" style="background:${ocProj.acc}"></div>`;
    if(i<charReg)  return `<div class="progress-ep-cell wip" style="background:${ocProj.acc}"></div>`;
    return `<div class="progress-ep-cell"></div>`;
  }).join("");

  document.getElementById("content").innerHTML=`
    <div class="progress-page">
      <div class="progress-page-title">진행 현황</div>
      <div class="progress-outer-grid">

        <div class="progress-proj-block">
          <div class="progress-proj-hd">
            <div class="progress-proj-dot" style="background:${bhProj.acc}"></div>
            <span class="progress-proj-name">${bhProj.label}</span>
            <span class="progress-proj-cnt">${bhDoneAll} / ${bhTotalAll}화</span>
          </div>
          ${bhInner}
        </div>

        <div class="progress-proj-block">
          <div class="progress-proj-hd">
            <div class="progress-proj-dot" style="background:${ocProj.acc}"></div>
            <span class="progress-proj-name">${ocProj.label}</span>
            <span class="progress-proj-cnt">${charReg} / 200 캐릭터</span>
          </div>
          <div class="progress-oc-inner">${ocCards}</div>
          <div class="progress-char-row">
            <div class="progress-char-row-top">
              <span class="progress-char-label">캐릭터 200개 달성</span>
              <span class="progress-char-stat">${charReg}/200 (${charPct}%)</span>
            </div>
            <div class="progress-ep-grid">${charCells}</div>
          </div>
        </div>

      </div>
    </div>`;
}

/* ── CALENDAR ── */
function renderCalendar(){
  const{calY:y,calM:m,calOverview:ov,calTimeline:tl,calSpan:span}=S;
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const monthStr=new Date(y,m,1).toLocaleDateString("ko-KR",{year:"numeric",month:"long"});
  const DNAMES=["일","월","화","수","목","금","토"],DCLS=["sun","","","","","","sat"];

  // 연도 목록
  const curY=new Date().getFullYear();
  const allYears=[...new Set(Object.keys(WORK_LOG).map(d=>parseInt(d.slice(0,4))).filter(yr=>yr<=curY))];
  if(!allYears.includes(curY)) allYears.push(curY);
  allYears.sort((a,b)=>b-a);
  const yearTabs = allYears.map(yr=>`<button class="cal-year-tab${yr===y&&!ov&&!tl?" active":""}" onclick="goYear(${yr})">${yr}년</button>`).join("");

  // N년씩 보기 버튼
  const spanBtns = [1,2,3].map(n=>`<button class="cal-year-overview-btn${(ov&&!tl&&span===n)?" active":""}" onclick="setCalSpan(${n})">${n}년씩 보기</button>`).join("");

  // 연간 요약 미니캘
  function buildMiniMonth(yr,mo){
    const fd=new Date(yr,mo,1).getDay(), days=new Date(yr,mo+1,0).getDate();
    const _tn=new Date();
    const isCurMo=yr===y&&mo===m;
    let cnt=0;
    let cells="";
    for(let i=0;i<fd;i++) cells+=`<div class="cal-mm-cell"></div>`;
    for(let d=1;d<=days;d++){
      const ds_=ds(yr,mo,d), hw=!!(WORK_LOG[ds_]&&WORK_LOG[ds_].length);
      const isToday=yr===_tn.getFullYear()&&mo===_tn.getMonth()&&d===_tn.getDate();
      if(hw) cnt++;
      cells+=`<div class="cal-mm-cell${hw?" hw":""}${isToday?" td":""}">${d}</div>`;
    }
    return`<div class="cal-mini-month${isCurMo?" cur-month":""}" onclick="goMonth(${yr},${mo})">
      <div class="cal-mm-head"><span class="cal-mm-lbl">${mo+1}월</span><span class="cal-mm-count${cnt?" has":""}">${cnt?cnt+"건":"없음"}</span></div>

  // 멀티 연도 그리드 (span 적용)
  function buildMultiYearGrid(){
    const cols = span > 1 ? 12 : 6;
    const gap  = span > 1 ? 6 : 10;
    let html="";
    for(let offset=0;offset<span;offset++){
      const yr=y+offset;
      html+=`<div style="margin-bottom:${span>1?24:0}px">
        ${span>1?`<div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--bd)">${yr}년</div>`:""}
        <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:${gap}px;margin-bottom:0">${Array.from({length:12},(_,mo)=>buildMiniMonth(yr,mo)).join("")}</div>
      </div>`;
    }
    return html;
  }
  const overviewHtml = buildMultiYearGrid();
  const _curY_ov = new Date().getFullYear();
  const _minY_ov_arr = Object.keys(WORK_LOG).map(d=>parseInt(d.slice(0,4))).filter(yr=>yr<=_curY_ov);
  const _minY_ov = _minY_ov_arr.length ? Math.min(..._minY_ov_arr) : _curY_ov;
  const _atMaxOv = y >= _curY_ov + 2 - span + 1;
  const _atMinOv = y <= _minY_ov;

  // ── 타임라인 뷰 ──
  function buildTimeline(){
    const _tn=new Date();
    const allEntries=Object.entries(WORK_LOG).flatMap(([date,ws])=>ws.map(w=>({date,...w})));
    // 전체 연도 목록 구성
    const allYrs=[...new Set(allEntries.map(e=>e.date.slice(0,4)))];
    const curYstr=String(_tn.getFullYear());
    if(!allYrs.includes(curYstr)) allYrs.push(curYstr);
    allYrs.sort((a,b)=>b.localeCompare(a));

    // span 적용: calY 기준으로 span개 연도만 표시
    const startY=S.calY, endY=S.calY+span-1;

    for(let i=startY;i<=endY;i++){
      const s=String(i);
      if(!years.includes(s)) years.push(s);
    }
    years.sort((a,b)=>span>1?a.localeCompare(b):b.localeCompare(a));

    const _atMaxTl = startY >= _tn.getFullYear() + 2 - span + 1;
    const _minY_tl_arr = Object.keys(WORK_LOG).map(d=>parseInt(d.slice(0,4))).filter(yr=>yr<=_tn.getFullYear());
    const _minY_tl = _minY_tl_arr.length ? Math.min(..._minY_tl_arr) : _tn.getFullYear();
    const _atMinTl = startY <= _minY_tl;

    const stBg={완료:"#ffe4e4",작업중:"#fff9e0",예정:"#f0f0f0"};

    // 타임라인 헤더 (N년씩 보기 드롭다운 + 연도 네비)

            ${span===1?`${startY}년`:`${startY}년 ~ ${endY}년`}

          <button class="cal-nav-btn" onclick="nextTlYear()" ${_atMaxTl?'disabled style="opacity:.3;cursor:default;pointer-events:none"':''}>&#8250;</button>
